body: "Original question: can metrics be composed from Node.properties typed numeric columns without a dedicated metrics table? Answer: the question is moot — the emission path was soft-deprecated in cycle 28 (see D-211). No new metric rows are written, so composition over Node.properties is not needed. The existing read path (handleGetMetrics) still queries the legacy metrics table for backward compatibility; any removal of that path will be decided in a later cycle."
