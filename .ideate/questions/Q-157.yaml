title: Metrics composition feasibility — Node.properties typed numeric columns
domain: agent-system
question: Do Node.properties returned by getNodes() contain the typed numeric columns (input_tokens, output_tokens, cache_read_tokens, cache_write_tokens) needed for metrics aggregation? If not, a dedicated queryMetrics() adapter method may be required instead of composition.
