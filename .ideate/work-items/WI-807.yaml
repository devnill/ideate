notes: |-
  # WI-807: queryNodes table fix + adapter guard tests

  ## Background

  Bundles two PH-045 cycle 2 findings that share the tools.test.ts file:

  **CR-S1** (significant, code-reviewer): query.ts:221-232 — the Domain and Cycle columns are permanently empty because NodeMeta lacks Domain entirely and cycle_created is not wired into the row. Runtime consequence of WI-804's invariant-2 violation.

  **CR-M3** (minor, code-reviewer): tools.test.ts:469-518 has no test asserting column structure — the regression went undetected.

  **GA-S1** (significant, gap-analyst): WI-803 and WI-804 introduced getAdapter(ctx) guards but no tests verify the throw path. metrics.test.ts has analogous tests at line 219-231; tools.test.ts is missing equivalent coverage.

  ## Fix approach

  **Part 1**: Choose Option A (populate Cycle, drop Domain). Cycle data is queryable from NodeMeta; Domain isn't.

  **Part 2**: Add three describe blocks (or one parametrized) verifying the three handlers throw the expected configuration error when ctx.adapter is unset.

  ## References

  - PH-045 cycle 2 code-quality.yaml (CR-S1, CR-M3)
  - PH-045 cycle 2 gap-analysis.yaml (GA-S1)
  - WI-803, WI-804 (introduced the guard pattern)
