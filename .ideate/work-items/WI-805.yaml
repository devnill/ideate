notes: |
  # WI-805: Remove ctx.db fallback from metrics.ts handleGetMetrics (Leak 7)

  ## Background

  Leak 7 from RF-clean-interface-proposal §2: 'handleGetMetrics silently uses wrong data path with RemoteAdapter'. Surfaced by gap-analyst S2 in PH-045 cycle 1 capstone review.

  Current metrics.ts:514-527:
  - Line 522: ctx.adapter.queryNodes(...) called as a gate-check (result discarded)
  - Line 523: ctx.db.prepare(fullQuery).all(...) reads data from local SQLite
  - Line 524-526: else branch is identical ctx.db read

  Result: with RemoteAdapter active, handleGetMetrics returns local SQLite data, not remote backend data. The adapter call is decorative.

  ## Scope

  This is a real architecture fix, not just dead-code removal. The aggregation logic currently expressed as a single SQL query needs an adapter-friendly equivalent:

  **Option A** (simpler): Use adapter.queryNodes + getNodes for full properties, aggregate in TypeScript. Suitable if the result set is small.

  **Option B** (if needed): Add a new adapter method (e.g. aggregateMetrics(filters)) so each backend can implement its own efficient aggregation. RemoteAdapter would call a corresponding GraphQL query.

  RF-clean-interface-proposal §2 already sketches Option B.

  ## Acceptance test

  Integration-style test that:
  1. Wires a mock RemoteAdapter that records calls and never exposes ctx.db.
  2. Calls handleGetMetrics.
  3. Asserts the recorded calls (proves data path runs through adapter).
  4. Asserts ctx.db is never accessed.

  ## References

  - RF-clean-interface-proposal §2 (Leak 7)
  - PH-045 cycle 1 gap-analysis (S2)
  - WI-800, WI-803, WI-804 — sibling adapter-cleanup work items
resolution: "Removed ctx.db fallback from handleGetMetrics in tools/metrics.ts. Added getAdapter(ctx) helper at module top. Replaced 'Adapter-first branch' (which called adapter as no-op gate then read ctx.db) with real adapter-delegated data fetch: adapter.queryNodes + adapter.getNodes + TypeScript-side filter/sort. Added nodeToMetricsRow helper to map Node.properties → LocalMetricsEventRow. Removed buildWhereFragments (no longer needed). Rewrote metrics.test.ts entirely to use a hand-rolled mock adapter that records queryNodesCalls/getNodesCalls and proves data path runs through adapter (ctx.db = undefined). Added 'RemoteAdapter path' describe block with 3 explicit tests proving adapter routing. 1394 tests pass; tsc clean."
