notes: |-
  # WI-910 Implementation Notes

  Audit finding [gap S4]: three token-count implementations existed (consolidated in WI-903 to one Math.floor heuristic). PPR budget enforcement relies on this coarse count — at 50k-token budgets, ±50% accuracy means 25k-token drift.

  Recommend option (b) — document bounds. Reasons:
  - js-tiktoken is ~500KB; adds startup latency to import
  - instrumentation.ts already uses it for specific metric paths; general artifact token-count doesn't need the precision
  - Upgrading would require re-indexing existing token_count fields (migration work)
  - Current scale: token_budget default is 50k; ±25k drift is visible but not catastrophic

  If user prefers (a), switch estimateTokens to `const enc = getEncoding('cl100k_base'); return enc.encode(text).length;`. Note the import-at-module-load latency.

  ## Constraints
  - Node 22 + vitest only.
  - If (a): ensure existing token_count fields in SQLite are either accepted as-is (drift) or a reindex strategy is documented.

  ## Self-check
  Walk each of the 5 criteria with satisfied/unsatisfied status.
resolution: "JSDoc on estimateTokens expanded to document approximation formula (Math.floor(len/4)), accuracy bounds (±30% ASCII, ±50% non-ASCII worst case), tradeoff rationale (js-tiktoken startup latency + re-index cost), and reference to instrumentation.ts for precise counting. New unit test asserts documented contract: 'hello world!' (12 chars) => 3 tokens. 1877 tests pass."
