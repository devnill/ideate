notes: |-
  # WI-813: ValidatingAdapter guard tests for indexFiles/removeFiles

  ## Background

  Flagged by code-reviewer (CR-S1) in PH-045 cycle 3 capstone review.

  WI-810 added INVALID_PATHS validation guards in `validating.ts:462-483` for the new `indexFiles` and `removeFiles` methods. The mock adapter in `validating.test.ts:159-165` records these calls but no test exercises the guard path. A refactor that accidentally removes or bypasses the `Array.isArray` check would not be caught.

  ## Approach

  Add two `describe` blocks mirroring the existing `archiveCycle` guard test pattern. For each method:

  1. Test that passing a non-array (e.g. `"not-an-array"` cast through `as unknown as string[]`) rejects with an error whose `code === "INVALID_PATHS"`.
  2. Test that passing a valid `string[]` (e.g. `["/some/path.yaml"]`) calls through to the inner adapter, recorded in the mock's `calls` array.

  ## References

  - PH-045 cycle 3 capstone code-quality review: CR-S1
  - WI-810 (introduced the guard implementations)
