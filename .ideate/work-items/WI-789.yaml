criteria:
  - ppr.ts:184-191 graph-size abort is removed; computePPR no longer returns [] based on totalNodes > maxNodes. computePPR runs over the full graph regardless of size.
  - "LocalContextAdapter.traverse applies a result-count slice to the ranked node list after PPR sort: when options.max_nodes != null && options.max_nodes > 0, the returned ranked_nodes length is <= max_nodes."
  - When options.max_nodes is null, undefined, or 0, no slice is applied in either adapter (matches existing RemoteAdapter condition at remote/index.ts:848).
  - "adapter.ts TraversalOptions.max_nodes docstring is rewritten to describe result-count-cap semantic: 'Maximum number of ranked nodes returned. Applied as a slice after PPR scoring. If omitted or 0, all ranked nodes are returned. No effect on PPR computation itself.' The prior 'If graph exceeds this, returns empty result' wording is removed."
  - "The misleading comment at remote/index.ts:848 ('// Apply max_nodes limit if specified (for adapter parity with LocalAdapter)') is updated to: '// Apply max_nodes as a result-count cap per adapter contract'."
  - Existing PPR tests asserting the graph-size-abort behavior (looking for empty result or warning log when graph exceeds limit) are rewritten to assert the new semantic (full result with slice applied at the traverse layer, not empty).
  - "New equivalence assertion in tests/adapters/equivalence-traverse.test.ts: given the same graph seeded for both adapters and the same max_nodes: N option, both LocalAdapter.traverse and RemoteAdapter.traverse return ranked_nodes with length <= N. Score ordering is not asserted (per RF-clean-interface-proposal D5)."
  - "Full test suite passes: pnpm test. No regressions in existing PPR or equivalence tests."
