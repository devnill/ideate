notes: |-
  ## Background

  PH-044 criterion 1 — RF-clean-interface-proposal D4 divergence. The refinement interview selected Option (b): pure slice semantic everywhere, remove graph-size abort.

  ## Current state (from architect survey)

  | Adapter | Graph-size abort | Result-count slice |
  |---------|------------------|--------------------|
  | Local   | Yes (ppr.ts:184-191) | No                 |
  | Remote  | Yes (server-side) | Yes (client-side at remote/index.ts:848-851) |

  The RemoteAdapter comment at line 848 claims 'parity with LocalAdapter' but LocalAdapter does not slice — the comment is inverted. This work item fixes both the LocalAdapter divergence (add slice, remove abort) and the incorrect comment.

  ## Implementation approach

  1. ppr.ts: delete the `if (totalNodes > maxNodes) return []` block. Keep `maxNodes` as an accepted option but ignore it inside computePPR. (Alternative: delete maxNodes from PPROptions entirely. Prefer keeping the option for backward compatibility — the deprecated default of 10000 can stay as an unused field.)
  2. adapters/local/context.ts: after `ranked.sort(...)` (around line 256), apply the slice: `if (maxNodes != null && maxNodes > 0) { ranked = ranked.slice(0, maxNodes); }`. This mirrors the RemoteAdapter's client-side condition.
  3. adapter.ts: rewrite the TraversalOptions.max_nodes JSDoc comment.
  4. remote/index.ts:848: update the comment. No logic change needed.

  ## Server-side abort (out of scope)

  The RemoteAdapter forwards max_nodes to the server, which has its own server-side abort. That server lives in a separate repo (ideate-server) and is out of scope for this work item. The client-side slice in RemoteAdapter already provides the correct result-count cap regardless of server behavior.

  ## Parallelism

  No file overlap with WI-790 (metrics deprecation). Can run in parallel.
