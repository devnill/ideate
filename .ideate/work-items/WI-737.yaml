notes: |-
  ## Context
  S1 (code-reviewer) + SF2 (gap-analyst) from full-audit 2026-04-09. Two distinct changes to the same file.

  ## Change 1: Fix 4 TypeScript type errors

  The batchMutate edge-validation tests at lines 1027, 1047, 1066, 1086 pass node objects with `type: "work_item"` where `MutateNodeInput` requires `type: NodeType`. TypeScript infers the literal as `string` rather than the narrower union type. Fix: at each of the 4 locations, cast the type field:

  ```typescript
  // Change:
  type: "work_item"
  // To:
  type: "work_item" as NodeType
  ```

  Alternatively, cast the entire nodes array: `nodes as MutateNodeInput[]`. Either approach resolves the inference issue.

  Import `NodeType` from adapter if not already imported in this test file.

  ## Change 2: Add getDomainState deprecated/superseded filter test

  Find the existing `getDomainState` describe block (around line 1132). Add a new test immediately after the existing ones:

  ```typescript
  it("excludes deprecated and superseded policies from getDomainState results", async () => {
    // Insert three policies: active, deprecated, superseded
    await adapter.putNode({ id: "P-filter-active", type: "domain_policy", domain: "filter-test", status: null, ... });
    await adapter.putNode({ id: "P-filter-deprecated", type: "domain_policy", domain: "filter-test", status: "deprecated", ... });
    await adapter.putNode({ id: "P-filter-superseded", type: "domain_policy", domain: "filter-test", status: "superseded", ... });
    
    const result = await adapter.getDomainState(["filter-test"]);
    const entry = result.get("filter-test");
    expect(entry).toBeDefined();
    const policyIds = entry!.policies.map((p: any) => p.id);
    expect(policyIds).toContain("P-filter-active");
    expect(policyIds).not.toContain("P-filter-deprecated");
    expect(policyIds).not.toContain("P-filter-superseded");
  });
  ```

  Follow the existing test's setup pattern for how to insert nodes (use the adapter's putNode or direct helper). Check lines 1132-1155 for the existing test's setup to match the pattern.

  Dependency on WI-736: after WI-736 fixes the EdgeType import in adapter.ts, the tsc errors for adapter.ts will be gone. WI-737 can proceed independently but should be tested after WI-736 is merged so tsc --noEmit shows clean output across both files.

  P-49: test-only changes, no YAML backfill.
resolution: Added NodeType cast at 4 batchMutate test locations. Added getDomainState filter test asserting deprecated/superseded policies excluded. 76/76 tests pass.
