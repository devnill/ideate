notes: |-
  # WI-830: Minor follow-ups from cycle 7

  Closes cycle-7 minor findings:
  - code-reviewer M2 (contract test comment overstates RemoteAdapter coverage)
  - code-reviewer M3 (shape test asserts key presence but not value types)
  - spec-reviewer M1 (WI-826/WI-827 scope metadata paths wrong)
  - gap-analyst M2 (work_item / phase filter contract tests absent)
  - gap-analyst M3 (no domain policy for da.cycle-is-not-provenance invariant)

  ## Scope

  ### adapter-contract.test.ts
  - Add work_item filter test: writeMetricsEvent with payload.work_item='WI-001', assert getMetricsEvents({work_item:'WI-001'}) returns only matching rows.
  - Add phase filter test: same pattern with payload.phase='PH-045'.
  - Strengthen shape test: for fields written with known values, assert typeof rather than just toHaveProperty. Example: expect(typeof row.properties.event_name).toBe('string').
  - Rewrite comment at lines 1402–1405 to accurately state: 'These tests run against LocalAdapter unconditionally and against RemoteAdapter when a live test server is available (see remote-contract.test.ts). In standard CI without a live server, only LocalAdapter coverage is active.'

  ### Work item metadata corrections
  - WI-826.yaml scope: change mcp/artifact-server/docs/adapter-interface.md → docs/platform/adapter-interface.md
  - WI-827.yaml scope: change mcp/artifact-server/tests/ → mcp/artifact-server/src/__tests__/

  ### Domain policy
  - Call ideate_get_next_id({type:'domain_policy'}) for a new P-NN id.
  - Use ideate_write_artifact with type='domain_policy' (or 'policy' as appropriate) in the artifact-structure domain.
  - Policy title: 'document_artifacts.cycle is not a provenance guard'.
  - Body: rebuildIndex populates da.cycle from YAML content. Any code path that uses da.cycle as a cycle-ownership signal will leak across cycle boundaries when legacy YAMLs are reindexed. Cycle provenance must come from canonical file paths only. Cite WI-824 (the fix), D-211 (if related to tooling soft-deprecation), and the J-071-417 journal entry.

  ## Non-goals
  - Do not add test for tests/ directory split resolution (spec/M2 deferred — cosmetic).
  - Do not investigate WI-809/WI-811 ID gaps (gap/M4 — no action).

  ## Approach
  1. Read adapter-contract.test.ts:1394–1600 to understand existing test shape.
  2. Use adapter methods (putNode for metrics_event, getMetricsEvents with filter) for new tests — adapter-agnostic.
  3. Use ideate_update_work_items to correct scope metadata on WI-826 and WI-827 (do NOT edit .ideate/ YAML directly per GP-14).
  4. Use ideate_write_artifact for the domain policy.
