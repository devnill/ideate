criteria:
  - "ValidatingAdapter.traverse validates edge_type_weights: if provided, must be a plain object (not null, not array)."
  - Each key in edge_type_weights is validated against ALL_EDGE_TYPES. Invalid keys throw INVALID_EDGE_TYPE.
  - Each value in edge_type_weights must be a finite number >= 0. Invalid values throw INVALID_EDGE_WEIGHT with the key and value in details.
  - "Tests exercise: non-object rejected, array rejected, invalid key rejected, negative value rejected, NaN value rejected, valid weights accepted, empty object accepted."
  - ppr.ts defense-in-depth behavior unchanged.
domain: artifact-structure
phase: PH-041
work_item_type: bug
notes: |-
  ## Context
  Closing the cycle 23/24 deferral on edge_type_weights. User chose option (a): add explicit validation.

  ## Implementation
  Add validation block to ValidatingAdapter.traverse after max_nodes check, before always_include_types:

  ```typescript
  // edge_type_weights: if provided, must be a plain object with valid keys and numeric values
  if (options.edge_type_weights !== undefined) {
    if (typeof options.edge_type_weights !== 'object' || options.edge_type_weights === null || Array.isArray(options.edge_type_weights)) {
      throw new ValidationError(
        'edge_type_weights must be a plain object',
        'INVALID_EDGE_WEIGHTS',
        { value: options.edge_type_weights }
      );
    }
    for (const [key, value] of Object.entries(options.edge_type_weights)) {
      if (!ALL_EDGE_TYPES.includes(key as EdgeType)) {
        throw new ValidationError(
          `Invalid edge type in edge_type_weights: ${key}`,
          'INVALID_EDGE_TYPE',
          { value: key }
        );
      }
      if (typeof value !== 'number' || !Number.isFinite(value) || value < 0) {
        throw new ValidationError(
          `edge_type_weights values must be non-negative numbers, received ${value} for key "${key}"`,
          'INVALID_EDGE_WEIGHT',
          { key, value }
        );
      }
    }
  }
  ```
resolution: "Implemented edge_type_weights validation in ValidatingAdapter.traverse(): rejects non-objects, validates keys against ALL_EDGE_TYPES, validates values are non-negative finite numbers. 7 tests added. All 1338 tests pass."
