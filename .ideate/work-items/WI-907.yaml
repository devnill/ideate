  # WI-907 Implementation Notes

  Pure MCP artifact writes via `ideate_write_artifact({type: 'domain_decision', ...})`. No source code changes.

  Purpose: close two M-severity findings from the full audit by making the implicit decisions explicit and citable.

  ## Decision 1: belongs_to_domain FK semantics

  Content should explain:
  - Current behavior: belongs_to_domain edge target_id stores domain name strings ('workflow', 'artifact-structure', etc.) as quasi-identifiers.
  - The edges table has a FK constraint target_id → nodes.id with onDelete cascade (db.ts), but domain names are not registered nodes.
  - In practice, no node ID matches a domain name string, so the FK never cascades dangerously.
  - Structural violation is latent. Accepted.
  - Reexamination trigger: if domain nodes are ever introduced as real artifacts (new node type with domain-name IDs).

  ## Decision 2: Cycles-as-first-class-nodes

  Content should explain:
  - Cycles are NOT node-level artifacts. Cycle numbers are scalar fields on other artifacts (finding.cycle, work_item.cycle_created, etc.). cycle_summary documents cover a cycle but don't represent it.
  - belongs_to_cycle edges exist only for journal_entry → cycle_summary.
  - Queries like 'all findings from cycle 42' use field filters, not graph traversal.
  - Rationale: cycle is a coordinate/label, not a semantic entity. Promoting it to a node adds ceremony without clear query benefit at current scale.
  - Reexamination trigger: if cross-cycle traversal (e.g., 'show me all findings across cycles 40-50') becomes a frequent query pattern.

  ## Writing

  Use `ideate_get_next_id({type: 'domain_decision'})` for IDs. Likely D-218, D-219. Use standard domain_decision schema.

  ## Self-check
  Walk each of the 3 criteria with satisfied/unsatisfied status.
resolution: D-218 (belongs_to_domain FK semantics) and D-219 (cycles-not-first-class-nodes) filed via ideate_write_artifact. Both document current behavior, rationale, risk profile, and explicit reexamination triggers. Both cite 2026-04-17 full-audit source and cycle 79 (where filed). No source code touched. Pure artifact writes consistent with GP-14.
