notes: |-
  # WI-808: metrics.ts N+1 fix + 3D filter test + dead code cleanup

  ## Background

  Bundles four PH-045 cycle 2 findings that share the metrics.ts/metrics.test.ts files:

  **CR-S2** (significant): handleGetMetrics N+1 query pattern. queryNodes returns IDs, then getNodes calls fetchExtensionProperties one-per-node. With METRICS_FETCH_LIMIT=100,000 this is N round-trips per call. RF-clean-interface-proposal §2 Option B is the correct architectural fix (Option A used in WI-805 was the interim path).

  **GA-S3** (significant): Missing test for three-dimensional filter combination including phase + others. WI-805 acceptance criterion required filter-scope coverage.

  **CR-M1** (minor): Dead accumulator total_total_tokens and unused totalTokens local in aggregateByAgent.

  **CR-M2** (minor): Vacuous test 'does not write metrics.jsonl' has no assertion.

  ## Approach

  **Adapter interface change**: Add `getMetricsEvents(filter?: MetricsFilter): Promise<Array<{node: NodeMeta, properties: MetricsEventProperties}>>`.

  - LocalAdapter: SELECT n.id, n.type, n.cycle_created, m.* FROM nodes n JOIN metrics_events m ON n.id = m.id WHERE n.type = 'metrics_event' [+ filter clauses].
  - RemoteAdapter: GraphQL query equivalent.
  - handleGetMetrics: replace queryNodes + getNodes with adapter.getMetricsEvents.

  ## References

  - PH-045 cycle 2 code-quality.yaml (CR-S2, CR-M1, CR-M2)
  - PH-045 cycle 2 gap-analysis.yaml (GA-S3)
  - RF-clean-interface-proposal §2 Option B
  - WI-805 (parent — Option A interim)
