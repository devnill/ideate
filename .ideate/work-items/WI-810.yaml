notes: |-
  # WI-810: Remove ctx.db/drizzleDb from server.ts (Leak 13)

  ## Background

  Flagged by gap-analyst (GA-S2) in PH-045 cycle 2 capstone review. The cleanup campaign (WI-800/803/804/805) addressed all known leaks in src/tools/ but missed the file watcher integration in server.ts:

  - server.ts:165: indexFiles(state.ctx.db, state.ctx.drizzleDb, yamlChanged)
  - server.ts:168: removeFiles(state.ctx.db, state.ctx.drizzleDb, yamlDeleted)

  LIVE production code paths (file watcher fires on .yaml changes during normal operation). With RemoteAdapter active, ctx.db/ctx.drizzleDb may not be populated, causing a runtime crash.

  This is Leak 13 — uncatalogued in RF §2.

  ## Approach

  **Option A** (cleanest): Add indexFiles(paths) / removeFiles(paths) to the StorageAdapter interface. LocalAdapter implements them by calling the existing indexer functions. RemoteAdapter rejects (or stubs) since the watcher only makes sense for local artifact directories.

  **Option B** (interim): Guard with `if (config.backend === 'local')` and document as local-mode-only.

  Prefer Option A for invariant consistency with the rest of the cleanup campaign.

  ## Coordination with WI-808

  WI-808 also modifies adapter.ts (adding getMetricsEvents). WI-810 depends on WI-808 to avoid merge conflict; both PRs touch the StorageAdapter interface.

  ## References

  - WI-800/803/804/805 (siblings — cleanup campaign)
  - RF-clean-interface-proposal §1 invariant 2
  - PH-045 cycle 2 gap-analysis.yaml (GA-S2)
