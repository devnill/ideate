notes: |-
  ## Context

  Cycle 22 review identified 3 untested error code paths in ValidatingAdapter:
  - MISSING_NODE_ID in batchMutate (validating.ts:429-434) — thrown when batch node lacks `id` key
  - MISSING_NODE_TYPE in batchMutate (validating.ts:435-448) — thrown when batch node lacks `type` key
  - INVALID_SEED_IDS in traverse (validating.ts:269-273) — thrown when seed_ids is not an array

  ## Implementation

  ### 1. batchMutate MISSING_NODE_ID test

  Add to the batchMutate describe block:
  ```typescript
  it("throws MISSING_NODE_ID for batch node without id field", async () => {
    await expect(
      adapter.batchMutate({ nodes: [{ type: VALID_NODE_TYPE, properties: {} }] })
    ).rejects.toMatchObject({ code: "MISSING_NODE_ID" });
  });
  ```

  Note: the object must genuinely omit `id` (not pass `id: undefined`). Cast to `any` if TypeScript requires the field.

  ### 2. batchMutate MISSING_NODE_TYPE test

  ```typescript
  it("throws MISSING_NODE_TYPE for batch node without type field", async () => {
    await expect(
      adapter.batchMutate({ nodes: [{ id: "test-id", properties: {} }] })
    ).rejects.toMatchObject({ code: "MISSING_NODE_TYPE" });
  });
  ```

  ### 3. traverse INVALID_SEED_IDS test

  Add to the traverse describe block:
  ```typescript
  it("throws INVALID_SEED_IDS for non-array seed_ids", async () => {
    await expect(
      adapter.traverse({ seed_ids: "not-an-array" as any })
    ).rejects.toMatchObject({ code: "INVALID_SEED_IDS" });
  });
  ```
