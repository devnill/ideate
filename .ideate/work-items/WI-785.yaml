notes: |-
  ## Background

  RF-clean-interface-proposal Leak 1-2 (CRITICAL). tools/context.ts:1041-1043 contains:

  ```typescript
  import { LocalContextAdapter } from "../adapters/local/index.js";
  // ...
  ctx.adapter as unknown as LocalContextAdapter
  ```

  This cast crashes when ctx.adapter is RemoteAdapter. Five query methods are currently reached via this cast: queryArchitectureDocument, queryGuidingPrinciples, queryConstraints, queryActiveProject, queryActivePhase.

  ## Design choice per method

  RF-clean-interface-proposal recommends Option B (composition via queryNodes + getNodes) for queryGuidingPrinciples, queryConstraints, queryActiveProject, queryActivePhase. For queryArchitectureDocument, the proposal leaves Option A (add method to StorageAdapter) vs Option B open. Spike this decision early: if the architecture document has a single canonical row accessed identically by both backends, prefer a new StorageAdapter method getArchitectureDocument(); if composition is clean, use Option B.

  ## Implementation order

  1. Decide Option A/B per method; document decisions in this work item's implementation record
  2. If Option A for any method: add to StorageAdapter interface, implement in LocalAdapter, implement in RemoteAdapter, pass through ValidatingAdapter
  3. Update handleGetContextPackage and handleAssembleContext to call adapter methods / composed queries
  4. Remove import of LocalContextAdapter from context.ts
  5. Add adapter-contract test exercising all five paths for both backends
  6. Run full test suite

  ## Invariant to preserve

  No tool handler imports or casts to concrete adapter classes. StorageAdapter is the only adapter type visible above the adapter boundary (per invariant 1 in RF-clean-interface-proposal §1).

  ## Serialization

  This item blocks WI-787 because both modify the same adapter files (adapter.ts, local/context.ts, remote/index.ts). WI-787 depends on the interface shape settled here.
