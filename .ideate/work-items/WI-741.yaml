criteria:
  - "`pretest.js` contains no `process.exit(1)` calls"
  - When `migrate-to-v3.js` does not exist, the script emits a stderr warning and exits 0 — `npm test` proceeds
  - When `migrate-to-v3.js` is stale (older than the .ts source), the script emits a stderr warning and exits 0
  - All existing tests pass
domain: artifact-structure
phase: null
notes: |-
  ## Context
  SF3 (gap-analyst) from full-audit 2026-04-09. Policy P-73 established 2026-04-09. The script comment already says 'advisory-only: infra problems with the migration script should never block the test suite from running' but the code calls `process.exit(1)` in two places, contradicting the comment.

  ## Change

  In `mcp/artifact-server/scripts/pretest.js`, find the two `process.exit(1)` calls:

  1. In the ENOENT catch block (when `migrate-to-v3.js` does not exist)
  2. In the staleness check block (when `migrate-to-v3.js` mtime < `migrate-to-v3.ts` mtime)

  Remove both `process.exit(1)` calls. Keep all `process.stderr.write(...)` warning messages. The script should always exit 0 (implicit, since there is no explicit `process.exit(0)` needed — the script will fall through naturally).

  The outer `try/catch` that swallows other errors can remain as-is.

  This is a ~2 line removal. Do not add new logic or restructure the script.
resolution: Removed 2 process.exit(1) calls from pretest.js. All process.stderr.write warnings preserved. Script now always exits 0, consistent with advisory-only intent. P-73 compliance restored.
