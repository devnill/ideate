notes: |-
  # WI-839: Close PH-046 cycle-1 capstone findings

  Bundles 2 significant + 4 minor findings from the cycle-1 capstone review into a single WI since all are small, independent fixes in two code files and one doc file.

  ## Significant findings

  ### EC1: executeOnceWithAuth response.json() parity gap
  src/adapters/remote/client.ts executeOnceWithAuth calls response.json() bare at line ~379. executeOnce wraps the same call at lines 322-328 in try/catch throwing StorageAdapterError('PARSE_ERROR'). Mirror the pattern.

  ### II1: Test D HTTP_401 code assertion
  remote-adapter.test.ts Test D (line ~356-358) asserts only instanceof StorageAdapterError. Both adapter-contract.md and adapter-interface.md document that the second-401 path throws HTTP_401. Add .code === 'HTTP_401' to the toSatisfy predicate.

  ## Minor findings

  ### MI1/M2: Test F message assertion
  Test F asserts only instanceof ConnectionError. Add message.includes('fake-endpoint') to match Test E's pattern.

  ### MI2/M3: adapter-contract.md version metadata
  Update header to Version 3.1, Last Updated 2026-04-15. Add version history row.

  ### M4: Attribution footnote
  Add 'Introduced in WI-833...' to adapter-contract.md AUTH_FAILURE section, matching adapter-interface.md.

  No dependencies.
resolution: All 6 acceptance criteria satisfied. executeOnceWithAuth parse guard added, Test D/F assertions strengthened, adapter-contract.md version metadata and attribution footnote added. 1443 tests pass.
