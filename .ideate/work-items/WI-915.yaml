notes: |-
  # WI-915 Implementation Notes

  ## Worker agent tool list

  Check current agents/worker.md frontmatter tool list. Extend it to include MCP artifact tools. Also add disallowedTools (or equivalent deny rules) blocking Edit/Write on .ideate/ paths.

  Claude Code agent frontmatter supports a `tools:` list (positive allowlist) and `disallowedTools:` (negative). Use whichever mechanism fits the existing pattern in the repo.

  If the repo uses settings.json-based permission rules instead of agent frontmatter, add the deny rule there with scope=agent:worker or equivalent.

  ## Domain policy

  Create a new domain_policy via MCP. Suggested content:

  Title: 'Workers write .ideate/ artifacts exclusively through MCP; filesystem access to .ideate/ is blocked by agent tool configuration'
  Domain: agent-system
  Status: active
  Derived_from: GP-14
  Source: cycle 82 capstone GP-14 violation (WI-911)

  ## Constraints

  - GP-14: policy written via ideate_write_artifact, not direct YAML edit.
  - Don't break existing worker capability for non-.ideate file edits (source code work continues to work).

  ## Self-check

  Walk each of the 5 criteria with satisfied/unsatisfied status.
