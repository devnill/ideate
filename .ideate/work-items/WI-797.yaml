work_item_type: bug
notes: |-
  Discovered during autopilot run on 2026-04-14, project PR-002, phase PH-044, autopilot internal cycle 2.

  **Symptom**: ideate_get_convergence_status(2) returned condition_b:false with principle_verdict:fail, principle_verdict_source:step2, even though all three reviewers (code-quality, spec-adherence, gap-analysis) for that autopilot cycle returned Pass with zero significant findings.

  **Root cause**: Autopilot's internal cycle counter starts at 1 and reuses workspace cycle directory slots. The MCP server wrote new-format artifacts (code-quality.yaml, spec-adherence.yaml, gap-analysis.yaml) into .ideate/cycles/002/, but that directory already contained legacy ID-named files (SA-002.yaml, CQ-002.yaml, GA-002.yaml, plus secondary -002.yaml variants) from a March 29 archive. The convergence checker reads all spec-adherence-shaped artifacts in the directory and picks up the stale Fail verdict from SA-002.yaml.

  **Reproducer**: 
  1. Find any workspace cycle slot (e.g. cycles/002/) containing legacy SA-NNN.yaml with `verdict: Fail`.
  2. Write new-format spec-adherence.yaml to the same directory with Pass verdict.
  3. Call ideate_get_convergence_status(N).
  4. Observe condition_b:false despite the new-format file's Pass.

  **Three fix options** (any one is acceptable):
  - (a) Convergence checker disambiguates by content date, source, or autopilot session ID — read only artifacts produced in the current session/cycle window.
  - (b) Autopilot maps internal cycle numbers to next-available workspace cycle slots (e.g., 31, 32 instead of 1, 2). Avoids collision entirely.
  - (c) Convergence checker reads ONLY canonical filenames (code-quality.yaml, spec-adherence.yaml, gap-analysis.yaml) and ignores legacy ID-named files (SA-NNN, GA-NNN, CQ-NNN). Simplest fix; matches the curator's apparent intent.

  Preferred option (subjective): (c) for simplicity, or (b) for prevention. (a) is the most robust but heaviest.

  **Documented workaround**: J-071-400 records the manual override applied during the 2026-04-14 autopilot run — declared convergence based on direct reviewer artifact evidence rather than the convergence-checker output.

  This is a tooling/maintenance bug, not a semantics issue. P0 for autopilot reliability but not blocking single-cycle workflows.
resolution: "Fix option (c) implemented: convergence checker now prefers file_path.endsWith('/spec-adherence.yaml') before falling back to legacy SA-NNN matching, in both tools/analysis.ts (handleGetConvergenceStatus SQLite fallback path) and adapters/local/reader.ts (LocalAdapter.getConvergenceData adapter path). Two regression tests added: tools.test.ts:863 (SQLite fallback) and tools.test.ts:895 (adapter path). Worker confirmed parallel qualityRow/gapRow shadowing risk does not exist — only cycle_summary_content (adherenceRow ‗‗ summaryRow) is parsed for principle verdict; CQ-/GA- legacy files cannot shadow condition_b. Re-review: Pass, no findings. 1390 tests pass."
