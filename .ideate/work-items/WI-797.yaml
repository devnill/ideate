criteria:
  - ideate_get_convergence_status(N) returns condition_b:true when new-format files (code-quality.yaml, spec-adherence.yaml, gap-analysis.yaml) in the cycle N directory all show Pass verdicts, even when legacy ID-named files (SA-NNN, GA-NNN, CQ-NNN) in the same directory contain fail verdicts.
  - "At least one of the three proposed fixes is implemented: (a) disambiguate by content date/source; (b) map autopilot internal cycles to next-available workspace slots; (c) convergence-checker ignores legacy ID-named files, reads only canonical names."
