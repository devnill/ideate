notes: |-
  ## Context
  C1 from full-audit 2026-04-09. The `export type { EdgeType } from "./schema.js"` at adapter.ts:96 re-exports the type to callers but does NOT bring `EdgeType` into scope within the file itself. Under NodeNext module resolution, `export type` and `import type` are distinct operations. `EdgeType` is referenced in four interface definitions (lines 106, 169, 181, 309) with no local import, causing 4 TS2304 compile errors.

  ## Change
  Add exactly one line at adapter.ts:98 (immediately after or alongside the existing `import { EDGE_TYPES } from "./schema.js"`):

  ```typescript
  import type { EdgeType } from "./schema.js";
  ```

  The `export type { EdgeType }` at line 96 must remain — it exports the type to consumers of adapter.ts. This change only adds the missing local import.

  Do NOT touch any other files. P-49: no YAML backfill — runtime-only.
