notes: |-
  ## Implementation Approach

  In server.ts, the `selectAdapter()` function (or the call site that constructs the adapter) should wrap the result:

  ```typescript
  import { ValidatingAdapter } from './validating.js';

  // In selectAdapter or initServer:
  const rawAdapter = backend === 'remote'
    ? new RemoteAdapter(remoteConfig)
    : new LocalAdapter(localConfig);
  const adapter = new ValidatingAdapter(rawAdapter);
  ```

  The key location is where `state.adapter` is set in `initServer()`. The adapter goes through `selectAdapter()` which returns a `StorageAdapter`. Wrap the result before assigning to state.

  This is a small, surgical change — one import and one wrapper call.
