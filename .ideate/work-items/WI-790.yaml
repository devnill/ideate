notes: |-
  ## Background

  PH-044 criterion 2 — originally scoped as 'refactor metrics.ts to remove Leak 7 raw SQL'. The refinement interview pivoted to soft deprecation based on the premise: bad data is worse than no data, the current aggregation logic is distrusted, and a future phase should design quality metrics from scratch rather than fix a system slated for removal.

  ## What is kept vs. removed

  | Component | Action |
  |-----------|--------|
  | ideate_emit_metric MCP tool | Kept as no-op; description marked deprecated |
  | ideate_get_metrics MCP tool | Kept functional for historical read; description marked deprecated |
  | metrics_events SQLite table | Kept; no new rows written |
  | .ideate/metrics/*.yaml files | Kept; no new files written |
  | Skill emission call sites | NOT touched — no-op calls are harmless |
  | handleGetMetrics raw SQL (Leak 7) | Left in place; documented limitation; full removal in future phase |

  ## Rationale for soft rather than hard deprecation

  Hard removal (delete table, strip skill instrumentation) has higher blast radius and is better handled as part of the quality-metrics rebuild (PH-047-candidate). Soft deprecation stops new bad data from accumulating, signals intent, and preserves historical data for inspection.

  ## Parallelism

  No file overlap with WI-789 (max_nodes). Can run in parallel.
