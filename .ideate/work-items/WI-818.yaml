  # WI-818: Qualify §3.3 query output table description

  ## Why

  Cycle 4 SR-S1 (significant): architecture-overview.md:361 says 'five output columns: ID, Type, Status, Summary, and Cycle' without qualification. The handler at mcp/artifact-server/src/tools/query.ts:192-195 produces 7 columns when related_to is set (graph mode): ID, Type, Edge, Dir, Depth, Status, Summary. The five-column description applies only to queryNodes.

  ## Implementation

  Replace the sentence at line 361 with:

  > The filter-mode table (queryNodes path) has five output columns: ID, Type, Status, Summary, Cycle. The graph-mode table (queryGraph path, triggered by `related_to`) has seven output columns: ID, Type, Edge, Dir, Depth, Status, Summary.

  Verify by reading query.ts:192-195 and lines 231-234 to confirm column lists match exactly.
