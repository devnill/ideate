notes: |-
  This is the deepest investigation item. The local adapter runs PPR client-side in ppr.ts, while the remote adapter delegates to server-side PPR via GraphQL.

  Key areas:
  1. Edge type weight case convention: ppr.ts defaults are UPPER_SNAKE_CASE, config.ts defaults are lower_snake_case, ALL_EDGE_TYPES (used by ValidatingAdapter) are lower_snake_case. The normalizeEdgeType() function in ppr.ts uppercases everything. This is the anti-pattern the user flagged.

  2. CONTAINMENT_EDGE_TYPES in ppr.ts: owns_codebase, owns_project, has_phase, has_work_item, owns_knowledge, references_codebase. These are Neo4j relationship types. Check whether any of these exist in EDGE_TYPES/EDGE_TYPE_REGISTRY in schema.ts.

  3. Read docs/ppr-alignment-research.md for prior investigation findings.

  4. Compare LocalContextAdapter.traverse() in context.ts with RemoteAdapter.traverse() in remote/index.ts.
