notes: |-
  # WI-815: initServer remote-mode gating

  ## Background

  Flagged by gap-analyst (GA-S1, GA-M3) in PH-045 cycle 3 capstone review.

  When `config.backend = "remote"`, `initServer` (server.ts:131-149) still:
  - opens a local SQLite DB via `openDatabase`
  - runs `rebuildIndex` (reads all YAML into the local DB)
  - registers the file watcher

  The watcher correctly delegates to `adapter.indexFiles/removeFiles` (no-ops on RemoteAdapter), but the SQLite state is wasted: it is built and updated but no tool ever queries it under remote mode.

  The selectAdapter docstring at server.ts:57 still claims remote is `not yet implemented` — stale since RemoteAdapter is now live.

  ## Approach

  Gate the SQLite open + rebuildIndex + watcher block behind `if (config.backend === "local")`. For remote mode:
  - Skip `openDatabase` / `drizzle` calls (or set ctx.db/ctx.drizzleDb to null / undefined; verify no live consumer assumes their presence).
  - Skip `rebuildIndex`.
  - Skip watcher registration (RemoteAdapter cannot consume local file events meaningfully).

  Add a regression test that calls `initServer` with a mocked remote config and asserts `openDatabase` is not invoked.

  Update the docstring at server.ts:57 to reflect the current dual-backend behavior.

  ## References

  - PH-045 cycle 3 capstone gap-analysis review: GA-S1 (significant), GA-M3 (minor)
