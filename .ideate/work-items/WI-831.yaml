notes: |
  # WI-831: Fix convergence checker reading stale verdicts from legacy cycle files

  ## Summary

  `ideate_get_convergence_status` returns `condition_b: false` when legacy archived review artifacts in a workspace cycle directory contain `verdict: Fail`, even when the current autopilot cycle's review artifacts all show Pass.

  ## Resolution (Cycle 9)

  **Fix approach: option (c) — strict canonical filename selection, already implemented by WI-824** (`mcp/artifact-server/src/adapters/local/reader.ts:1093-1100`).

  ### Tradeoff analysis

  - Option (a) content-based disambiguation: would parse YAML body of every cycle_summary row to detect whether it belongs to the current cycle slot. Requires schema additions and is fragile when content format varies.
  - Option (b) slot mapping: would decouple internal/workspace cycle numbering to distinguish archive vs. current slot. Adds a new abstraction layer; preserves existing logic but adds complexity.
  - **Option (c) canonical filename selection (chosen)**: `getConvergenceData` selects only rows whose `file_path` ends with `/spec-adherence.yaml` or `/summary.yaml`. Legacy ID-named files (SA-NNN, CQ-NNN, GA-NNN) are invisible to the selector regardless of their `document_artifacts` content. Simple, matches WI-824 rationale, zero new abstractions.

  ### Alignment with P-86

  `da.cycle` is NOT used as a provenance guard. The file path (canonical filename) IS the provenance guard. A legacy `SA-NNN.yaml` may have `da.cycle = N` after reindex (rebuildIndex reads embedded `cycle:` field), but that does not make it the current cycle's authoritative spec-adherence artifact.

  ## Verification

  WI-831 was verified as already handled by WI-824's fix. A WI-831-specific regression test was added at `src/__tests__/tools.test.ts` covering the exact scenario: `SA-NNN.yaml` (Fail) + canonical `code-quality.yaml` + `spec-adherence.yaml` + `gap-analysis.yaml` (all Pass) in the same cycle directory → `converged:true`.

  Test name: `regression WI-831: legacy SA-NNN.yaml Fail + canonical passing files yields converged:true`.

  Test suite status: 1436 passed, 0 failed.

  ## Related

  - P-86: document_artifacts.cycle is not a provenance guard
  - WI-824: Strict canonical-only cycle_summary selection (reader.ts:1093)
  - D-211: Metrics emission + cycle provenance decisions
