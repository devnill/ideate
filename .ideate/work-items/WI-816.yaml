notes: |-
  # WI-816: Adapter-level metrics tests + SQL pushdown + comment cleanup

  ## Background

  Three related findings from PH-045 cycle 3 capstone:
  - GA-M1 (gap-analyst, significant): no adapter-level tests for `getMetricsEvents`. SQL JOIN + JSON parse path tested only via handler-level mocks.
  - CR-M1 (code-reviewer, minor): cycle filter applied TypeScript-side despite `n.cycle_created` already in SELECT. Trivial SQL pushdown.
  - CR-M2 (code-reviewer, minor): comments at reader.ts:396, 662, 1200 reference symbols (`runFilterMode`, `runGraphMode`, `buildSummaryMap`) that no longer exist after WI-804.

  Bundling these because all three touch `reader.ts` and the test gap is best closed alongside the SQL change so the new tests cover the new code path.

  ## Approach

  ### Adapter-level tests

  Follow the pattern in existing `__tests__/adapters/reader.test.ts` (uses real SQLite). Create a new file scoped to `getMetricsEvents`. Insert representative rows into `nodes` and `metrics_events` and exercise the filter combinations.

  ### SQL pushdown for cycle

  In `LocalReaderAdapter.getMetricsEvents`:
  1. After the existing whereClauses construction, add:
     ```ts
     if (filter?.cycle !== undefined && filter.cycle !== null) {
       whereClauses.push("n.cycle_created = ?");
       params.push(filter.cycle);
     }
     ```
  2. Remove the corresponding TS-side `filter.cycle` branch around line 627.
  3. Update the comment at lines 544–549 to accurately describe the remaining TS-side filters (agent_type, work_item, phase — those live in payload JSON).

  ### Comment cleanup

  Reword the three 'mirrors' comments to describe what each section actually does. Do not mention the deleted symbols.

  ## References

  - PH-045 cycle 3 capstone gap-analysis review: GA-M1
  - PH-045 cycle 3 capstone code-quality review: CR-M1, CR-M2
  - WI-808 (added getMetricsEvents)
  - WI-804 (deleted runFilterMode/runGraphMode/buildSummaryMap)
