notes: |-
  # WI-916 Implementation Notes

  ## Context

  WI-915 (cycle 83) added MCP tools to agents/worker.md and descriptive-text disallowedTools entries. But the disallowedTools format took tool names (Edit, Write) with a description — not machine-enforceable path patterns. Real enforcement requires settings.json permissions.deny with path-pattern syntax.

  ## Correct enforcement mechanism

  In .claude/settings.json (or agent-specific settings file):

  ```json
  {
    "permissions": {
      "deny": [
        "Edit(/**/.ideate/**)",
        "Write(/**/.ideate/**)"
      ]
    }
  }
  ```

  Scope to the worker agent if possible; otherwise global. The path pattern ensures Edit/Write on any .ideate/ path fails-fast.

  ## Validation

  Attempt an Edit on .ideate/test.yaml via a worker spawn; assert permission denied.

  ## Constraints

  - Must not break Edit/Write on source files outside .ideate/ (workers need those for normal work).
  - GP-14 compliance: any domain policy amendment goes through ideate_write_artifact.
resolution: ".claude/settings.json created with permission deny rules: Edit(**/.ideate/**) and Write(**/.ideate/**). agents/worker.md disallowedTools block removed; body text updated to cite settings.json as enforcement mechanism. P-94 domain policy updated via ideate_write_artifact to cite settings.json location. Criterion 2 (runtime smoke test of permission denial) marked unverifiable — requires live Claude Code session."
