notes: |-
  # WI-914 Implementation Notes

  ## Fix 1: Architecture re-sync

  - Retrieve current architecture artifact via ideate_artifact_query({type: 'architecture'}).
  - Parse its content.
  - Update the tool table: remove the two metric entries and their tools/metrics.ts reference; add entries for ideate_check_workspace (tools/diagnostics.ts) and ideate_get_tool_usage (tools/tool-usage.ts).
  - Preserve everything else including Scale Considerations section 10.
  - Write back via ideate_write_artifact({type: 'architecture', ...}).
  - Verify via follow-up query that content_hash updated in SQLite.

  ## Fix 2 + 3: Adapter abstraction

  Add checkWorkspace() to StorageAdapter interface. Move the logic from diagnostics.ts into LocalReaderAdapter.checkWorkspace. Keep the same report shape. Update diagnostics.ts handler to be a thin wrapper: `return await ctx.adapter.checkWorkspace()`.

  RemoteAdapter: throw new StorageAdapterError('NOT_SUPPORTED', 'checkWorkspace not yet implemented for remote backend') with a TODO comment. ValidatingAdapter: pass through.

  ## Fix 4: P-33 path leakage

  In the checkWorkspace implementation, compute unindexedPaths as path.relative(ideateDir, absPath). Update the diagnostics.test.ts assertion at line ~131 to expect the relative form.

  ## Fix 5: MAX_HOPS

  Recommended approach (prefer): wire to config.
  - In config.ts, add max_hops: 4 to DEFAULT_PPR_CONFIG.
  - Add max_hops?: number to IdeateConfigJson.ppr.
  - Update getConfigWithDefaults to include max_hops.
  - Update PPROptions to accept maxHops?: number.
  - computePPR reads config.ppr.max_hops via ctx or passed config object. If neither available, use options.maxHops or default to 4.

  If time-constrained: correct the JSDoc comment in ppr.ts to say "Hardcoded at 4. Wiring to config deferred." and remove the misleading `config.ppr.max_hops` reference.

  ## Constraints

  - Node 22 + vitest only. No bun.
  - GP-14: all artifact writes via MCP tools.
  - Preserve existing test coverage.

  ## Self-check

  Walk each of the 6 criteria with satisfied/unsatisfied status.
resolution: "4 fixes landed. Architecture artifact re-synced via ideate_write_artifact MCP call — tool table corrected (removed ideate_emit_metric/get_metrics + tools/metrics.ts row; added ideate_check_workspace + ideate_get_tool_usage rows); content_hash updated. StorageAdapter interface gained checkWorkspace() + WorkspaceCheckReport/Detail types; LocalReaderAdapter has the full implementation; LocalAdapter delegates; RemoteAdapter throws NOT_SUPPORTED; ValidatingAdapter passes through. tools/diagnostics.ts now a thin wrapper. P-33 path leak fixed: path.relative(ideateDir, filePath) before examples; test assertion updated. MAX_HOPS renamed DEFAULT_MAX_HOPS; wired to config.ppr.max_hops + PPROptions.maxHops with resolver; JSDoc corrected. 1877 tests pass, tsc clean."
