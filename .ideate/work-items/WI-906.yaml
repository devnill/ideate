notes: |-
  # WI-906 Implementation Notes

  Audit finding [spec M3]: DEFAULT_EDGE_TYPE_WEIGHTS covers only 5 of 16 edge types. 11 default to 1.0 silently. No rationale documented.

  ## Approach

  Review each of the 16 edge types in EDGE_TYPE_REGISTRY. Assign a deliberate weight (or explicit default-policy). Group by semantic category with a comment block.

  Rough starter (worker should validate/revise):
  - Containment (belongs_to_*): 0.3-0.6 range — structural, shouldn't dominate PPR
  - Dependency (depends_on, blocks): 0.9-1.0 — execution-critical
  - Governance (governed_by, informed_by): 0.6-0.8 — semantic pointer
  - Derivation (derived_from, amends, addresses): 0.4-0.6 — historical lineage
  - Reference (references, relates_to): 0.3-0.5 — weak association
  - Temporal (supersedes, triggered_by): 0.2-0.4 — history, not relevance

  Add a regression test asserting the weights map covers every EdgeType.

  ## Constraints
  - Node 22 + vitest only.
  - GP-14: no .ideate/ writes.
  - Behavioral change: PPR scores will shift since weights change. Document this in ppr.test.ts comments.

  ## Self-check
  Walk each of the 4 criteria with satisfied/unsatisfied status.
resolution: "DEFAULT_EDGE_TYPE_WEIGHTS now covers all 16 registered edge types explicitly. Grouped in source: Dependency (depends_on 1.0, blocks 0.3), Governance (governed_by 0.8, informed_by 0.6), Derivation (derived_from 0.5, addressed_by 0.4, amended_by 0.5), Reference (relates_to 0.3, references 0.4), Temporal (supersedes 0.2, triggered_by 0.3), Domain membership (belongs_to_domain 0.2), Containment (belongs_to_module/project/phase/cycle 0). 4 new regression tests assert full coverage + finite-non-negative + containment-at-0 + non-containment-positive. 1840 tests pass, tsc clean."
