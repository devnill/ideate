notes: |-
  ## Context
  Cycle 23 gap analysis identified 3 validation branches in ValidatingAdapter.batchMutate that have no test coverage:
  - MISSING_NODE_PROPERTIES (validating.ts:453-458)
  - MISSING_CYCLE (validating.ts:461-466)
  - MISSING_EDGE_TYPE (validating.ts:486-491)

  These code paths exist and work — they just lack tests. The putNode describe block already tests MISSING_NODE_PROPERTIES and MISSING_CYCLE for individual operations; these tests mirror that coverage for the batch path.

  ## Implementation
  Add 3 tests to the batchMutate describe block, after the existing INVALID_EDGE_TYPE test (~line 1118):

  ```typescript
  it('throws MISSING_NODE_PROPERTIES for batch node with null properties', async () => {
    const input = { nodes: [{ id: 'WI-001', type: VALID_NODE_TYPE, properties: null } as any] };
    await expect(adapter.batchMutate(input)).rejects.toSatisfy((e) => {
      assertValidationError(e, 'MISSING_NODE_PROPERTIES');
      return true;
    });
    expect(mock.calls).toHaveLength(0);
  });

  it('throws MISSING_CYCLE for cycle-scoped type without cycle in batch', async () => {
    const input = { nodes: [{ id: 'F-001', type: 'finding' as NodeType, properties: { title: 'test' } }] };
    await expect(adapter.batchMutate(input)).rejects.toSatisfy((e) => {
      assertValidationError(e, 'MISSING_CYCLE');
      return true;
    });
    expect(mock.calls).toHaveLength(0);
  });

  it('throws MISSING_EDGE_TYPE for edge without edge_type in batch', async () => {
    const input = {
      nodes: [validNode],
      edges: [{ source_id: 'WI-001', target_id: 'WI-002', edge_type: '', properties: {} }],
    };
    await expect(adapter.batchMutate(input)).rejects.toSatisfy((e) => {
      assertValidationError(e, 'MISSING_EDGE_TYPE');
      return true;
    });
    expect(mock.calls).toHaveLength(0);
  });
  ```

  Follow the exact assertion pattern of existing batchMutate tests.
