notes: |-
  # WI-912 Implementation Notes

  Audit finding [gap M3]: scripts/audit-sqlite-parity.mjs exists as a manual check; no automated path. Add an MCP tool so the check is invocable from skills (especially /ideate:review as a pre-flight step).

  ## Approach

  Create tools/diagnostics.ts with handleCheckWorkspace(ctx). Register in tools/index.ts TOOLS array with a short description.

  Implementation uses the adapter interface — no direct SQLite queries; go through ctx.adapter methods (queryNodes, getEdges, readNodeContent) to maintain adapter abstraction for future remote backend.

  ## Constraints
  - Node 22 + vitest only.
  - GP-14: tool description and response avoid file paths (follow P-33).
  - Use the adapter interface, not raw SQL.

  ## Self-check
  Walk each of the 6 criteria with satisfied/unsatisfied status.
resolution: "ideate_check_workspace MCP tool created in tools/diagnostics.ts. Registered in TOOLS array with <50-word description and no inputSchema parameters. 4 integrity checks implemented: orphan_nodes (file_path in DB but not on disk), unindexed_yaml (file on disk but not in nodes table), dangling_edges (source_id or target_id not in nodes), stale_addressed_by (findings whose addressed_by references missing work_item). Report structure matches spec with count + up-to-10 examples per check. 11 regression tests covering all 4 checks + report shape. 1877 tests pass."
