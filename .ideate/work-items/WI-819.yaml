notes: |
  # WI-819: Roundtrip test + ! consistency cleanup

  ## Why

  Two cycle 4 findings, both touching tools.test.ts — bundled to avoid scope collision.

  1. GA-II1 (significant, predates cycle 4): no test verifies the DB round-trip from handleWriteArtifact → document_artifacts.cycle population → getConvergenceData WHERE clause. Regressions in either path are silent.

  2. CR-M1 (minor): three noAdapterCtx objects at tools.test.ts:613-638 spread ctx.db and ctx.drizzleDb without `!`. Since ToolContext.db and drizzleDb are now optional (post-WI-815), TypeScript accepts this, but the pattern is inconsistent with the rest of the file.

  ## Implementation

  ### Part 1: roundtrip test

  Add a new describe block 'write → convergence roundtrip'. Suggested test:

  ```typescript
  it('writes spec-adherence with verdict Pass and convergence reports condition_b true', async () => {
    await handleWriteArtifact(ctx, {
      type: 'cycle_summary',
      id: 'spec-adherence',
      cycle: 99,
      content: { reviewer: 'spec-reviewer', content: '## Principle Violation Verdict: Pass\n\nNone.' }
    });
    const result = await handleGetConvergenceStatus(ctx, { cycle_number: 99 });
    expect(result).toContain('condition_b: true');
    expect(result).toContain('principle_verdict: pass');
  });
  ```

  Use the existing test setup pattern (per-test fresh SQLite). Adjust signature to match actual handler exports.

  ### Part 2: ! consistency cleanup

  At tools.test.ts:613-638, the three noAdapterCtx constructions either:
  - Apply `!` on ctx.db and ctx.drizzleDb (matches rest of file), OR
  - Omit db/drizzleDb entirely (preferred per CR-M1 fix — these tests don't exercise db/drizzleDb).

  Apply the chosen approach uniformly to all three instances.
resolution: "WI-819 complete. Cycle 4 GA-II1 + CR-M1 addressed: tools.test.ts has new write→convergence roundtrip test (cycle 88) and noAdapterCtx constructions uniformly omit db/drizzleDb (option b). 1419 passing (+1), tsc clean. Incremental code-review: Pass with 2 minors (M1 test uses heading format vs canonical bold-tag, exercises step2 parser not step1; M2 omits condition_a/converged assertions present in sibling tests). Both are test-strengthening opportunities for a future cycle, not blockers."
