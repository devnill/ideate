notes: |
  # WI-905 Implementation Notes

  ## Context

  Audit findings [gap S6, S7]: work_item has no supersedes edge and domain_policy/decision can't point back to originating finding. Close both in one schema update since the pattern is similar (new source/target types on existing edge definitions).

  ## Approach

  1. In schema.ts, update supersedes entry in EDGE_TYPE_REGISTRY: broaden source_types and target_types to include work_item. Set yaml_field to 'superseded_by' with reversed-direction semantics (like addresses/amends — the field lives on the NEWER artifact pointing to the OLDER one).

  2. Update derived_from entry: add domain_policy and domain_decision to source_types; add finding to target_types. Keep guiding_principle as both a valid source and target.

  3. Indexer: derivationPath is already a field on EdgeTypeSpec (from WI-901). For supersedes and derived_from, just ensure the registry-driven extraction path picks up the new source/target types. May need to add yaml_field extraction for 'superseded_by' and 'derived_from' fields on the relevant artifact types.

  4. Curator agent: update agents/domain-curator.md to instruct the curator to include `derived_from: [F-NNN]` (or array of finding IDs) when writing a new domain_policy or domain_decision that was prompted by a specific finding.

  5. Add roundtrip tests: create a work_item with superseded_by pointing at another work_item; assert the supersedes edge is in getEdges output. Same for policy→finding via derived_from.

  ## Constraints
  - Node 22 + vitest only. No bun.
  - GP-14: no direct .ideate/ writes.
  - Do NOT break existing supersedes or derived_from usage — these are additive type extensions.

  ## Self-check
  Walk each of the 7 criteria with satisfied/unsatisfied status.
resolution: supersedes and derived_from edge types extended. EDGE_TYPE_REGISTRY.supersedes now covers work_item↔work_item (in addition to domain_decision↔domain_decision), with derivationPath:'work_item_superseded_by_field' documented. indexer.ts gained custom extraction block reading doc.superseded_by on work_item artifacts. EDGE_TYPE_REGISTRY.derived_from expanded to source_types:[domain_policy,domain_decision] and target_types:[guiding_principle,finding,domain_policy]. agents/domain-curator.md updated in sections 4.1 (Decisions) and 4.2 (Policies) instructing curator to write derived_from when authoring from findings. 6 new roundtrip tests in indexer.test.ts. 1846 tests pass, tsc clean.
