notes: |-
  ## Context
  S1 (code-reviewer) from full-audit 2026-04-09. 16 TypeScript errors in indexer.test.ts, all the same root cause: `drizzle(db)` is called without a schema parameter, producing `BetterSQLite3Database<Record<string, never>>` which is incompatible with the `DrizzleDb` type alias used across production code.

  ## Change
  Search indexer.test.ts for all occurrences of `drizzle(db)` — approximately 16, around lines 1874, 1884, 1894, 1904, 1912, 1920, 1940, 1949, 1958, 1979, 1989 (and more).

  For each occurrence, replace:
  ```typescript
  drizzle(db)
  ```
  With:
  ```typescript
  drizzle(db, { schema: dbSchema })
  ```

  You will need to import `dbSchema`. Find how other test files that use drizzle import the schema. Check `src/__tests__/adapters/writer.test.ts` or `src/__tests__/schema.test.ts` for the import pattern. Likely:
  ```typescript
  import * as dbSchema from "../db.js";
  // or:
  import { schema as dbSchema } from "../db.js";
  ```

  Match whatever import pattern already exists in the codebase.

  Do NOT modify any other files. P-49: test-only changes.
resolution: "Added import * as dbSchema from '../db.js' and replaced ~70 drizzle(db) calls with drizzle(db, { schema: dbSchema }). Resolves all 16 TS errors in indexer.test.ts."
