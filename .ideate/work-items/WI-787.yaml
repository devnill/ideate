notes: |-
  ## Implementation summary (WI-787)

  **Chosen design**: Option 1 — Budget-capped always-include.

  **Decision on 'fetch ALL nodes of type' query** (local/context.ts:225-240): kept. Dropping it would force always_include_types through PPR reachability, which changes semantics (always-include becomes PPR-boosted rather than preferentially-included). Option 1 keeps the preference-order mental model while enforcing the budget. The interface invariant documented on TraversalOptions.token_budget is: seeds are force-included; every other artifact — including always_include_types — is budget-gated.

  **Files changed**:
  - src/adapter.ts — TraversalResult gains budget_exhausted?, truncated_types?; TraversalOptions.token_budget JSDoc documents the invariant
  - src/adapters/local/context.ts — always-include loop now budget-gates non-seed nodes and populates truncated_types
  - src/adapters/remote/index.ts — client-side budget enforcement now tracks budget_exhausted and truncated_types alongside the existing seed/non-seed gating (no GraphQL schema change needed — server already accepts tokenBudget)
  - src/tools/context.ts — handleAssembleContext JSON output surfaces budget_exhausted and truncated_types when present
  - tests/adapters/always-include-types-budget.test.ts (created) — 7 regression tests: dense 50+50 workspace stays within budget, overflow signals work correctly, seed force-include preserved, AC-4 default-budget boundary holds for 16+16+arch workspace
  - src/__tests__/adapter-contract.test.ts — AC-5 contract test added to the Traversal describe block

  **GraphQL contract**: RemoteAdapter already passes tokenBudget via the existing assembleContext query. No schema extension required — server-side budget enforcement was already present; the client-side layer now also tracks the new metadata.

  **Verification**: pnpm exec tsc --noEmit clean; full suite 1395 passed / 328 skipped / 0 failed.
resolution: "Option 1 — Budget-capped always-include. LocalContextAdapter.traverse and RemoteAdapter.traverse now enforce token_budget uniformly for all non-seed artifacts, including always_include_types. Seeds remain force-included (explicit caller request). The 'fetch ALL nodes of type' query at local/context.ts was retained (kept the preference-order semantics) but the insertion loop is now budget-gated. TraversalResult gains optional budget_exhausted: boolean and truncated_types: NodeType[] fields that signal overflow so callers can detect incomplete context. handleAssembleContext surfaces these in its JSON metadata. Interface invariant documented on TraversalOptions.token_budget in adapter.ts."
