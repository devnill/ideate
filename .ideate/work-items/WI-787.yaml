criteria:
  - LocalContextAdapter.traverse enforces token_budget for both always-include and ranked artifacts — the cumulative usedTokens at end of always-include loop never exceeds token_budget without the loop exiting
  - "When always-include-types exceed the budget, the implementation: (a) stops including additional always-include artifacts once the budget would be exceeded, AND (b) returns a TraversalResult that signals the overflow via a budget_exhausted boolean or truncated_types array in metadata"
  - RemoteAdapter.traverse exhibits the same budget-enforcement behavior. If the GraphQL schema lacks a token_budget argument, this work item must extend the GraphQL contract to include it
  - Calling ideate_assemble_context without token_budget and with default include_types on a workspace containing 16 GPs + 16 constraints + architecture document returns output with total_tokens <= 60000 (default 50000 plus 20% safety margin for boundary artifacts)
  - "adapter-contract test validates that `assembleContext({ token_budget: 1000, include_types: ['guiding_principle', 'constraint'] })` returns total_tokens <= 1000 even when dozens of always-include-type artifacts exist in the workspace"
  - 'Decision recorded in work item notes: did we drop the "fetch ALL nodes of type" query at local/context.ts:225-240, or keep it and cap insertion? The chosen behavior must be documented as an interface invariant in the adapter contract documentation'
  - "Full test suite passes: pnpm test"
domain: adapter-boundary
