notes: |-
  # WI-832: Codify worker GP-14 violation recovery pattern as domain policy

  ## Origin

  Cycle 8 gap-analyst finding C8-GA-S1. Previously flagged by cycle-7 spec-reviewer as observational; upgraded to significant when it recurred in cycle 8 (WI-830 worker wrote P-86.yaml, WI-826.yaml, WI-827.yaml directly under .ideate/, and the parent autopilot session had to re-issue via MCP).

  ## Problem

  The recovery pattern — worker writes .ideate/ directly → parent autopilot re-issues via MCP — surfaces only as an inline resolution string in WI-830. No domain policy, decision, or skill instruction codifies: (a) when the pattern is acceptable vs. a defect requiring a finding; (b) what the parent should do operationally; (c) whether the minor finding tracks the violation even when mitigated.

  ## Approach

  1. Create a new domain_policy artifact (use ideate_get_next_id for next P-NN).
  2. Title: "Worker GP-14 violation — parent MCP re-sync recovery".
  3. Domain: agent-system.
  4. Rule text covers the three conditions above.
  5. Sources: WI-830, WI-832, C8-GA-S1, cycle-8 summary.
  6. Update skills/autopilot/phases/execute.md incremental-review section to reference the new policy when worker completion reports indicate direct .ideate/ writes.
  7. Write via ideate_write_artifact (GP-14 compliant).

  ## Related

  - GP-14: MCP abstraction boundary
  - P-52: Fix the tool, not bypass it
  - WI-830: First observed recurrence
  - C8-GA-S1: Current cycle gap
