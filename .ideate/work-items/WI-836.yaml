notes: |-
  # WI-836: close cycle-9 EC1 + M2 + M3

  Cycle-9 gap-analyst EC1 (Significant): the current canonical-only-selection regression test (WI-831) only covers the asymmetric case (legacy Fail masking canonical Pass). The symmetric case — legacy Pass masking a canonical Fail — is untested. If there is any residual code path that still prefers legacy files when no canonical is present, this would surface it.

  Bundled minors:
  - M2 (Test D assertion tightening): Test D currently asserts non-null on a field that should have a specific expected value. Tighten.
  - M3 (fixture id normalization): cycle 200 fixture's unsuffixed id vs cycle 204's suffixed id is inconsistent. Normalize.

  The reader.ts canonical-only filter at lines 1093-1100 already endswith /spec-adherence.yaml or /summary.yaml, so the symmetric case SHOULD return Fail correctly. This WI verifies that expectation.

  See P-86 for the canonical path provenance policy.

  No dependencies.
