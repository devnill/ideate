notes: |-
  # WI-837: close cycle-9 EC2 + M4

  ## EC2 (gap-analyst Significant)

  In src/adapters/remote/client.ts at line 278 (executeOnce), the 401 response path calls `const newToken = await this.tokenProvider();` with no try/catch. If the provider itself throws (network failure during rotation, EC2 metadata endpoint timeout, library-internal assertion), the error escapes as an uncaught promise rejection bypassing the GraphQL client's error taxonomy. Callers see a raw TypeError or ECONNREFUSED instead of a StorageAdapterError.

  Fix: wrap the call. On throw, construct a StorageAdapterError with code AUTH_FAILURE and include the underlying error's message.

  ## M4 (code-reviewer Minor)

  executeOnceWithAuth (lines 343-383, added in WI-833) calls fetch() without the try/catch wrapper that executeOnce uses at lines 261-274. A network error during the post-rotation retry propagates as raw TypeError instead of ConnectionError.

  Fix: mirror the executeOnce wrapper.

  ## Constraint

  Neither fix should make the rotation loop retryable. AUTH_FAILURE must remain outside isRetryableError's positive list (currently covers ConnectionError + INTERNAL_SERVER_ERROR/SERVICE_UNAVAILABLE/TIMEOUT).

  No dependencies.
resolution: "tokenProvider try/catch added (AUTH_FAILURE). executeOnceWithAuth fetch wrapped (ConnectionError). Tests E+F pass. 1443 total tests pass. Review: Pass with 2 minor notes (M1 test assertion, M2 json parse parity — pre-existing, out of scope)."
