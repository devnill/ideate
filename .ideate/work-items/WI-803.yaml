notes: |
  # WI-803: Remove ctx.db / LocalAdapter fallbacks from tools/context.ts (Leak 3)

  ## Background

  WI-800 cleaned write.ts and analysis.ts but did not touch tools/context.ts (Leak 3) or tools/query.ts handleArtifactQuery (Leaks 8-12 residual). The PH-045 cycle 1 capstone review surfaced these gaps:
  - WI-803 (this WI): tools/context.ts cleanup — ~10 ctx.db fallback branches.
  - WI-804: tools/query.ts handleArtifactQuery cleanup — 6 ctx.db.prepare calls in runFilterMode/runGraphMode.
  - WI-805: tools/metrics.ts handleGetMetrics cleanup — Leak 7 (adapter call is no-op gate; data fetch is ctx.db).

  **Correction**: an earlier version of these notes claimed WI-800 cleaned query.ts. That was inaccurate — only handleGetNextId was cleaned in query.ts. WI-804 carries the residual scope.

  ## Scope

  - tools/context.ts: every handler must call getAdapter(ctx) at the top and operate exclusively against the adapter interface. No conditional `if (ctx.adapter) { ... } else { ctx.db ... }` branches.
  - Two test cases in tools.test.ts currently use inline `ctx.adapter = undefined;` to force the SQLite path:
    1. 'throws when phase node exists but phases extension row is missing' (~line 331)
    2. 'returns Content not available when file_path points to nonexistent file' (~line 399)
    Both assertions reflect SQLite-implementation details, not adapter-interface contract. Either rewrite them to drive the adapter directly (e.g. seed a phase node without the extension row via the adapter) or, if the assertion is no longer meaningful at the adapter boundary, delete it and document why.

  ## Acceptance details

  Match the pattern established in write.ts:
  ```ts
  function getAdapter(ctx: ToolContext) {
    if (!ctx.adapter) {
      throw new Error('context.ts: ToolContext.adapter is required. ...');
    }
    return ctx.adapter;
  }
  ```

  Enforces invariants 1 and 2 from RF-clean-interface-proposal §1 for the context.ts surface.

  ## References

  - WI-800 (parent — adapter cleanup for write/analysis only; query.ts and context.ts deferred)
  - WI-804 (sibling — query.ts cleanup)
  - WI-805 (sibling — metrics.ts Leak 7)
  - RF-clean-interface-proposal §1
  - Cycle 1 capstone review of PH-045 (code-quality.yaml, spec-adherence.yaml, gap-analysis.yaml in cycles/001/)
resolution: Removed all ctx.db/ctx.drizzleDb fallback branches from tools/context.ts. Added getAdapter(ctx) helper at module top matching write.ts pattern. Six handler functions now call getAdapter at entry. Two SQLite-fallback test cases in tools.test.ts deleted (Option B — SQLite-fallback-specific behaviors no longer apply at adapter boundary). 1394 tests pass; tsc clean.
