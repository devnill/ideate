notes: |
  # WI-820: Add test for selectAdapter local-backend null-db guard

  ## Why

  Cycle 4 GA-EC1 (minor): the guard at server.ts:74 (`if (!db || !drizzleDb) throw new Error('Local backend requires db and drizzleDb')`) was added during WI-815 rework but has no test. The remote-backend throw paths in remote-adapter.test.ts are tested; the local null-db path is not.

  ## Implementation

  In mcp/artifact-server/src/__tests__/remote-adapter.test.ts, add one test:

  ```typescript
  it('throws when local backend is selected without db/drizzleDb', () => {
    expect(() => selectAdapter(tmpDir, undefined, undefined, { backend: 'local', remote: undefined }))
      .toThrow(/Local backend requires db and drizzleDb/);
  });
  ```

  Adjust the call signature to match the actual selectAdapter export in src/server.ts. The throw is at server.ts:74.
