notes: |
  # WI-806: Fix ideate_get_convergence_status condition_b false from legacy cycle artifacts

  ## Symptom

  `ideate_get_convergence_status` returns `condition_b: false` even when the current autopilot cycle's reviewer artifacts (code-quality.yaml, spec-adherence.yaml, gap-analysis.yaml) all show `verdict: Pass`. This blocks autopilot convergence indefinitely.

  ## Discovered

  Autopilot run on 2026-04-14. Workspace cycle directory `cycles/002/` contained a March 29 archive `SA-002.yaml` with `verdict: Fail`, which collided with autopilot's internal cycle 2. The convergence checker read the legacy file's verdict instead of (or in addition to) the current cycle's `spec-adherence.yaml` verdict.

  ## Root cause

  Autopilot's internal cycle numbering (1, 2, 3, ...) reuses workspace cycle directory slots that may already contain unrelated archived artifacts using the legacy ID-naming convention (`SA-NNN.yaml`, `CQ-NNN.yaml`, `GA-NNN.yaml`). The convergence checker's parser does not distinguish between current-cycle named files and legacy archived files.

  ## Fix options (from triage)

  **Option a**: Convergence checker disambiguates by content date / source / session-id.
  - Pros: Robust against any future collision pattern.
  - Cons: Requires schema changes to embed session/timestamp metadata in reviewer artifacts; touches multiple producers.

  **Option b**: Autopilot maps internal cycle numbers to next-available workspace cycle slots.
  - Pros: Avoids slot collision entirely.
  - Cons: Breaks the simple cycle-number invariant; complicates resume/journal lookup; touches autopilot state and possibly all skills that reference `{cycle_number}`.

  **Option c (recommended)**: Convergence checker reads only the named files (`code-quality.yaml`, `spec-adherence.yaml`, `gap-analysis.yaml`) and ignores legacy ID-named files (`SA-NNN`, `CQ-NNN`, `GA-NNN`).
  - Pros: Smallest blast radius; one module changes; legacy artifacts remain readable for historical inspection.
  - Cons: None significant — ID-named files were already a deprecated/legacy pattern.

  Default recommendation is option **c** unless review surfaces a reason to prefer a or b.

  ## Reproducer

  1. Initialize a workspace cycle directory `cycles/N/` containing a legacy `SA-NNN.yaml` with `verdict: Fail`.
  2. Run autopilot. When autopilot's internal cycle reaches N, it writes its own `spec-adherence.yaml` with `verdict: Pass` into the same directory.
  3. Call `ideate_get_convergence_status({cycle: N})`.
  4. Observed: `condition_b: false` (incorrect — both Fail and Pass are read, Fail wins).
  5. Expected: `condition_b: true` (only the current named file should be consulted).

  ## Suggested implementation (option c)

  - Locate the convergence-status implementation in `mcp/artifact-server/src/` (likely `convergence.ts` or similar).
  - Restrict the file scan to the literal filenames `code-quality.yaml`, `spec-adherence.yaml`, `gap-analysis.yaml` only.
  - Add a regression test that places both a legacy `SA-NNN.yaml` (Fail) and a current `spec-adherence.yaml` (Pass) in the same cycle directory and asserts `condition_b: true`.

  ## Out of scope

  - Migrating or deleting legacy ID-named files. They remain readable.
  - Changes to artifact archive layout.
  - Cycle-numbering scheme changes.
resolution: "Duplicate of WI-797 (already done in PH-045 cycle 1). The fix is implemented at mcp/artifact-server/src/adapters/local/reader.ts:954-960 (option c — canonical spec-adherence.yaml is preferred over legacy SA-NNN.yaml in the same cycle directory). Two regression tests pass: (1) tools.test.ts:856 'regression WI-797: canonical spec-adherence.yaml (Pass) wins over legacy SA-NNN.yaml (Fail) in same cycle dir' and (2) tools.test.ts:888 'regression WI-797 (adapter path): canonical spec-adherence.yaml (Pass) wins over legacy SA-NNN.yaml (Fail) via LocalAdapter.getConvergenceData'. Verified 2026-04-14 via `pnpm vitest run -t WI-797`. No further action required."
