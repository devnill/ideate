notes: |-
  ## Implementation

  Replace the stale max_nodes description at adapter-contract.md:223 (current text describes max_nodes as a PPR computation input, which was true before WI-789).

  ## Reference

  - D-210 (domain_decision, workflow): max_nodes is a post-sort result-count cap at the adapter traverse layer
  - F-CYCLE-28-II1 (finding from cycle 28 gap-analyst)
  - ppr.ts: computePPR returns all reachable nodes ranked by score
  - adapters/local/context.ts:260-262: `ranked = ranked.slice(0, maxNodes)` applies the cap after sort
  - adapters/remote/index.ts:848-849: client-side slice on the remote adapter for the same observable behavior

  ## Suggested new wording

  Describe max_nodes as: 'Optional upper bound on the number of ranked nodes returned to the caller. Applied as a post-sort slice at the adapter traverse layer after PPR scoring completes. Seed nodes and always_include_types are not counted against this cap. Implementations MUST guarantee ranked_nodes.length <= max_nodes when max_nodes is provided and > 0; ordering below the cap is implementation-defined (see D-5 for adapter-comparison guidance).'

  Exact wording is at the executor's discretion as long as it satisfies the acceptance criteria and does not contradict D-210 or D-5.
