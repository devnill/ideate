notes: |-
  ## Background

  RF-clean-interface-proposal Leak 5-6 (CRITICAL). tools/execution.ts uses ctx.db.prepare() directly at lines 18, 34, 179, 186, 193, 197. This is the ONLY tool handler with no adapter path — the existing dual-path pattern (`if (ctx.adapter) { ... } else { ctx.db.prepare() }`) never landed here. When ctx.adapter is RemoteAdapter, these SQL statements target a non-existent sqlite instance and crash.

  ## Approach

  RF-clean-interface-proposal recommends composition — no new adapter methods. Use:
  - queryNodes({ type: 'work_item' }) to enumerate work items
  - getNodes(ids) or getNode(id) to fetch full content
  - queryNodes({ type: 'finding', filters: { cycle, work_item } }) for incremental review findings
  - queryNodes({ type: 'journal_entry' }) for journal scans

  Before edits, list every distinct SQL query in execution.ts and map each to its StorageAdapter equivalent. If any query cannot be expressed via composition, stop and flag the gap before adding a new adapter method — such a gap belongs in a follow-up work item, not this one.

  ## Equivalence test

  Create tests/adapters/execution-status-equivalence.test.ts matching the pattern of other equivalence tests: seed a temp LocalAdapter and a mock RemoteAdapter with the same Node/Edge set, run handleGetExecutionStatus through each, assert equal output shapes (completed/pending/blocked sets).

  ## Parallelism

  This item has no file overlap with WI-785 or WI-787. Can run in parallel with WI-785.
