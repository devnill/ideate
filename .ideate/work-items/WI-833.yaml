notes: |-
  # WI-833: Add regression test for AdapterConfig.tokenProvider 401 rotation path

  ## Origin

  Cycle 8 gap-analyst finding C8-GA-S2. AdapterConfig.tokenProvider was documented in cycle 8 (adapter-interface.md Section 7, per WI-829) but no regression test covers the 401 → tokenProvider → retry code path in client.ts:276-290.

  ## Problem

  TokenProvider is a security-adjacent fallback: when the server returns 401, the client calls tokenProvider() to obtain a fresh token and retries once. Without a test, a regression (e.g., the retry silently dropping the new token, or the null-return path not throwing) would not be detected.

  ## Approach

  1. Read /Users/dan/code/ideate/mcp/artifact-server/src/adapters/remote/client.ts:276-290 to confirm current rotation logic.
  2. Identify test harness in /Users/dan/code/ideate/mcp/artifact-server/src/__tests__/remote-adapter.test.ts — reuse its mock-HTTP pattern.
  3. Write test cases:
     a. Happy path: 401 → tokenProvider returns "new-token" → retry with new Authorization header → 200.
     b. tokenProvider returns null → client throws.
     c. tokenProvider returns undefined → client throws (normalize to null path).
     d. Rotation called at most once per request (no infinite retry loop).
  4. Run vitest and tsc; confirm pass.

  ## Related

  - adapter-interface.md:787-790 (AdapterConfig docs)
  - client.ts:276-290 (implementation)
  - C8-GA-S2 (gap finding)
resolution: "Added 4 regression tests for tokenProvider 401 rotation path in remote-adapter.test.ts. Tests exposed a production bug (S1): token rotation ConnectionError was retryable, causing 3x tokenProvider invocation. Rework fixed client.ts:284 to throw StorageAdapterError(AUTH_FAILURE) — not in retryable list — preserving the documented once-per-request invariant. Tests B/C now correctly assert toHaveBeenCalledTimes(1). Full suite 1440 pass, tsc clean."
