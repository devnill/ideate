notes: |-
  # WI-909 Implementation Notes

  Audit finding [gap S2]: ppr.ts loads entire edges table on every traverse(). At current scale (~thousands of edges) it works; at 10x scale it will dominate latency.

  ## Approach

  Option (a) seed-reachable BFS pre-filter is cleaner but requires careful handling of CONTAINMENT_EDGE_TYPES exclusion. Option (b) threshold+warn is simpler and defers the actual optimization to when observed.

  Recommend: implement (a). BFS from seeds outward using edge indexes (idx_edges_source_id, idx_edges_target_id already exist per WI-171). Follow edges while respecting CONTAINMENT_EDGE_TYPES exclusion. Build subgraph of all reachable nodes within max_hops. Run PPR on subgraph only.

  max_hops from config.ppr.max_hops (add to config schema if missing; default 4). Document in ppr.ts comment.

  Preserve the log warning for edge count above threshold — even with BFS, a highly-connected seed can still reach a large subgraph.

  ## Constraints
  - Node 22 + vitest only.
  - Preserve PPR score semantics for existing test graphs.
  - CONTAINMENT_EDGE_TYPES guard already in place; BFS must not traverse containment edges.

  ## Self-check
  Walk each of the 5 criteria with satisfied/unsatisfied status.
resolution: ppr.ts computePPR no longer loads full edges table. bfsReachableNodes function traverses from seeds using idx_edges_source/target indexes with CONTAINMENT_EDGE_TYPES.has() skip. Visited node IDs collected into Set; allEdges filtered to edges where both endpoints are in the set. MAX_HOPS=4 hardcoded named constant. log.debug emits edge count + visited nodes per traverse. computePPR signature updated to accept rawDb parameter (callers in context.ts updated). Small-graph tests preserve scores. 3 new BFS-pre-filter tests incl. disconnected-subgraph assertion. 1877 tests pass.
