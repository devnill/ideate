criteria:
  - "PPR traverse() no longer loads the entire edges table via a single drizzleDb.select().from(edges).all() call. Instead: either (a) seed-reachable BFS pre-filter that fetches only edges reachable within max_hops of the seed set (default max_hops: registry-driven or 4), OR (b) explicit edge-count threshold with log.warn when exceeded plus documented O(E) fallback"
  - "Default PPR behavior preserved for small graphs (<1000 edges): same score output given same inputs"
  - "Regression test: a seeded graph with 100+ disconnected subgraphs — assert PPR processes only the seed-connected subgraph, not the full set (measurable via edge-fetch count or query plan inspection)"
  - log.info or log.debug emits edge-count observed per traverse() call so operators can diagnose scaling
  - Full vitest suite passes; tsc --noEmit passes
