notes: |-
  # WI-841: 401-without-tokenProvider test + AUTH_FAILURE doc update

  Two purely additive fixes from cycle-3 capstone.

  ## Test G (EC1)
  Add to the tokenProvider 401 rotation describe block:
  ```typescript
  it("Test G: 401 without tokenProvider → StorageAdapterError with AUTH_FAILURE", async () => {
    const client = new GraphQLClient("http://fake-endpoint/graphql");
    vi.spyOn(globalThis, "fetch").mockResolvedValue(
      new Response(null, { status: 401, statusText: "Unauthorized" })
    );
    await expect(client.query("{ result }")).rejects.toSatisfy((err: unknown) => {
      return err instanceof StorageAdapterError &&
        (err as StorageAdapterError).code === "AUTH_FAILURE" &&
        (err as StorageAdapterError).message.includes("fake-endpoint");
    });
  });
  ```

  ## Doc update (MI1)
  adapter-contract.md AUTH_FAILURE section:
  - Change description from 'Authentication failed after token rotation attempt' to 'Authentication failure — with or without token rotation'
  - Add trigger 3: 'No `tokenProvider` is configured and the endpoint returns 401 Unauthorized'
  - Update attribution: 'Introduced in WI-833. Trigger surface expanded in WI-837 (tokenProvider throw path) and WI-840 (no-tokenProvider 401 path).'

  adapter-interface.md Section 5.3: same third trigger and attribution update.

  No dependencies.
resolution: All 4 acceptance criteria satisfied. Test G added (1444 tests pass), AUTH_FAILURE docs updated with third trigger and attribution in both adapter-contract.md and adapter-interface.md.
