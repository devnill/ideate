notes: |-
  ## Context

  Cycle 22 spec-reviewer flagged a P-75 violation: `expect(expectedCodes).toHaveLength(19)` asserts the length of a locally-defined fixture array. This passes regardless of whether the system under test actually produces those codes.

  ## Implementation

  At line ~869, `expectedCodes` is a locally-defined array of error code strings. The `.toHaveLength(19)` assertion just verifies the array literal has 19 entries — vacuously true.

  Replace with one of:

  **Option A (preferred)**: Remove the length assertion entirely. The individual test cases already verify each error code. The array exists as documentation, not as a test — asserting its length adds no value.

  **Option B**: Replace with a check that every code in `expectedCodes` appears in at least one test's `.toMatchObject({ code: ... })` assertion. This is more complex and may not be worth the effort.

  **Option C**: Assert that `expectedCodes` covers all error codes that ValidatingAdapter can throw for LocalAdapter methods. This requires querying the ValidatingAdapter source, which couples the test to implementation.

  Option A is the simplest and most aligned with P-75's intent: don't assert fixture properties, test live behavior.
resolution: Removed vacuous expect(expectedCodes).toHaveLength(19) assertion from local-adapter-validation.test.ts per P-75. Individual test cases already verify each error code. All 50 tests in file pass.
