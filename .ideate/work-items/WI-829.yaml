  - No code changes to adapter.ts, reader.ts, remote/index.ts.
  - Do not modify architecture-overview.md (that's WI-828's scope).
  - Do not add contract tests for work_item/phase filters (that's WI-830's scope).

  ## Approach
  1. Read adapter.ts lines 43, 198–208, 463 for authoritative signatures.
  2. Read reader.ts:538–655 and remote/index.ts:1132–1149 for behavior spec source.
  3. Read adapter-interface.md current state to locate insertion points.
  4. Read adapter-contract.md NodeType union block.
  5. Apply targeted edits.
