  ## Scope

  ### adapter-interface.md

  **Section 3 — add method signature:**
  ```typescript
  getMetricsEvents(filter?: NodeFilter): Promise<MetricsEventRow[]>;
  ```
  Place after getDomainState in the interface block.

  **Section 4 — add 4.8 behavior spec:**
  Document: cycle filter (SQL-side LocalAdapter / TypeScript-side RemoteAdapter per D-210), agent_type filter (payload.agent_type JSON match), work_item filter (payload.work_item match), phase filter (payload.phase match), combined filters compose AND, empty result returns [], MetricsEventRow shape { node: NodeMeta, properties: MetricsEventProperties }. Reference D-210 for the RemoteAdapter two-round-trip rationale.

  **Section 5.2 — add error row:**
  | getMetricsEvents | Never — returns [] | Standard client.query transport errors for RemoteAdapter |

  **NodeFilter (line 142):**
  Extend to include agent_type, phase, work_item, work_item_type. Match the authoritative definition in adapter.ts:198–208.

  **Section 7 (line 722):**
  Rename createAdapter to selectAdapter. Match server.ts:65.

  ### adapter-contract.md

  **NodeType union (lines 643–673):**
  Add 'autopilot_state' to the union. Match adapter.ts:43 and ALL_NODE_TYPES.

