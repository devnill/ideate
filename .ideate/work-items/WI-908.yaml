notes: |-
  # WI-908 Implementation Notes

  ## Context

  Cycle 80 capstone found 4 Significants. WI-905 delivered functional behavior but left contract drift between EDGE_TYPE_REGISTRY and the actual extraction implementation, plus a missing column on domain_decisions and an omitted source type on derived_from.

  ## Fixes (in order)

  ### 1. supersedes registry cleanup (choose option a)

  In schema.ts EDGE_TYPE_REGISTRY.supersedes: change source_types back to ["domain_decision"]. Keep target_types as ["domain_decision", "work_item"] since supersedes CAN target a work_item. Keep derivationPath:"work_item_superseded_by_field" — this is the correct documentation for the fact that work_item extraction goes through the hand-wired indexer block, not the registry's yaml_field path.

  In schema.test.ts: assert `EDGE_TYPE_REGISTRY.supersedes.source_types` does NOT include "work_item" and DOES have derivationPath set.

  ### 2. domain_decisions derived_from column

  In db.ts: add `derived_from: text("derived_from")` to the domainDecisions Drizzle table (mirror domainPolicies).

  In schema.ts: add `derived_from TEXT` to the domain_decisions DDL in createSchema.

  Bump CURRENT_SCHEMA_VERSION from 7 to 8.

  Add migrations.ts entry v7→8 with a no-op migrate function and description: "Added domain_decisions.derived_from column. Additive DDL, no data transform needed; existing rows get NULL derived_from which is correct (decisions authored before WI-905 had no such field)."

  In indexer.ts buildExtensionRow for domain_decisions: include derived_from from the parsed YAML — mirror the domain_policies path exactly.

  Add migration test covering v7→8 transition (chain from v5 or v6 through v8).

  ### 3. guiding_principle in derived_from.source_types

  In schema.ts EDGE_TYPE_REGISTRY.derived_from: change source_types from ["domain_policy", "domain_decision"] to ["domain_policy", "domain_decision", "guiding_principle"].

  Add regression test in schema.test.ts.

  Add indexer.test.ts roundtrip: create a guiding_principle with derived_from pointing at another principle or finding, assert derived_from edge emits.

  ### 4. Registry-driven negative test

  In indexer.test.ts: add a "registry source_types enforcement" describe block. For each of supersedes and derived_from: create an artifact of a node type NOT in source_types, set the yaml_field, rebuild index, assert zero edges of that type are emitted.

  This prevents future source_types omissions from going undetected.

  ## Constraints

  - Node 22 + vitest only. No bun.
  - GP-14: no .ideate/ writes from code.
  - Schema version bump must include migration entry (per WI-892 pattern).
  - Do NOT touch ppr.ts — WI-906 is done.
  - Do NOT touch agents/domain-curator.md — WI-905's instruction is adequate per spec review.

  ## Self-check

  Walk each of the 8 criteria with satisfied/unsatisfied status. Report grep confirming registry state.
resolution: "Closed 4 Significants from cycle 80 capstone. supersedes.source_types reverted to ['domain_decision'] (work_item removed; extraction is via derivationPath side-channel). domain_decisions.derived_from TEXT column added via migration v7→8 (ALTER TABLE with idempotency guard); CURRENT_SCHEMA_VERSION and CONFIG_SCHEMA_VERSION bumped 7→8; DomainDecision interface + indexer buildExtensionRow updated. derived_from.source_types extended to include guiding_principle. Registry-driven negative tests added: finding with supersedes field produces 0 supersedes edges; work_item with derived_from field produces 0 derived_from edges. 1854 tests pass, tsc clean."
