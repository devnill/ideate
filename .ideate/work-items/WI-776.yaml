notes: |-
  ## Context
  Cycle 23 gap analysis found that ValidatingAdapter.traverse validates alpha, max_iterations, token_budget, seed_ids, always_include_types — but NOT convergence_threshold or max_nodes. These two parameters bypass the validation layer and rely solely on ppr.ts defense-in-depth.

  ## Implementation
  Add two validation blocks to ValidatingAdapter.traverse, after the existing token_budget check (line ~326) and before the always_include_types check:

  ```typescript
  // convergence_threshold: if provided, must be a positive number
  if (options.convergence_threshold !== undefined) {
    if (typeof options.convergence_threshold !== 'number' || options.convergence_threshold <= 0) {
      throw new ValidationError(
        `convergence_threshold must be a positive number, received ${options.convergence_threshold}`,
        'INVALID_CONVERGENCE_THRESHOLD',
        { value: options.convergence_threshold }
      );
    }
  }

  // max_nodes: if provided, must be a non-negative integer
  if (options.max_nodes !== undefined) {
    if (!Number.isInteger(options.max_nodes) || options.max_nodes < 0) {
      throw new ValidationError(
        `max_nodes must be a non-negative integer, received ${options.max_nodes}`,
        'INVALID_MAX_NODES',
        { value: options.max_nodes }
      );
    }
  }
  ```

  Follow the exact pattern of existing traverse validations. Error messages and codes must match the defense-in-depth versions in ppr.ts.

  ## Tests
  Add tests in the traverse describe block of validating.test.ts. Pattern matches existing tests like the alpha boundary tests.
