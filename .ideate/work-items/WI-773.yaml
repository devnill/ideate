notes: |-
  ## Context

  Cycle 22 review found that WI-771 removed inline validation from writer.ts but missed context.ts. context.ts contains full traverse input validation that duplicates ValidatingAdapter. Additionally, ValidatingAdapter accepts alpha=0 but both context.ts and ppr.ts reject it — the PPR formula with alpha=0 means zero seed influence, which is semantically useless.

  ## Implementation

  ### 1. Fix ValidatingAdapter alpha boundary (validating.ts)

  Line ~297: change `options.alpha < 0` to `options.alpha <= 0`. This tightens the range from [0,1] to (0,1], matching ppr.ts:110.

  Update the error message to say "alpha must be in (0, 1]" instead of "[0, 1]".

  ### 2. Remove context.ts traverse validation (context.ts)

  Remove lines 176-265 — the entire validation block before `computePPR` is called. This includes:
  - seed_ids validation (lines 176-199): INVALID_SEED_IDS, EMPTY_SEED_IDS, INVALID_SEED_ID
  - always_include_types validation (lines 201-219): INVALID_ALWAYS_INCLUDE_TYPE
  - token_budget validation (lines 222-229): INVALID_TOKEN_BUDGET
  - alpha validation (lines 231-238): INVALID_ALPHA
  - max_iterations validation (lines 240-247): INVALID_MAX_ITERATIONS
  - convergence_threshold validation (lines 249-256): INVALID_CONVERGENCE_THRESHOLD
  - max_nodes validation (lines 258-265): INVALID_MAX_NODES

  Keep the destructuring (lines 160-174) and the computePPR call (line 268+).

  Remove any now-unused imports (ALL_NODE_TYPES if only used for validation, ValidationError if no other throws remain).

  Note: ppr.ts retains its own alpha, maxIterations, convergenceThreshold checks as algorithm-level defense-in-depth. Do NOT remove those.

  ### 3. Update validating.test.ts alpha test

  Find the test 'accepts alpha=0 (boundary)' (around line 794). Change it to:
  - Expect StorageAdapterError with code INVALID_ALPHA for alpha=0
  - The test name should be 'rejects alpha=0 (exclusive lower bound)'

  ### 4. Update seed-ids-validation.test.ts

  Import ValidatingAdapter from validating.ts. In the test setup, wrap the LocalAdapter:
  ```typescript
  const rawAdapter = new LocalAdapter({ db, drizzleDb, ideateDir });
  const adapter = new ValidatingAdapter(rawAdapter);
  ```
  Use `adapter` for all test calls. All existing assertions should continue to pass since ValidatingAdapter throws the same error codes (INVALID_SEED_IDS → maps to INVALID_SEED_IDS, EMPTY_SEED_IDS, INVALID_SEED_ID).

  Note: ValidatingAdapter uses INVALID_SEED_ID for individual invalid seeds (same as context.ts). Check that the error code assertions match.

  ### 5. Update always-include-types-validation.test.ts

  Same wrapping pattern. Key difference: error code changes from INVALID_ALWAYS_INCLUDE_TYPE to INVALID_NODE_TYPE (ValidatingAdapter's name for this check). Update all `expect(...).toHaveProperty('code', 'INVALID_ALWAYS_INCLUDE_TYPE')` to use `'INVALID_NODE_TYPE'`.

  Also check validation ordering — ValidatingAdapter validates seed_ids and alpha before always_include_types. If any test sends invalid values for multiple fields simultaneously, the first error caught may differ. Adjust test inputs to isolate the always_include_types validation (use valid values for all other fields).
resolution: Removed all traverse inline validation from context.ts (lines 176-265). Tightened ValidatingAdapter alpha check from [0,1] to (0,1] matching ppr.ts. Updated validating.test.ts alpha=0 test to expect rejection. Wrapped LocalAdapter in ValidatingAdapter in seed-ids-validation.test.ts and always-include-types-validation.test.ts. Fixed 2 out-of-scope test files (ppr.test.ts, remote-adapter-validation.test.ts) that depended on removed validation. No backfill needed — runtime validation behavior only.
