notes: |
  # WI-804: Remove ctx.db fallback from query.ts handleArtifactQuery

  ## Background

  WI-800 commit message claimed query.ts ctx.db fallbacks were removed. This is false: only handleGetNextId was cleaned. handleArtifactQuery line 799 retains a live else-branch that routes to runFilterMode/runGraphMode, both of which call ctx.db.prepare directly.

  Flagged by all three capstone reviewers in PH-045 cycle 1 (code-reviewer S1, spec-reviewer S1, gap-analyst S1).

  ## Scope

  - Mirror the write.ts pattern: getAdapter(ctx) helper at the top of the module, throw on missing adapter, no fallback.
  - Delete runFilterMode, runGraphMode, buildSummaryMap (they exist only as the fallback path).
  - Update the misleading 'Test-only fallback path' comments at lines 243/371 by removing the functions they document.
  - Update or remove any test that asserted SQLite-path-specific behavior of handleArtifactQuery.

  ## References

  - WI-800 (parent — partial cleanup)
  - WI-803 (sibling — covers context.ts only)
  - RF-clean-interface-proposal §1 invariant 2
  - PH-045 cycle 1 capstone reviews (code-quality.yaml, spec-adherence.yaml, gap-analysis.yaml in cycles/001/)
resolution: Removed all ctx.db references from tools/query.ts. Deleted runFilterMode, runGraphMode, runGraphDepth1, runGraphRecursive, executeTraversalQuery, buildEdgeTypeFilter, buildSummaryMap, plus dead supporting code (hasColumn, CYCLE_SCOPED_ID_TYPES, FilterModeRow/FilterModeResult/RawRow/GraphModeResult interfaces, 'Test-only fallback path' comments). Added getAdapter(ctx) helper at module top; replaced inline guard in handleGetNextId. handleArtifactQuery now uses adapter-only path. No test changes needed — all handleArtifactQuery tests already drove the adapter via top-level beforeEach. 1394 tests pass; tsc clean.
