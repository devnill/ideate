notes: |-
  ## Implementation Approach

  Same pattern as WI-771 but for RemoteAdapter. Search remote/index.ts for all `throw new ValidationError` calls and remove the input validation blocks.

  Specific locations to modify:
  - `putNode()`: Remove id/type/properties/cycle validation
  - `patchNode()`: Remove id/immutable-field validation
  - `deleteNode()`: Remove id validation
  - `putEdge()`: Remove source_id/target_id/edge_type validation
  - `removeEdges()`: Remove source_id/edge_types validation
  - `batchMutate()`: Remove empty-batch check and per-node input validation
  - Query methods: Remove limit/offset validation

  ### RemoteAdapter-specific considerations
  RemoteAdapter sends validated inputs over GraphQL. The server may perform its own validation. With the ValidatingAdapter wrapper, inputs are guaranteed valid before the network call, which reduces unnecessary round-trips for invalid inputs.

  ### Test file update
  Update remote-adapter-validation.test.ts similarly:
  ```typescript
  const raw = new RemoteAdapter(config);
  const adapter = new ValidatingAdapter(raw);
  // Existing validation tests should still pass through the wrapper
  ```

  The remote validation tests use mocked fetch responses, so no network dependency.
