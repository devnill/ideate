notes: |-
  ## Implementation Approach

  Search writer.ts for all `throw new ValidationError` calls and remove the validation blocks. The methods should assume inputs are already validated by the wrapper.

  Specific locations to modify:
  - `putNode()`: Remove id/type/properties/cycle validation blocks
  - `patchNode()`: Remove id/immutable-field validation blocks
  - `deleteNode()`: Remove id validation
  - `putEdge()`: Remove source_id/target_id/edge_type validation
  - `removeEdges()`: Remove source_id/edge_types validation
  - `batchMutate()`: Remove empty-batch check and per-node input validation (keep DAG cycle detection and scope collision detection — those are business logic, not input validation)
  - Query methods: Remove limit/offset validation

  ### Important distinction
  Keep business-logic validation that only LocalAdapter can perform:
  - DAG cycle detection in batchMutate (requires graph state)
  - Scope collision detection in batchMutate (requires file scope analysis)
  - These are NOT input validation — they are domain-invariant checks

  ### Test file update
  Update local-adapter-validation.test.ts to wrap the LocalAdapter in ValidatingAdapter:
  ```typescript
  const raw = new LocalAdapter(config);
  const adapter = new ValidatingAdapter(raw);
  // All existing validation assertions should still pass
  ```
