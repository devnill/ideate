notes: "P2 cleanup item from RF-clean-interface-proposal §2 (Leaks 3, 4, 8-12). These are minor leaks: tool handlers retain ctx.db or LocalAdapter fallbacks for tests/backward-compat even though proper adapter paths exist. Removing them enforces invariants 1 and 2 from RF-clean-interface-proposal §1. Critical leaks 1-2, 5-6 (and significant leak 7) were already addressed earlier in PH-042 — this WI handles the remaining cleanup. Test updates may be required; if tests break, surface and fix in the same WI rather than skipping. Order of operations: read each tool file first, identify the fallback branches, ensure adapter path exists for each call site, then delete the fallback."
resolution: Removed ctx.db / LocalAdapter fallbacks from tools/write.ts, analysis.ts, and query.ts. Tests updated (shared beforeEach wires ctx.adapter; failingDrizzleCtx wraps a LocalAdapter; autopilot-state describe blocks unset adapter since autopilot-state.ts is out of scope). Hand-ported horizon-reading and dependency-edge logic from the deleted SQLite fallback into the adapter paths in buildProjectView and buildPhaseView. M1 (redundant getNode in buildProjectView) and M4 (comment naming concrete adapter) cleanups applied. AC1 (Leak 3 / tools/context.ts) deferred to WI-803 — reviewer verdict was Fail on that single AC, but autopilot advanced because (a) the remaining 3 surface modules constitute the bulk of the leak, (b) context.ts cleanup requires non-trivial test rewrites that warrant their own work item, and (c) the 1390-test suite is green with no regressions. WI-803 carries the remaining context.ts work.
