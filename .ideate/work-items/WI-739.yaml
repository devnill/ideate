criteria:
  - The sync test for ALL_NODE_TYPES no longer uses a hardcoded list of expected values
  - The test includes a compile-time check (TypeScript type assertion) that `ALL_NODE_TYPES` contains every member of the `NodeType` union — adding a value to `NodeType` without adding it to `ALL_NODE_TYPES` causes a TypeScript compile error
  - The test includes a runtime check that `ALL_NODE_TYPES` has no duplicate entries
  - All existing tests pass
domain: artifact-structure
phase: null
notes: |-
  ## Context
  S2 (code-reviewer) + SF1 (gap-analyst) from full-audit 2026-04-09. Policy P-59 (amended 2026-04-09) requires the sync test to use a structural comparison, not a hardcoded expected list. The current test at lines 400-435 compares `ALL_NODE_TYPES` against a hardcoded `expectedTypes` array — if both the union and the array gain a new member simultaneously, the test passes without checking whether the sync is maintained.

  ## Change

  At the test location (lines 400-435), replace the hardcoded comparison with:

  **Compile-time check (TypeScript):**
  ```typescript
  // Compile-time exhaustiveness: every NodeType must appear in ALL_NODE_TYPES.
  // If a new NodeType member is added without updating ALL_NODE_TYPES, this line
  // produces: "Type 'X' is not assignable to type 'never'"
  type _ExhaustiveCheck = Exclude<NodeType, typeof ALL_NODE_TYPES[number]> extends never
    ? true
    : false;
  const _nodeTypeExhaustive: _ExhaustiveCheck = true;
  ```

  **Runtime check:**
  ```typescript
  it("ALL_NODE_TYPES contains every NodeType value with no duplicates", () => {
    // No duplicates
    expect(new Set(ALL_NODE_TYPES).size).toBe(ALL_NODE_TYPES.length);
    // Runtime length sanity check — update this number when NodeType grows
    // (the compile-time check above is the primary enforcement)
    expect(ALL_NODE_TYPES.length).toBeGreaterThan(0);
  });
  ```

  Import `NodeType` and `ALL_NODE_TYPES` from the adapter module if not already imported.

  The `_ExhaustiveCheck` compile-time assertion is the primary P-59 enforcement: TypeScript will report a type error if `NodeType` has a member not in `ALL_NODE_TYPES`, because `Exclude<NodeType, typeof ALL_NODE_TYPES[number]>` would be non-never. The runtime check adds defense-in-depth against duplicate entries.

  Remove or comment out the hardcoded `expectedTypes` array and the test that compared against it.

  P-49: test-only changes.
resolution: Replaced 27-item hardcoded expectedTypes array with TypeScript exhaustiveness check (Exclude<NodeType, typeof ALL_NODE_TYPES[number]> extends never) and runtime Set.size no-duplicates assertion. P-59 compliance restored structurally.
