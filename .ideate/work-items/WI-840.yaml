notes: |-
  # WI-840: Fix ConnectionError retryability in GraphQL client

  Bundles 3 significant findings from cycle-2 capstone review.

  ## Root cause
  isRetryableError returns true for all ConnectionError instances. Two throw sites produce non-transient errors as ConnectionError:
  1. executeOnceWithAuth network failure (line ~366) — post-rotation path should not be retried by outer loop
  2. 401 without tokenProvider (line ~300) — auth failure is not transient

  ## Fix for S1 (executeOnceWithAuth)
  Change the catch block to throw StorageAdapterError with code 'CONNECTION_ERROR' instead of ConnectionError:
  ```typescript
  } catch (err) {
    throw new StorageAdapterError(
      `Post-rotation request failed: ${this.endpoint} - ${err instanceof Error ? err.message : "Unknown error"}`,
      "CONNECTION_ERROR"
    );
  }
  ```
  isRetryableError checks `instanceof ConnectionError` — a base StorageAdapterError with code 'CONNECTION_ERROR' does NOT match instanceof ConnectionError, so it won't be retried.

  ## Fix for S3 (401 without tokenProvider)
  Change line ~300 from ConnectionError to StorageAdapterError('AUTH_FAILURE'):
  ```typescript
  if (response.status === 401) {
    throw new StorageAdapterError(
      `Authentication failed: GraphQL endpoint ${this.endpoint} returned 401 Unauthorized`,
      "AUTH_FAILURE"
    );
  }
  ```
  This is consistent with the tokenProvider-present null/throw paths.

  ## Fix for S2 (Test F call count)
  Add fetchSpy call count assertions to Test D and Test F:
  - Test D: expect(fetchSpy).toHaveBeenCalledTimes(2) — original request + post-rotation retry
  - Test F: expect(fetchSpy).toHaveBeenCalledTimes(2) — original request + post-rotation retry

  Note: After fixing S1, Test F's ConnectionError assertion must change to StorageAdapterError since executeOnceWithAuth no longer throws ConnectionError. Update the test accordingly.

  No dependencies.
resolution: All 5 acceptance criteria satisfied. executeOnceWithAuth throws non-retryable StorageAdapterError('CONNECTION_ERROR'), 401-without-tokenProvider throws StorageAdapterError('AUTH_FAILURE'), Tests D and F include fetch call count assertions. 1443 tests pass. Test F wall time dropped from 2505ms to normal.
