  ## Implementation

  Locate the ideate_emit_metric tool registration in mcp/artifact-server/src/tools/index.ts. The current registration has `readOnlyHint: false` (at roughly line 588 per the cycle 28 review context). Change to `readOnlyHint: true`.

  ## Rationale

  As of WI-790 (D-211), handleEmitMetric is a no-op — it writes no data. The readOnlyHint annotation should match the handler's actual behavior so that MCP clients display the tool accurately.

  ## Reference

  - D-211 (domain_decision, workflow): Metrics emission infrastructure is soft-deprecated
  - F-CYCLE-28-M3 (finding from cycle 28 code-reviewer)
  - WI-790 (prior work item that soft-deprecated emission)

  ## Verification

  Run the existing tool-registration tests: `cd mcp/artifact-server && npm test -- tools.test.ts`. They should still pass. No new tests are required — the annotation is a metadata change, not a behavior change.
