notes: |-
  # WI-834: Fix convergence checker reading legacy cycle-slot archive verdicts

  ## Observation

  Discovered during autopilot run on 2026-04-14. `ideate_get_convergence_status` returns `condition_b:false` when a legacy archive artifact with `verdict: Fail` exists in the same workspace cycle slot as the current autopilot cycle's canonical artifacts.

  Specific trigger: `.ideate/cycles/002/SA-002.yaml` (a March 29 archive) collided with autopilot's internal cycle 2. The parser read the stale Fail verdict even though the current cycle's canonical files all showed Pass.

  ## Root cause

  Autopilot's internal cycle numbering (1, 2, 3 ...) reuses workspace cycle directory slots that may already contain unrelated archived artifacts. The convergence checker does not fully isolate canonical cycle artifacts from legacy archives.

  ## Fix options

  - **(a) Disambiguate by metadata** — convergence checker inspects content date, source, or session-id fields to distinguish current-cycle artifacts from stale archives.
  - **(b) Slot mapping** — autopilot maps internal cycle numbers to next-available workspace cycle slots instead of reusing occupied ones.
  - **(c) Canonical-only file selection** — convergence checker reads only named files (`code-quality.yaml`, `spec-adherence.yaml`, `gap-analysis.yaml`, `summary.yaml`) and ignores ID-named legacy files (`SA-NNN.yaml`, `CQ-NNN.yaml`, `GA-NNN.yaml`).

  Option (c) aligns with P-86 (canonical path provenance) and is the direction WI-824 / WI-831 already took for cycle_summary selection. Verify first whether this report reproduces against current HEAD — it may already be fixed.

  ## Reproducer

  1. Run `/ideate:autopilot` on a workspace where `.ideate/cycles/{NNN}/` contains a legacy `SA-{NNN}.yaml` with `verdict: Fail`.
  2. Complete an execute → review cycle whose internal cycle number lands on the same slot `NNN`.
  3. Observe: all canonical reviewers report Pass, but `ideate_get_convergence_status(NNN)` returns `condition_b: false`.

  ## Relation to prior work

  - **P-86** — establishes that file path is the only valid cycle-ownership signal.
  - **WI-797 / WI-824** — introduced canonical-named `spec-adherence.yaml` and `summary.yaml` selection.
  - **WI-831** — added regression test for the cycle 002 collision case.
  - **Cycle 9 gap-analyst EC1** — identifies the symmetric case (legacy Pass masking canonical Fail) is untested; this work item should consider both directions in the regression test.

  ## Verification

  Regression test must exercise: a `.ideate/cycles/{N}/` directory containing both a legacy `SA-{N}.yaml` with `verdict: Fail` and a canonical `spec-adherence.yaml` (or `spec-adherence-{N}.yaml`) with `verdict: Pass`, and confirm `condition_b: true`.
resolution: Duplicate of WI-797 (same 2026-04-14 SA-002.yaml collision, same root cause, same canonical-only fix). WI-797 landed option (c) via WI-824/WI-831. Residual scope (symmetric case regression test — legacy Pass masking canonical Fail, cycle-9 gap-analyst EC1) is promoted to WI-836 in PH-046.
