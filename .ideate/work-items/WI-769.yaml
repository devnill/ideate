notes: |-
  ## Implementation Approach

  Create a mock adapter that implements StorageAdapter with minimal stubs:

  ```typescript
  function createMockAdapter(): StorageAdapter & { calls: Array<{method: string, args: unknown[]}> } {
    const calls: Array<{method: string, args: unknown[]}> = [];
    return {
      calls,
      async getNode(id) { calls.push({method: 'getNode', args: [id]}); return null; },
      async putNode(input) { calls.push({method: 'putNode', args: [input]}); return {id: input.id, status: 'created'}; },
      // ... etc
    };
  }
  ```

  Organize tests by method with describe blocks:
  ```
  describe('ValidatingAdapter', () => {
    describe('putNode', () => {
      it('rejects empty id', ...)
      it('rejects invalid type', ...)
      it('passes valid input to inner adapter', ...)
    })
    // ...
  })
  ```

  For passthrough tests, verify the mock's `calls` array contains the expected method call with the exact arguments, confirming the wrapper doesn't modify inputs.

  Follow P-75: do not hardcode counts or type lists. Use ALL_NODE_TYPES and ALL_EDGE_TYPES from adapter.ts for validation boundary tests.
