notes: |-
  ## Implementation Approach

  Create a decorator class that wraps any StorageAdapter implementation. The pattern:

  ```typescript
  export class ValidatingAdapter implements StorageAdapter {
    constructor(private readonly inner: StorageAdapter) {}

    async putNode(input: MutateNodeInput): Promise<MutateNodeResult> {
      this.validatePutNode(input);
      return this.inner.putNode(input);
    }
    // ... same pattern for all methods
  }
  ```

  ### Validation helpers

  Use private helper methods to keep validation DRY within the class:
  - `validateId(id: string, field: string)` — non-empty string check
  - `validateNodeType(type: string)` — ALL_NODE_TYPES membership
  - `validateEdgeType(type: string)` — ALL_EDGE_TYPES membership
  - `validatePagination(limit: number, offset: number)` — >= 0 checks

  ### CYCLE_SCOPED_TYPES

  The set of types that require a cycle parameter exists in both LocalAdapter (writer.ts) and RemoteAdapter (index.ts). Extract it as a constant in validating.ts (or import from adapter.ts if already exported). Currently includes: finding, journal_entry, decision_log, cycle_summary, review_manifest, review_output, metrics_event, proxy_human_decision.

  ### Error codes

  Follow the existing convention from LocalAdapter/RemoteAdapter:
  - INVALID_NODE_ID, INVALID_NODE_TYPE, MISSING_NODE_PROPERTIES
  - MISSING_EDGE_SOURCE, MISSING_EDGE_TARGET, INVALID_EDGE_TYPE
  - INVALID_LIMIT, INVALID_OFFSET
  - IMMUTABLE_FIELD
  - MISSING_CYCLE
  - EMPTY_BATCH

  Add new codes for previously unvalidated methods:
  - INVALID_SEED_IDS, INVALID_ALPHA, INVALID_TOKEN_BUDGET, INVALID_MAX_ITERATIONS
  - INVALID_DIRECTION, INVALID_DEPTH
  - INVALID_GROUP_BY
  - INVALID_CYCLE
  - MISSING_JOURNAL_FIELD

  ### Methods that pass through without validation
  - initialize() — lifecycle, no user input
  - shutdown() — lifecycle, no user input
