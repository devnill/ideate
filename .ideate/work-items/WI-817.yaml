notes: |-
  # WI-817: Fix ideate_get_convergence_status reading legacy archived artifacts in reused cycle slots

  ## Symptom

  `ideate_get_convergence_status` returns `condition_b:false` when legacy artifacts in the workspace cycle directory contain `verdict: Fail`, even when the current autopilot cycle's reviewer artifacts all show `Pass`.

  ## Discovery

  Observed during autopilot run on 2026-04-14. The file `cycles/002/SA-002.yaml` — a March 29 archive — collided with autopilot's internal cycle 2 directory, causing the convergence parser to read the old fail verdict instead of (or in addition to) the current cycle's pass verdicts.

  ## Root cause

  Autopilot's internal cycle numbering (1, 2, 3, ...) reuses workspace cycle directory slots that may already contain unrelated archived artifacts from prior unrelated runs. The convergence checker reads all artifacts in the cycle slot rather than scoping to artifacts produced by the current run.

  ## Fix options

  - **(a)** convergence-checker disambiguates by content date / source / session-id — preserves both old and new files in the same slot
  - **(b)** autopilot maps internal cycle numbers to the next-available workspace cycle slot, avoiding collision entirely
  - **(c)** convergence-checker reads only the named files (`code-quality`, `spec-adherence`, `gap-analysis`) and ignores legacy ID-named files (`SA-NNN`, `CQ-NNN`, `GA-NNN`)

  Option (c) is likely the cheapest and aligns with the post-WI-807 named-file convention; (b) avoids the collision class entirely but requires autopilot state changes; (a) is the most defensive but adds parser complexity. Pick during refine.

  ## Reproducer

  Run autopilot in a workspace whose `cycles/NNN/` slots contain legacy archived files (e.g., `SA-NNN.yaml` with `verdict: Fail`) at slot numbers that autopilot's internal counter will reuse. Observe `condition_b: false` from `ideate_get_convergence_status` even when the current cycle's reviewer artifacts all show `Pass`.

  ## Scope (to be confirmed during refine)

  Likely in the convergence parser inside `mcp/artifact-server/src/` (handler for `ideate_get_convergence_status`). Autopilot skill files may be touched if option (b) is selected.

  ## Not in scope

  - Migrating or deleting the legacy archived files themselves
  - Reworking autopilot's cycle numbering scheme beyond what option (b) would require

  ## Notes

  Triage item — not assumed execution-ready. Run /ideate:refine to confirm fix option, scope, and module spec impact before /ideate:execute.
resolution: Superseded by WI-824 (triaged and fixed 2026-04-14/15). Same bug, same root cause, same fix option (c). Closed as superseded.
