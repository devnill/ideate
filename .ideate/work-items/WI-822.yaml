notes: |
  # WI-822: Correct adapter-contract.md getMetricsEvents remote behavior

  ## Why

  Cycle 4 CR-M2 (minor): adapter-contract.md:331 says 'executes a single GraphQL query or stubs with a compatible fallback until the remote backend exposes the endpoint.' This contradicts the actual implementation. RemoteAdapter.getMetricsEvents fetches all metrics_event IDs via queryNodes (limit 100,000), then fetches full nodes via getNodes, then filters in TypeScript. There is no GraphQL query, no stub, no fallback, and the cycle filter is not pushed to the server.

  ## Implementation

  Replace the 'Remote behavior' line for getMetricsEvents with text matching the suggested fix from CR-M2:

  > Remote behavior: Fetches all metrics_event nodes via two round-trips (queryNodes + getNodes), then applies all filters (including cycle) in TypeScript. This is an O(n) scan; cycle-filter SQL pushdown is local-only.

  Verify wording against the actual implementation in mcp/artifact-server/src/adapters/remote/index.ts (around the getMetricsEvents method).
