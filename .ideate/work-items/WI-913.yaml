notes: |-
  # WI-913 Implementation Notes

  Audit finding [gap M4]: migrations.ts explicitly declares forward-only; no rollback path; no pre-migration backup.

  ## Approach

  Add a Migration.targeted_yaml optional field listing YAML files a migration modifies. Before runPendingMigrations does anything destructive, fs.copyFileSync for index.db + each targeted YAML into .ideate/backups/pre-migrate-{ISO-timestamp}/.

  Do NOT implement automatic rollback — git + the snapshot provide the recovery path. The operator copies snapshot files back if needed.

  ## Constraints
  - Node 22 + vitest only.
  - GP-14: snapshot writes are within .ideate/backups/ which is acceptable since migrations already live in the adapter/server layer (not a skill/agent). Document this boundary exception explicitly.
  - Snapshots must be gitignored. Add .ideate/backups/ to .gitignore if not already.

  ## Self-check
  Walk each of the 6 criteria with satisfied/unsatisfied status.
resolution: "Migration pre-snapshot added to runPendingMigrations. Snapshot dir .ideate/backups/pre-migrate-{ISO-timestamp}/ created before any migration step. index.db copied; targeted_yaml (new optional field on Migration type) listed files copied. Single snapshot per run regardless of number of migrations chained. On migration throw, log.error fires with snapshot path; error propagated to caller (changed from silent result.errors accumulation). Idempotency: no snapshot when already at target version. .gitignore updated to exclude .ideate/backups/. 1877 tests pass."
