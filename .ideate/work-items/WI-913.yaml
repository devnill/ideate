criteria:
  - Before runPendingMigrations executes any migration, index.db is copied to index.db.pre-migrate-{timestamp}.bak in the workspace .ideate/ directory (backups are expected to be gitignored)
  - If a migration declares a targeted_yaml list (optional field on Migration type), those YAML files are also copied to .ideate/backups/pre-migrate-{timestamp}/ before the migration runs
  - On migration failure (migrate() throws), the pre-migration snapshot is left intact for operator recovery; error logged via log.error with the snapshot path
  - "Regression test: inject a migration that throws; assert the snapshot exists after the failure"
  - "Regression test: successful migration chain leaves exactly one snapshot per migration run (not one per migration step)"
  - Full vitest suite passes; tsc --noEmit passes
