notes: |-
  Add !Number.isFinite() to the existing guards in validating.ts:

  1. alpha (line ~297): Change to `typeof options.alpha !== "number" || !Number.isFinite(options.alpha) || options.alpha <= 0 || options.alpha > 1`
  2. convergence_threshold (line ~330): Change to `typeof options.convergence_threshold !== "number" || !Number.isFinite(options.convergence_threshold) || options.convergence_threshold <= 0`

  Also update ppr.ts defense-in-depth guards:
  3. alpha (line ~110): Add !Number.isFinite(alpha) check
  4. convergenceThreshold (line ~128): Add !Number.isFinite(convergenceThreshold) check

  Add test cases in validating.test.ts:
  - alpha=NaN rejected (INVALID_ALPHA)
  - alpha=Infinity rejected (INVALID_ALPHA) 
  - convergence_threshold=NaN rejected (INVALID_CONVERGENCE_THRESHOLD)
  - convergence_threshold=Infinity rejected (INVALID_CONVERGENCE_THRESHOLD)

  Reference pattern: edge_type_weights validation at line ~367 already uses Number.isFinite() correctly. Follow P-81.
resolution: Added Number.isFinite() guards to alpha and convergence_threshold in validating.ts and ppr.ts. Added 5 tests (NaN/Infinity for alpha, NaN/Infinity for convergence_threshold, Infinity for edge_type_weights). All 1343 tests pass.
