  # WI-814: Doc updates for cycle 3 outputs

  ## Background

  Flagged by spec-reviewer (SR-S1, SR-M2) and gap-analyst (GA-S2 — same gap) in PH-045 cycle 3 capstone review.

  WI-808 and WI-810 added three new methods to the `StorageAdapter` interface (`getMetricsEvents`, `indexFiles`, `removeFiles`). WI-812's scope was explicitly limited to adding the Implementation Constraints section and did not cover documenting individual methods. The canonical contract document is now incomplete relative to the live interface.

  Separately, WI-807 added a fifth column (Cycle) to the `handleArtifactQuery` table output. WI-812 §3.3 update only covered the WI-804 helper-function deletion and did not mention the column change.

  ## Approach

  1. Add three method sections to `adapter-contract.md` 'Interface Methods' (or a logical subsection). Mirror the JSDoc that already lives in `adapter.ts`.
  2. Update §3.3 of `architecture-overview.md` to mention the five-column output: ID, Type, Status, Summary, Cycle.

  ## References

  - PH-045 cycle 3 capstone spec-adherence review: SR-S1, SR-M2
  - PH-045 cycle 3 capstone gap-analysis review: GA-S2 (duplicate of SR-S1)
