id: P-94
type: domain_policy
title: Workers write .ideate/ artifacts exclusively through MCP; filesystem access to .ideate/ is blocked by settings.json permission deny rules
domain: agent-system
status: active
derived_from:
  - GP-14
description: "Workers may not write .ideate/ files via filesystem tools (Edit, Write). All artifact writes go through MCP (ideate_write_artifact, ideate_update_work_items, ideate_append_journal, etc.). This is enforced at the Claude Code permission layer via deny rules in .claude/settings.json: Edit(**/.ideate/**) and Write(**/.ideate/**) are blocked for worker agents. Rationale: GP-14 preservation requires structural enforcement. Prior to this policy, workers had filesystem Edit/Write access to .ideate/ with no gate; cycle 82 WI-911 demonstrated the drift risk (worker used Edit on architecture.yaml directly). Cycle 83 WI-916 replaced descriptive-text disallowedTools frontmatter (non-enforcing) with real permission deny rules in .claude/settings.json."
source: cycle 82 capstone GP-14 violation (WI-911)
established_cycle: 82
rule: Workers must use MCP artifact tools (ideate_write_artifact, ideate_update_work_items, ideate_append_journal, etc.) for all writes to .ideate/ artifacts. Direct filesystem writes to .ideate/ via Edit or Write tools are blocked by permission deny rules in .claude/settings.json.
rationale: GP-14 preservation requires structural enforcement, not just documentation. Prior to this policy, workers had filesystem Edit/Write access to .ideate/ with no gate. Cycle 82 WI-911 demonstrated the drift risk when a worker used Edit on architecture.yaml directly instead of going through MCP. Cycle 83 WI-916 upgraded enforcement from descriptive frontmatter to real Claude Code permission deny rules in .claude/settings.json.
applies_to:
  - agents/worker.md
  - any worker agent implementation
cycle_modified: 27
