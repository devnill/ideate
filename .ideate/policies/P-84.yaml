id: P-84
type: domain_policy
title: Extend adapter behavior via composition, not new interface methods
domain: agent-system
rule: Adapter functionality extensions must be implemented as composed StorageAdapter calls orchestrating existing interface methods (queryNodes + getNodes + readNodeContent), rather than adding new methods to the StorageAdapter interface, unless composition is provably insufficient.
