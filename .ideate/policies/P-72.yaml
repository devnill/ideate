id: P-72
type: domain_policy
domain: artifact-structure
title: Filter behaviors must be tested at the adapter-contract level
body: "When a storage adapter method accepts filter parameters (e.g., deprecated, superseded, status flags), the adapter-contract test suite must include at least one test verifying each non-trivial filter value, not only the happy-path unfiltered case. Testing filter correctness solely at the MCP tool-handler level is insufficient: the contract tests define the behavioral guarantee of the adapter interface itself, and gaps there mean filter bugs can exist in adapter implementations even when tool-level integration tests pass."
