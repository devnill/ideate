id: P-82
type: domain_policy
title: Adapter-integrated modules require integration test file in tests/adapters/
rule: Every module that is integrated through the adapter layer must have a dedicated integration test file under tests/adapters/. Unit tests (required by P-43) are necessary but not sufficient for adapter-level modules.
derived_from: D-204
established: cycle 025
status: active
notes: This policy extends P-43 (unit test requirement) to cover the integration boundary. A module may have complete unit coverage and still be missing adapter integration tests.
