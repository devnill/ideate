id: P-70
type: domain_policy
domain: artifact-structure
title: export type re-export does not bring a name into scope under NodeNext
body: "Under NodeNext module resolution, `export type { X }` in a file's export list makes `X` available to importers but does not introduce `X` as a usable name within the file itself. Any handler or module that needs to use a type as a value-position reference (e.g., `satisfies X`, `as X`, `x: X`) must import it with an explicit `import type { X }` statement. Using only a re-export statement while referencing the type in the same file produces TS2304 'Cannot find name' errors caught only when `tsc` is run directly, not by esbuild-backed test runners."
