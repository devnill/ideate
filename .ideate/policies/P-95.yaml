id: P-95
type: domain_policy
title: Class-of-bug fixes require codebase-wide anti-pattern sweep, not just named-file fix
domain: workflow
status: active
derived_from:
  - cycle 77/80 meta-observations
description: "When fixing a bug that represents a pattern (e.g., fs-in-transaction, unused imports, divergent constants), grep for ALL occurrences of the pattern across the codebase, not just the named file. WI prompts for class-of-bug fixes must explicitly instruct the worker to perform the sweep. Historical examples: WI-890 (fs-in-transaction fixed archiveCycleLocal but missed patchNode + batchMutate, required WI-895 fixup); WI-891 (adapter.shutdown wired Remote but missed Local, required WI-895 fixup); WI-897 (token-count extraction was reported complete but left 3 local helpers, required WI-903 fixup)."
