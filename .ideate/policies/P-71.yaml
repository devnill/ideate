id: P-71
type: domain_policy
domain: artifact-structure
title: TypeScript errors in test files must be caught by tsc --noEmit in CI
body: "Test files (*.test.ts, *.spec.ts) must be included in tsconfig.json and verified by a `tsc --noEmit` step in CI. Running only vitest does not suffice: vitest uses esbuild for transpilation, which strips types without checking them, masking type errors in test files. The CI pipeline must fail on type errors in test files, not merely on test assertion failures."
