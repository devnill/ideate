id: P-85
type: domain_policy
title: Documentation surface enumeration in work item file scope
domain: workflow
rule: When a work item changes observable behavior or contracts, its file scope MUST enumerate every documentation surface that describes the affected behavior — not just the code being changed. This includes READMEs, architecture overviews, research/design notes, public schemas, and any inline comments referencing the changed code by line number. Source-only edits without parallel doc-surface enumeration are insufficient and will produce stale-doc gaps at capstone review.
rationale: "Pattern observed in autopilot cycle 1 (workspace cycle 31): WI-789 and WI-790 correctly fixed source-code behavior (max_nodes pure-slice; emit_metric no-op) but did not enumerate parallel documentation surfaces in their file scope. Incremental review only checks declared file scope, so the drift was invisible until capstone gap-analyst surfaced three stale doc surfaces (ppr-alignment-research.md:39, README.md:56, architecture-overview.md:673) that contradict the implemented decisions. The remediation cycle (WI-791/792/793) addressed three known surfaces but the gap-analyst found three more, indicating the pattern recurs unless the work item author proactively enumerates affected docs upfront."
applies_when: Any work item that changes observable behavior, public contracts, MCP tool semantics, schema, or interface signatures.
verification: At work item authoring time, run a search across docs/, README files, and research notes for any reference to the affected symbol, file, or behavior. Add every match to the work item's file_scope or explicitly justify exclusion. At incremental review, the reviewer checks whether such doc surfaces exist and were updated.
