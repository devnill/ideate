id: P-73
type: domain_policy
domain: artifact-structure
title: Pretest scripts must skip gracefully when prerequisites are absent
body: Build-step scripts (pretest.js, pre-build validators) must not call process.exit(1) unconditionally when an expected condition is absent. In CI environments and fresh checkouts the checked condition may legitimately be unmet before the main build has run. Scripts must either (a) emit a warning and exit 0 when the absence is expected-in-context, (b) check whether the build has run and skip if not, or (c) be invoked only after the prerequisite build step. An unconditional process.exit(1) blocks npm test in fresh checkouts and breaks CI on first run.
