id: P-80
type: domain_policy
domain: artifact-structure
title: Decorator centralization must remove redundant inner-adapter validation
rule: When a decorator (e.g., ValidatingAdapter) centralizes a cross-cutting concern such as input validation, the inner adapter's now-redundant inline validation for the same checks must be removed or guarded in the same phase to prevent dead code and behavioral divergence between decorator and inner adapter.
