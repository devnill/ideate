id: P-86
type: domain_policy
title: document_artifacts.cycle is not a provenance guard
domain: artifact-structure
rule: Never use da.cycle (document_artifacts.cycle) as a cycle-ownership signal. rebuildIndex populates da.cycle from YAML content fields, not from the artifact's canonical file path. Any code path that uses da.cycle to determine which cycle owns a document will leak across cycle boundaries when legacy YAMLs are reindexed, because da.cycle reflects the YAML's declared value rather than the file's placement in the artifact directory hierarchy. Cycle provenance must come from canonical file paths only (e.g. .ideate/cycles/{NNN}/ path components).
rationale: "Identified in WI-824: rebuildIndex sets document_artifacts.cycle from YAML content, not from path. D-211 confirmed that da.cycle cannot serve as a reliable provenance guard. Any filter or query that uses da.cycle == N to scope cycle artifacts will return spurious results when older YAMLs are reindexed under a new cycle context. The canonical provenance signal is the file path — specifically the cycle number embedded in the path segment .ideate/cycles/{NNN}/."
applies_when: Any code path that queries, filters, or groups document_artifacts by cycle number, or any feature that attempts to isolate artifacts belonging to a specific cycle.
verification: At design time, verify that cycle-scoped queries use path-based filtering (e.g. path LIKE '.ideate/cycles/028/%') rather than da.cycle equality. At review time, flag any SQL or TypeScript filter that reads da.cycle as a grouping or ownership predicate.
