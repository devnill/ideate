id: P-81
type: domain_policy
title: Numeric range validation must use Number.isFinite()
rule: When validating that a numeric parameter falls within a finite range, validation code must use Number.isFinite() (or equivalent explicit finiteness check) as a guard, not bare comparison operators alone. Bare comparisons such as (value > 0 && value < 1) silently accept NaN because all IEEE-754 comparisons with NaN return false.
derived_from: D-203
established: cycle 025
status: active
notes: See edge_type_weights implementation as the reference pattern. Number.isFinite(value) returns false for NaN, Infinity, and -Infinity.
