description: "When a WI consolidates duplicated code (constants, helpers, registries), the worker prompt must require explicit grep verification in the self-check report, not just a text claim of 'done.' Historical recurrence: WI-897 and WI-899 workers each reported consolidation complete but left inline copies + duplicate maps in place; cycle 79 capstone caught via grep. WI-903 closed with explicit grep-verification prompt. Every subsequent consolidation WI prompt must include `grep -n \"<pattern>\" src/` commands and expected result counts in the Validate section."
