id: P-87
type: domain_policy
title: Worker GP-14 violation re-sync recovery
domain: agent-system
rule: When a worker agent writes directly to .ideate/ paths (violating GP-14), the invoking skill must detect the violation and re-sync by writing the same content through the appropriate MCP tool. The direct file write must be discarded (reverted or overwritten by the MCP write). Worker-spawning skills must instruct workers not to write .ideate/ directly.
rationale: "Identified in WI-830/WI-832: worker agents occasionally write .ideate/ files directly instead of through MCP, bypassing validation, indexing, and the abstraction boundary. P-52 (artifact directory contract) and GP-14 (MCP abstraction boundary) both prohibit direct writes. The re-sync recovery pattern ensures consistency without requiring the worker to be re-run."
applies_when: Any skill that spawns worker agents to implement work items. The prohibition bullet must appear in the worker prompt.
verification: "At design time, ensure worker-spawning skills instruct workers not to write .ideate/ directly. Verified by WI-835: execute.md worker prompt now includes explicit prohibition bullet (line 86). review.md and refine.md do not spawn code-writing workers."
