title: Reserved keyword comments must cite exact keywords and verify engine behavior
rule: Reserved keyword advisory comments in schema files must cite the exact SQL reserved keyword (not pluralized or variant forms) and must accurately state whether quoting is required by the target database engine (SQLite), verified against actual engine behavior before committing.
