id: P-83
type: domain_policy
title: Concrete adapter references confined to selectAdapter
domain: agent-system
rule: Concrete adapter implementation references (LocalAdapter, RemoteAdapter, LocalContextAdapter) must appear only in the selectAdapter function of server.ts. All other tool handler code must use the abstract StorageAdapter interface. No tool handler may import or cast to a concrete adapter class.
