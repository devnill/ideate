content: |
  # Clean StorageAdapter Interface Proposal

  **Produced by**: WI-784 synthesis spike (PH-042)
  **Input artifacts**: RF-abstraction-boundary-audit (WI-781), RF-ppr-divergence-catalog (WI-782), RF-equivalence-test-audit (WI-783)
  **Design constraint**: "The backend adapter implementation must be completely invisible to the user experience." — Local SQLite and cloud-hosted database must behave identically.

  ---

  ## 1. What Does the Clean StorageAdapter Interface Look Like?

  The current StorageAdapter interface (adapter.ts) is structurally sound. The 20 methods cover the full operation surface. The interface contract doc (adapter-contract.md) is accurate and current. The problem is not the interface definition — it is the gap between the interface and its actual usage in tool handlers.

  ### Clean interface invariants (what must hold):

  1. No tool handler may import LocalContextAdapter, LocalAdapter, RemoteAdapter, or any concrete adapter class. Only StorageAdapter is visible above the adapter boundary.
  2. No tool handler may access ctx.db or ctx.drizzleDb for business logic. Raw SQLite access is reserved exclusively for the adapter implementations themselves.
  3. All five query methods currently bypassed (queryArchitectureDocument, queryGuidingPrinciples, queryConstraints, queryActiveProject, queryActivePhase) must become StorageAdapter methods, or be replaced by equivalent StorageAdapter calls.
  4. Metrics query must route entirely through the adapter. ctx.db.prepare() in handleGetMetrics must be eliminated.
  5. ExecutionStatus and ReviewManifest handlers must use adapter methods, not raw SQL.
  6. max_nodes must have a single semantic: result count cap (slice), not graph-size abort. This aligns with remote behavior.
  7. always_include_types must have a single semantic: all matching nodes are included before budget, unconditionally. This aligns with local behavior.
  8. Edge types must have a single canonical case: lower_snake_case throughout. No normalizeEdgeType() masking case mismatches.

  ### Methods to add to StorageAdapter:

  ```typescript
  // Context assembly helpers — replace LocalContextAdapter direct calls
  getArchitectureDocument(): Promise<{ content: string } | null>;
  getGuidingPrinciples(): Promise<Array<{ name: string; description: string | null }>>;
  getConstraints(): Promise<Array<{ category: string | null; description: string | null }>>;
  getActiveProject(): Promise<{ id: string; name: string; description: string | null; current_phase_id: string | null } | null>;
  getActivePhase(): Promise<{ id: string; name: string; project: string | null } | null>;

  // Metrics — replace raw SQL in handleGetMetrics
  queryMetrics(filter: MetricsFilter, limit: number, offset: number): Promise<MetricsQueryResult>;
  ```

  Where MetricsFilter and MetricsQueryResult are defined in adapter.ts with only the fields needed by aggregation logic.

  Alternatively, if the five context helpers are considered too domain-specific for the generic adapter interface, they could be implemented as composed StorageAdapter calls (e.g., `getNode` + `readNodeContent` for architecture document, `queryNodes` for principles/constraints/project/phase). This avoids interface bloat at the cost of N+1 queries. Given the small dataset sizes, composed calls are acceptable.

  The metrics case is different: the aggregation needs metrics-specific columns (input_tokens, output_tokens, etc.) that are not in Node.properties in a queryable form via queryNodes. This requires either a dedicated queryMetrics method or a design decision to store metrics fields in a queryable way.

  ---

  ## 2. Fix Proposals for Each Abstraction Leak (WI-781)

  ### Leak 1-2 (CRITICAL): context.ts — LocalContextAdapter cast for five query methods

  **Current**: context.ts checks `"queryArchitectureDocument" in ctx.adapter` and casts to `LocalContextAdapter`. Five methods called: queryArchitectureDocument, queryGuidingPrinciples, queryConstraints, queryActiveProject, queryActivePhase.

  **Proposed fix**: Add these five methods to StorageAdapter interface (option A) or replace with composed StorageAdapter calls (option B).

  - Option A: Add getArchitectureDocument(), getGuidingPrinciples(), getConstraints(), getActiveProject(), getActivePhase() to StorageAdapter. Both LocalAdapter and RemoteAdapter implement them. LocalAdapter wraps the existing LocalContextAdapter implementation. RemoteAdapter implements via GraphQL queries.
  - Option B: Remove LocalContextAdapter dependency from context.ts entirely. Use queryNodes({type: "architecture"}, 1, 0) + readNodeContent() for architecture document. Use queryNodes({type: "guiding_principle"}) + getNodes() for principles. Use queryNodes({type: "constraint"}) + getNodes() for constraints. Use queryNodes({type: "project", status: "active"}, 1, 0) for active project. Use queryNodes({type: "phase", status: "active"}, 1, 0) for active phase.

  Recommendation: Option B for principles/constraints/project/phase (these are straightforward queryNodes + property reads). Option A only for the architecture document (its content handling — truncation, summarization — is complex enough to justify a dedicated method).

  Priority: CRITICAL. Crashes RemoteAdapter in production.

  ### Leak 5-6 (CRITICAL): execution.ts — ctx.db.prepare() for handleGetExecutionStatus and handleGetReviewManifest

  **Current**: Both handlers use `ctx.db.prepare()` with raw SQL against the nodes table and work_items/journal_entries tables. The comment in the code says "Direct DB path — adapter aggregate methods not yet available."

  **Proposed fix**: Implement execution status and review manifest via StorageAdapter:
  - handleGetExecutionStatus: use `queryNodes({type: "work_item"})` paginated to get all work items. Use `queryNodes({type: "journal_entry"})` for completion signals. Dependency information is in node.properties.depends. Reconstruct the completion/ready/blocked categorization from adapter results.
  - handleGetReviewManifest: use `queryNodes({type: "work_item"})` for work item list with status and scope. Filter by cycle using NodeFilter.cycle.

  The dependency data (row.depends) is stored as a JSON string in work_item properties. The adapter already returns properties including depends. The composition is: queryNodes(work_item) → iterate properties.depends → reconstruct dependency graph. This is identical to the current raw SQL path but without touching ctx.db.

  Priority: CRITICAL. Both handlers crash with RemoteAdapter.

  ### Leak 7 (SIGNIFICANT): metrics.ts — ctx.db.prepare() in handleGetMetrics

  **Current**: handleGetMetrics uses ctx.adapter.queryNodes() as a gate-check only, then runs a JOIN query against metrics_events and nodes tables using ctx.db.prepare(). The adapter call is decorative — data comes from raw SQL.

  **Proposed fix**: Two options:
  - Option A: Add queryMetrics(filter, limit, offset) to StorageAdapter. Returns MetricsQueryResult containing the full row shape needed by aggregation logic. LocalAdapter wraps the existing SQL. RemoteAdapter implements via a GraphQL query that returns the same fields.
  - Option B: Restructure handleGetMetrics to use only queryNodes({type: "metrics_event"}) + getNodes(). Accept that aggregation fields (input_tokens, output_tokens, etc.) must be in node.properties and queryable that way. This requires confirming the LocalAdapter stores these fields in the work_items/nodes extension columns (it does — metrics_events table has these columns and they are mapped to properties in EXTENSION_COLUMNS in remote/index.ts).

  Option B is viable: queryNodes returns NodeMeta, but getNodes returns full Node with properties. A pattern of queryNodes (get IDs) + getNodes (get full data including metrics-specific properties) avoids a new interface method at the cost of two calls. The aggregation logic then reads from node.properties instead of a raw SQL row.

  Recommendation: Option B — avoid adding queryMetrics to the interface. The adapter interface should remain generic. Aggregation logic in the tool handler works from Node.properties.

  Priority: SIGNIFICANT. handleGetMetrics silently uses wrong data path with RemoteAdapter.

  ### Leaks 3, 4, 8-12 (MINOR): Test-only fallbacks in context.ts, write.ts, analysis.ts, query.ts

  **Current**: These fallbacks use `new LocalContextAdapter(ctx.drizzleDb, ctx.db)` or `ctx.db.prepare()` but only when `ctx.adapter` is falsy (test-only paths).

  **Proposed fix**: Remove fallback paths. Tests should construct a test double that implements StorageAdapter, not rely on the local adapter directly. The test-only fallback pattern is a maintenance liability because it allows tests to pass while the adapter path is broken.

  Priority: MINOR. Does not affect production, but creates false confidence in tests.

  ---

  ## 3. Resolution Proposals for Each PPR Divergence (WI-782)

  ### D5 (CRITICAL): Edge loading scope — local loads ALL edges, remote loads scoped edges

  **Issue**: Local PPR operates on the full graph (all edges in the SQLite database). Remote PPR is scoped to org_id/codebase_id on the server. Score distributions differ structurally. Even if all other parameters align, a local traversal on a 500-node graph will produce different scores than a remote traversal on a 50,000-node graph containing the same 500 nodes.

  **Proposed resolution**: This divergence is non-remediable without access to the remote server's graph scope. It must be documented as an architectural constraint rather than a bug to fix. The adapter contract doc should state explicitly: "Traversal scores are not comparable across backends. PPR scores from LocalAdapter and RemoteAdapter are relative within their respective graph scopes."

  The practical implication: equivalence tests for traverse() should not compare absolute scores or score rankings across backends. They should only verify that: (a) seed nodes appear in results, (b) always_include_types nodes appear when available, (c) token budget is respected. Score-ordering equivalence is not a testable property across backends.

  Priority: CRITICAL to document. Not fixable by code changes alone.

  ### D2 (SIGNIFICANT): CONTAINMENT_EDGE_TYPES filter is dead code in ppr.ts

  **Issue**: ppr.ts defines CONTAINMENT_EDGE_TYPES with six types (owns_codebase, owns_project, has_phase, has_work_item, owns_knowledge, references_codebase) that do not exist in schema.ts EDGE_TYPES. The filter references types that are never present in the graph. CONTAINMENT_EDGE_TYPES is imported but the filtering code has no effect.

  **Proposed resolution**: Remove CONTAINMENT_EDGE_TYPES constant and all associated filtering code from ppr.ts. It is dead code. If future edge types with containment semantics are added to schema.ts, a new CONTAINMENT_EDGE_TYPES set should be defined at that time.

  Priority: SIGNIFICANT (dead code, misleading). Easy fix.

  ### D3 (SIGNIFICANT): always_include_types budget behavior

  **Issue**: Local (ppr.ts): always-include nodes are added unconditionally before budget check. Remote: non-seed always-include-type nodes are subject to budget — they can be dropped if the budget is already consumed by seed nodes.

  **Proposed resolution**: Standardize on local behavior — always_include_types nodes are always included, unconditionally, before the token budget is applied. The name implies a guarantee. The remote implementation's behavior (where "always_include" can be dropped) is a misnomer. The contract doc must state this clearly, and RemoteAdapter's server-side implementation must be updated to match. If server-side cannot be changed, the RemoteAdapter should post-filter results to re-include any missing always_include_types nodes up to an additional budget allowance.

  Priority: SIGNIFICANT (behavioral divergence visible to callers).

  ### D4 (SIGNIFICANT): max_nodes semantics

  **Issue**: Local: max_nodes is a graph-size abort threshold — if graph exceeds max_nodes, returns empty result. Remote: max_nodes is a result count cap — slice the results list.

  **Proposed resolution**: Standardize on remote behavior — max_nodes is a result count cap. Local ppr.ts should change to: after running PPR, slice the sorted results to max_nodes before returning. Remove the graph-size abort logic. The default remains 10000, which effectively means "no cap" for typical graph sizes.

  Rationale: The abort-and-return-empty behavior is surprising and unhelpful. A caller passing max_nodes=100 expects the top 100 results, not an empty result when the graph has more than 100 nodes. The remote behavior is more useful. The abort behavior was documented in TraversalOptions as "If graph exceeds this, returns empty result" — update this documentation to reflect the new cap semantics.

  Priority: SIGNIFICANT (behavioral divergence with counter-intuitive local behavior).

  ### D1 (MINOR): Edge type weight case convention

  **Issue**: ppr.ts DEFAULT_EDGE_TYPE_WEIGHTS uses UPPER_SNAKE_CASE keys (DEPENDS_ON, GOVERNED_BY). schema.ts and the StorageAdapter use lower_snake_case (depends_on, governed_by). normalizeEdgeType() in ppr.ts masks this by converting all edge types to uppercase before weight lookup.

  **Proposed resolution**: Eliminate the case mismatch at the source. Change DEFAULT_EDGE_TYPE_WEIGHTS in ppr.ts to use lower_snake_case keys. Remove normalizeEdgeType() — it should not be needed once all internal representations are consistent. Update weight lookup to use the canonical lower_snake_case form.

  The edge_type_weights parameter in TraversalOptions already uses Record<string, number> — the keys are strings, not EdgeType. The ValidatingAdapter validates that keys are in ALL_EDGE_TYPES (which are lower_snake_case). After fixing ppr.ts defaults, the convention is consistent end-to-end.

  Priority: MINOR (masked by normalizeEdgeType). Remove dead normalization.

  ### D6 (MINOR): always_include_types case forwarding to remote

  **Issue**: Local adapter passes always_include_types as-is (lower_snake_case NodeType strings). Remote adapter converts to UPPER_SNAKE_CASE via toGraphQLEnum() for the GraphQL request. This is correct behavior — the conversion is necessary for the GraphQL API. Not a bug.

  **Proposed resolution**: No change needed. Document that the case conversion is intentional and required by the GraphQL API. This is a RemoteAdapter implementation detail, not a contract violation.

  Priority: MINOR. Already correctly handled.

  ---

  ## 4. Proposals for Each Equivalence Gap (WI-783)

  ### Gap 1: readNodeContent — only id and type compared, not full content shape

  **Proposed test addition**: Assert that readNodeContent returns a non-empty string for nodes known to have content. Assert that the returned string contains the node ID (YAML files include the id field). For structured assertions, parse the returned YAML and compare at least 3 type-specific fields (e.g., for work_item: title, status, complexity) across both adapters.

  ### Gap 2: archiveCycle — string-parsing-based assertions

  **Proposed test addition**: After archiveCycle, call queryNodes({type: "work_item", status: "archived"}) and verify that the previously-active work items now appear with archived status. Replace string-parsing with state verification. The current regex approach tests the summary message format, not the actual archive effect.

  ### Gap 3: queryGraph — no tests with type_filter, edge_types, or filters sub-fields

  **Proposed test additions**:
  - Test with type_filter set to a specific NodeType. Verify all returned nodes have that type.
  - Test with edge_types restricting to a single edge type. Verify only edges of that type appear in results.
  - Test with filters.status set. Verify all returned nodes have that status.
  - Both adapters must return structurally equivalent results for all three variants.

  ### Gap 4: countNodes — no group_by=severity test

  **Proposed test addition**: Write a finding node with a known severity. Call countNodes({type: "finding"}, "severity"). Verify the severity appears in results with count >= 1. Both adapters must return equivalent severity groupings.

  ### Gap 5 (already known): PPR score non-comparability across backends (D5)

  **Proposed interface change**: Add a caveat to TraversalOptions documentation: max_nodes now means result count cap (after D4 fix). Update equivalence-traverse.test.ts to test only structural properties (seed nodes present, always_include_types honored, token budget respected), not score ordering across backends.

  ---

  ## 5. Priority Ordering

  Priority is determined by: runtime impact (crash vs wrong data vs test gap) × blast radius (all users vs local-only).

  ### P0 — Blockers (crash RemoteAdapter in production)

  1. **Leak 1-2**: context.ts LocalContextAdapter cast — five methods not on StorageAdapter. RemoteAdapter crashes when handleGetProjectContext is called.
  2. **Leak 5-6**: execution.ts raw SQL — handleGetExecutionStatus and handleGetReviewManifest crash entirely with RemoteAdapter.

  ### P1 — Significant behavioral divergence (wrong results, not crashes)

  3. **D4**: max_nodes semantics — local returns empty result for graphs over threshold; remote returns capped results. Fix local to match remote: result count cap.
  4. **D3**: always_include_types budget behavior — remote can drop always-include nodes. Fix remote to honor the guarantee.
  5. **Leak 7**: metrics.ts raw SQL — handleGetMetrics returns wrong data with RemoteAdapter (adapter gate-check is decorative).

  ### P2 — Dead code and case convention cleanup

  6. **D2**: CONTAINMENT_EDGE_TYPES dead code in ppr.ts — remove.
  7. **D1**: Edge type weight case mismatch and normalizeEdgeType() — standardize to lower_snake_case, remove normalization.
  8. **Leaks 3, 4, 8-12**: Test-only fallback paths — remove; replace with proper test doubles.

  ### P3 — Test coverage gaps

  9. readNodeContent full content shape assertion
  10. archiveCycle state-based verification
  11. queryGraph with type_filter, edge_types, filters
  12. countNodes with group_by=severity
  13. traverse() equivalence tests: remove score-ordering assertions, add structural assertions

  ---

  ## 6. Estimated Implementation Scope

  ### Phase A: Critical leak fixes (P0) — Medium complexity

  **Work items**: 2-3
  - WI-A1: Replace LocalContextAdapter cast in context.ts with StorageAdapter calls (Option B: composed queryNodes + getNodes calls). Add getArchitectureDocument() to StorageAdapter if Option A is chosen for architecture. Implement in LocalAdapter and RemoteAdapter.
  - WI-A2: Rewrite handleGetExecutionStatus and handleGetReviewManifest using queryNodes + getNodes. No new interface methods needed — these tools need only work_item nodes with properties.

  Estimated effort: 3-5 days. Risk: medium (context.ts handler is complex; integration testing against RemoteAdapter requires Docker).

  ### Phase B: PPR divergence fixes (P1) — Medium complexity

  **Work items**: 2-3
  - WI-B1: Fix max_nodes semantics in ppr.ts (abort → cap). Update TraversalOptions documentation and adapter-contract.md.
  - WI-B2: Fix always_include_types guarantee in RemoteAdapter traverse() (post-filter to re-include any missing always_include_types nodes). Or, if server-side is accessible: fix at server level.
  - WI-B3: Fix metrics path in handleGetMetrics — use queryNodes({type: "metrics_event"}) + getNodes() for full properties, then aggregate from node.properties.

  Estimated effort: 2-4 days. Risk: medium (PPR behavior changes affect context assembly quality; PPR changes require careful validation).

  ### Phase C: Dead code removal and case convention (P2) — Low complexity

  **Work items**: 1-2
  - WI-C1: Remove CONTAINMENT_EDGE_TYPES from ppr.ts. Standardize DEFAULT_EDGE_TYPE_WEIGHTS to lower_snake_case. Remove normalizeEdgeType().
  - WI-C2: Remove test-only fallback paths (ctx.db.prepare() fallbacks when adapter is null). Update tests to use StorageAdapter test doubles.

  Estimated effort: 1-2 days. Risk: low (dead code removal; test-only paths).

  ### Phase D: Equivalence test improvements (P3) — Low to medium complexity

  **Work items**: 1-2
  - WI-D1: Add readNodeContent deep content assertion, archiveCycle state-based verification, queryGraph filter tests, countNodes severity test.
  - WI-D2: Update traverse equivalence tests — remove cross-backend score comparison, add structural property assertions (seed presence, always_include_types, budget).

  Estimated effort: 1-2 days. Risk: low (test additions; requires Docker for integration tests).

  ### Total estimated scope

  8-12 work items across 4 phases. 7-13 developer-days. The implementation phase is medium complexity overall, dominated by Phase A (context.ts refactor and execution.ts rewrite). Phases B-D are incremental improvements with lower risk.

  ### Phasing recommendation

  Execute Phase A first (P0 blockers). RemoteAdapter is currently non-functional for three critical tool handlers. Phase B second (behavioral correctness). Phases C and D can be executed in parallel with B or deferred to a subsequent cycle.

  ---

  ## 7. Summary Answers to Proposal Questions

  **Q1: What does the clean StorageAdapter interface look like?**
  The existing 20-method interface is correct. Add getArchitectureDocument() if Option A is chosen for context.ts. Do not add queryMetrics — compose from existing methods. The interface stays domain-generic.

  **Q2: What convention should edge types use?**
  lower_snake_case throughout. This is already the canonical form in schema.ts and EDGE_TYPES. Fix ppr.ts DEFAULT_EDGE_TYPE_WEIGHTS to use lower_snake_case. Remove normalizeEdgeType(). No case normalization should exist anywhere in the adapter boundary.

  **Q3: What dead code should be removed?**
  CONTAINMENT_EDGE_TYPES in ppr.ts (6 types not in schema). normalizeEdgeType() in ppr.ts (after fixing defaults). Test-only ctx.db fallback paths in context.ts, write.ts, analysis.ts, query.ts. metrics.ts gate-check pattern (ctx.adapter.queryNodes() followed by ctx.db.prepare()).

  **Q4: What needs to move from direct LocalContextAdapter calls into StorageAdapter?**
  The five context methods: queryArchitectureDocument, queryGuidingPrinciples, queryConstraints, queryActiveProject, queryActivePhase. Preferred path: replace with composed StorageAdapter calls (queryNodes + getNodes + readNodeContent) rather than adding new interface methods.

  **Q5: What new equivalence tests are needed?**
  readNodeContent deep assertion, archiveCycle state verification, queryGraph with filter variants, countNodes severity group, traverse structural assertions (not score-ordering).

  **Q6: What's the estimated scope of an implementation phase?**
  8-12 work items, 7-13 developer-days, 4 phases. Phase A (P0 critical leaks) is the prerequisite for all others and must execute first.
