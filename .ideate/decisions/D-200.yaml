id: D-200
type: domain_decision
domain: artifact-structure
title: Reserved keyword comments must cite exact SQL keywords and verify engine behavior
decision: Reserved keyword advisory comments must cite the exact SQL reserved keyword (not pluralized or variant forms) and accurately state whether the target database engine requires quoting. Cycle 23 found 'constraints' mislabeled as reserved (CONSTRAINT singular is reserved, not CONSTRAINTS plural) and 'trigger' overstated as requiring quoting when SQLite allows it unquoted.
rationale: Inaccurate advisory comments create false obligations for future developers. Code-reviewer M1/M2 and spec-reviewer AC1/U1 all identified cases where comments did not match actual SQL standard or SQLite behavior.
source: cycle-023, cross-reference CR3
