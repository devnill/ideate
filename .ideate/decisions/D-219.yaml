id: D-219
type: domain_decision
domain: artifact-structure
title: "Cycles are NOT first-class graph nodes; cycle numbers are scalar fields on other artifacts"
description: >-
  Cycles are not node-level artifacts in the current graph ontology. Cycle
  numbers appear as scalar fields on other artifacts (finding.cycle,
  work_item.cycle_created, work_item.cycle_modified, etc.). cycle_summary
  documents cover a cycle's output but do not represent the cycle as an entity.
  The belongs_to_cycle edge type exists solely to link journal_entry nodes to
  their cycle_summary node — it does not imply that a 'cycle' node exists in the
  graph. Queries like 'all findings from cycle 42' are answered via field
  filters (WHERE cycle = 42), not via graph traversal from a cycle node.
  This is a deliberate design: treating cycle as a coordinate/label rather than
  an entity avoids introducing a node type that would require registration,
  lifecycle management, and edge wiring for each new cycle.
rationale: >-
  Cycle is a coordinate, not a semantic entity. Promoting cycle to a first-class
  node would add ceremony (new artifact type, registration on cycle open, edges
  from every finding/work-item to their cycle node) for a traversal benefit
  that has not emerged as a common query pattern at current scale. Field-filter
  queries on cycle number are simpler and sufficient. The belongs_to_cycle edge
  retains its narrow scope (journal_entry → cycle_summary) without implying a
  richer cycle-node ontology.
reexamination_trigger: >-
  If cross-cycle traversal queries (e.g., 'show all findings across cycles 40-50'
  or 'cycle belongs-to-phase belongs-to-project' graph walks) become a common
  query pattern, or if a 'cycle belongs-to-phase belongs-to-project' traversal
  is needed, this decision should be revisited and cycle nodes promoted to
  first-class artifacts.
source: "2026-04-17 full-audit gap-analyst M1"
cycle: 79
status: settled
