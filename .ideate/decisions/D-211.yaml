description: "Metrics emission infrastructure is soft-deprecated: ideate_emit_metric is a no-op; handleGetMetrics remains functional for backward-compatible reads."
rationale: As of WI-790, ideate_emit_metric returns the sentinel string 'Metric emission deprecated — event not recorded.' and writes no data. handleGetMetrics still queries the legacy metrics table so historical reads work. Tool descriptions carry a 'Deprecated —' prefix so skill/agent authors see the status at call sites. The metric stream had become a source of coupling between skills and the storage layer (Leak 7 — direct ctx.db usage inside handleGetMetrics) without a corresponding product surface; neutering emission and leaving reads intact avoids expanding the leak while preserving compatibility. A future cycle can remove the read path once confirmed unused. Callers that previously relied on the metric stream must be updated to use alternative observability channels.
