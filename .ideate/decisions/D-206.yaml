id: D-206
type: domain_decision
title: server.ts:selectAdapter is the sole acceptable concrete adapter reference
domain: agent-system
decision: The only location in the codebase that may reference concrete adapter implementations (LocalAdapter, RemoteAdapter) is the selectAdapter function in server.ts. All other code must interact through the abstract StorageAdapter interface.
rationale: Identified during PH-042 spike. Concentrating concrete references in one dispatch point enforces the adapter abstraction boundary and prevents coupling leaks.
