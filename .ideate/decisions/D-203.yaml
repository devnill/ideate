id: D-203
type: domain_decision
title: Use Number.isFinite() for numeric range validation
decision: All numeric parameter validation that checks finite ranges must use Number.isFinite() before or in conjunction with comparison operators. Bare comparisons (value > 0, value < 1) are insufficient because IEEE-754 NaN returns false for all comparisons, silently passing guards.
rationale: Cycle 025 found that alpha and convergence_threshold accepted NaN inputs because the validation predicates used bare comparison operators. edge_type_weights already used Number.isFinite() correctly and served as the reference pattern.
source: cycle 025, code-quality S1/EC1
