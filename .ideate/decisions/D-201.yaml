id: D-201
type: domain_decision
domain: artifact-structure
title: ValidatingAdapter decorator pattern adopted for input validation centralization
decision: Input validation is implemented as a ValidatingAdapter decorator wrapping StorageAdapter. All 21 methods validated before delegation to inner adapter. CYCLE_SCOPED_TYPES (6 types) defined in validating.ts and exported for writer.ts import. WI-771 scope limited to writer.ts — context.ts, reader.ts, index.ts deferred.
rationale: Decorator separates validation from storage logic, allows independent testing, applies uniformly across adapter implementations. Scope limitation to writer.ts was a risk reduction decision that left traverse/reader validation as dead code in production.
