id: D-202
type: domain_decision
domain: artifact-structure
title: Pragmatic spec criterion deviations in ValidatingAdapter
decision: "Four WI-768 acceptance criteria deliberately diverged from: (1) nextId cycle validation delegated to inner adapter, (2) token_budget accepts non-negative not positive, (3) removeEdges empty edge_types is no-op not error, (4) selectAdapter wrapping at call site not inside function. Each documented in code/tests."
rationale: Implementation reality where spec criteria did not account for edge cases or architectural constraints. Deviations reflect pragmatic judgment.
