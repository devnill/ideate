id: D-205
type: domain_decision
title: Normalization framed as anti-pattern for PPR edge type handling
domain: agent-system
decision: Edge type case normalization (normalizeEdgeType in ppr.ts) is treated as an anti-pattern masking poor implementation. The system should use a single canonical case convention (lower_snake_case) throughout rather than normalizing at runtime.
rationale: "User directive during PH-042 spike: 'normalization at this juncture is an anti-pattern hiding poor implementation.' The normalizeEdgeType function masks a case mismatch between ppr.ts defaults (UPPER_SNAKE_CASE) and schema.ts/config.ts (lower_snake_case)."
