id: D-208
type: domain_decision
title: Prefer composed StorageAdapter calls over new interface methods
domain: agent-system
decision: When extending adapter functionality, use composed StorageAdapter calls (queryNodes + getNodes + readNodeContent) rather than adding new methods to the StorageAdapter interface. New interface methods should only be added when composition is provably insufficient.
rationale: Composition avoids expanding the adapter contract surface, keeps implementations simpler, and maintains backward compatibility. Adding interface methods forces all adapter implementations to update.
