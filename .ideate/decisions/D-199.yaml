id: D-199
type: domain_decision
domain: artifact-structure
title: Schema test describe blocks must follow consistent assertion pattern
decision: Every extension table describe block in schema tests must include NOT NULL constraint tests and a cols.length assertion, matching the pattern established in the nodes table tests. Cycle 23 review found that 8 new WI-764 describe blocks and the projects/phases blocks all omitted these standard assertions.
rationale: Three independent reviewers (code-reviewer M3, spec-reviewer N1, gap-analyst MI2) independently flagged the same omission pattern. When extension tables skip assertions that the primary table includes, regressions in those tables go undetected.
source: cycle-023, cross-references CR1 and CR2
