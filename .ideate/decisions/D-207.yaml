id: D-207
type: domain_decision
title: Edge loading scope (D5) classified as non-remediable architectural constraint
domain: agent-system
decision: The structural difference between local PPR (full SQLite graph) and remote PPR (scoped to org_id/codebase_id) is classified as non-remediable by code changes alone. It must be documented as an architectural constraint. Equivalence tests must verify structural properties (seed presence, always_include_types, budget) rather than score ordering.
rationale: Local and remote operate on fundamentally different graph scopes. Score distributions are structurally incomparable. No code change can reconcile scores across different graph sizes.
