type: domain_decision
title: PH-042 research artifacts placed in steering/research/ instead of research/
domain: artifact-structure
decision: During PH-042, three RF-* research artifacts were stored in steering/research/ rather than the top-level research/ directory. This was identified as unintentional. The canonical location remains unresolved (see Q-156).
rationale: The artifact structure spec defines research/ as the location for RF-*.yaml files. 18 prior RF-* files all reside in research/. The steering/research/ placement was not deliberate.
