source: WI-916 criterion 2
title: WI-916 smoke test for permission denial is deferred — requires manual Claude Code session verification
description: "WI-916 criterion 2 required a smoke test verifying Edit on .ideate/ paths fails fast. Automated test of Claude Code permission rules requires a live session; vitest cannot simulate Claude Code's permission layer. Deferred via this decision. A future shell-script smoke test invoking `claude --no-permission Edit(.ideate/test.yaml)` and asserting permission-denied exit code could close this; filed as a follow-up consideration. The structural enforcement (settings.json deny rules) is in place and verified by code inspection; only runtime verification is deferred."
rationale: Automation-test coverage against live Claude Code session behavior is out of scope for unit tests; accept as known test-gap; rely on code inspection + live-session smoke test (unautomated).
reexamination_trigger: If permission rules fail in practice (observed filesystem write to .ideate/ despite deny rules) or if a shell-script smoke test becomes feasible.
