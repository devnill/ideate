id: D-218
type: domain_decision
domain: artifact-structure
title: "belongs_to_domain edge target_id stores domain name strings despite FK to nodes.id"
description: >-
  The belongs_to_domain edge type stores domain name strings ('workflow',
  'artifact-structure', 'agent-system', 'project-boundaries') in target_id.
  The edges table has a FK constraint target_id → nodes.id with onDelete cascade
  (defined in db.ts), but domain names are never registered as node IDs in the
  nodes table. In practice, no node ID matches a domain name string, so the FK
  never resolves and the cascade never fires. This is a latent structural
  violation: the FK exists but is hollow. Accepted as-is. Domain names act as
  pseudo-identifiers sufficient for current query patterns (filter artifacts by
  domain name string match). The FK constraint does not currently cause data
  integrity failures because no real node bears a domain-name ID.
rationale: >-
  Domain names act as stable pseudo-identifiers at current scale. Introducing
  real domain nodes (a new node type with domain-name IDs) would make the FK
  meaningful but add schema ceremony — a new artifact type, registration
  tooling, migration — for a query benefit that is not yet needed. The latent
  violation is acknowledged and accepted; the risk of a false cascade is
  impossible in practice because node IDs are UUID/slug patterns, not bare
  domain name strings.
reexamination_trigger: >-
  If domain nodes are ever introduced as first-class artifacts (new node type
  with domain-name IDs such as 'workflow', 'artifact-structure', etc.), the FK
  becomes load-bearing and this decision must be revisited to ensure cascade
  behaviour is intentional.
source: "2026-04-17 full-audit gap-analyst M2"
