id: D-184
type: domain_decision
domain: artifact-structure
title: EdgeType must be imported, not relied on via re-export, in adapter.ts
body: In adapter.ts, EdgeType must be explicitly imported via `import type { EdgeType } from './schema.js'`. The existing `export type { EdgeType }` statement only makes the type available to downstream consumers — it does not introduce the name into scope in the file itself. Under NodeNext module resolution, re-exporting a type is not equivalent to importing it. This is the direct cause of 4 TS2304 build failures (adapter.ts:106,169,181,309).
status: settled
source: C1 full-audit 2026-04-09
