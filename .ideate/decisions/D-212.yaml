id: D-212
type: domain_decision
domain: agent-system
title: CONTAINMENT_EDGE_TYPES is not dead code; RF-clean-interface-proposal D2 premise was false
decision: CONTAINMENT_EDGE_TYPES in mcp/artifact-server/src/ppr.ts is retained. It is actively used at ppr.ts:190 inside the edge-loading loop to skip containment-type edges (owns_codebase, owns_project, has_phase, has_work_item, owns_knowledge, references_codebase) during PPR adjacency construction. Removing it would change PPR scoring semantics because containment edges would then propagate score and inflate hub nodes (projects, phases) relative to dependency-bearing edges.
context: Research findings file RF-clean-interface-proposal §3 (D2) claimed the constant was dead code and recommended removal. That claim seeded WI-798 (cycle 32 refinement for PH-045). Pre-execution grep verification (per P-30 and P-76 spec-verification policies) during cycle 1 autopilot execution on 2026-04-14 located the active use and triggered an Andon event.
rationale: "Two lessons: (1) research findings marked 'P2 low-risk cleanup' are not exempt from spec verification. Future refinements must verify dead-code claims with grep or callgraph analysis before creating cleanup work items. (2) When a research finding's premise can be contradicted by a single grep, the grep must be run at refinement time, not execution time, to avoid wasted work items and mid-cycle Andon interruptions."
consequences: WI-798 closed as obsolete. WI-799 (the other PH-045 work item that originally depended on WI-798) is independent on re-examination and proceeds standalone. CONTAINMENT_EDGE_TYPES stays in source. Other declaration sites (reader.ts independent declaration, equivalence-helpers.ts test helper) are left as-is under WI-800 scope boundaries — can be consolidated later under a separate DRY work item if it surfaces in a subsequent review.
