id: D-204
type: domain_decision
title: Adapter-integrated modules require integration test file in tests/adapters/
decision: New modules that participate in the adapter layer must have a dedicated integration test file under tests/adapters/ in addition to any unit tests.
rationale: Cycle 025 found that edge_type_weights had unit tests but no integration test file in tests/adapters/. The unit-test requirement (P-43) was satisfied but the integration boundary was untested.
