description: max_nodes is a post-sort result-count cap at the adapter traverse layer, not a PPR computation input.
rationale: After WI-789, computePPR() treats max_nodes as informational and returns every reachable node ranked by score. LocalContextAdapter.traverse() then applies `ranked = ranked.slice(0, maxNodes)` after sorting, which caps the number of ranked nodes returned to the caller. Always-include types and seed nodes are not counted against this cap. This fixed the earlier bug where a small max_nodes (e.g. 10) caused PPR to abort early with incorrect scoring on large graphs. The sort-then-slice shape guarantees deterministic top-N behavior regardless of graph size and keeps the adapter contract free of PPR implementation details. The remote adapter exposes the same observable behavior (ranked_nodes.length <= max_nodes) but its ordering is not comparable to local adapter ordering (see D-5).
