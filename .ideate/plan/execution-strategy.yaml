  # Execution Strategy — Cycle 23 (Full-Audit Correction)

  ## Mode
  Batched parallel — all 6 work items are independent (non-overlapping file scope, no data dependencies).

  ## Parallelism
  Max parallelism: 6 (all items in one group, all concurrent)

  ## Worktree Configuration
  Enabled for code-change items (WI-736, WI-737, WI-738, WI-739, WI-741).
  Disabled for WI-740 (MCP artifact-only, no file changes).

  ## Review Cadence
  Incremental review per item on completion. Full capstone review not required for this cycle — all changes are targeted corrections with machine-verifiable acceptance criteria.

  ## Work Item Groups

  ### Group 1 (all parallel)
  - WI-736: adapter.ts EdgeType import (low, ~1 line)
  - WI-737: adapter-contract.test.ts type fixes + getDomainState filter test (small, depends on WI-736 for clean tsc output but can execute independently)
  - WI-738: indexer.test.ts drizzle type fix (small, 16 occurrences)
  - WI-739: ALL_NODE_TYPES structural test (small)
  - WI-740: architecture doc update via MCP (low, artifact-only)
  - WI-741: pretest.js process.exit(1) removal (low, ~2 lines)

  ## Dependency Graph
  WI-737 has a soft dependency on WI-736 (after WI-736 merges, `tsc --noEmit` for adapter.ts will be clean; WI-737 can still execute independently since it touches a different file). All other items are fully independent.

  ## Agent Configuration
  Model: sonnet (all workers)
  All items are trivial to small — no opus needed.
