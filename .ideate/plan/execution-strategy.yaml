content: |
  # Execution Strategy — Cycle 29 Documentation Sync

  ## Mode

  **Batched parallel** — all three work items have single-file, non-overlapping scope and no dependencies. Run in a single concurrent batch.

  ## Parallelism

  - Max parallelism: 3 (one worker per work item).
  - Worktrees: not required (scopes do not overlap, but worktrees are harmless if the agent team framework provisions them by default).

  ## Review cadence

  - **Incremental review**: per work item on completion (default).
  - **Capstone review**: not required for this cycle. The scope is too small to justify the full /ideate:review cycle. Optionally, a /ideate:review --domain workflow may be run after execution to confirm domain-layer alignment.

  ## Work item groups

  ### Group 1 (parallel)
  - WI-791 — adapter-contract.md update
  - WI-792 — ARCHITECTURE.md update
  - WI-793 — tools/index.ts readOnlyHint annotation

  ## Dependency graph

  All three items have empty `depends` and `blocks`. DAG is three disconnected nodes.

  ## Agent configuration

  - Worker model: sonnet (default; overrides from config.json apply if set).
  - Work item type: all three are `chore` — minimal context expected (spec + direct file targets).

  ## Success criteria

  - All three work items reach status `done`.
  - Incremental reviewers return `pass` for each.
  - No regressions in the existing tools.test.ts suite (affects WI-793).
