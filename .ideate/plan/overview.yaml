body: |-
  ## What is changing and why

  Three targeted test fixes addressing the Fail verdict from the cycle 21 capstone review. All changes are confined to test files — no production code changes.

  ## Triggering context

  Cycle 21 review returned Fail with two significant findings:
  - S1: `src/__tests__/schema.test.ts` lists 15 extension tables; `schema.ts` creates 16 (`proxy_human_decisions` added in WI-748). The stale count provides false assurance — dropping the table from createSchema would not be caught.
  - S2: `putNodeForJournal` Phase 2 rollback path (`writer.ts:1639-1648`) — the `fs.writeFileSync` throw → DELETE placeholder cleanup branch — has zero test coverage.

  Minor carry-forward: `migrations.test.ts` lacks coverage for the error path (migration fn throws), multi-step chain (v3→v4→v5), and no-registry-entry silent bump.

  ## Scope boundary

  Only these files change:
  - `src/__tests__/schema.test.ts` (WI-751)
  - `src/__tests__/write-transaction.test.ts` (WI-752)
  - `src/__tests__/migrations.test.ts` (WI-753)

  No production code changes.

  ## Expected impact

  All three test files pass cleanly. schema.test.ts correctly reflects the 16-table schema. write-transaction.test.ts covers the Phase 2 cleanup branch. migrations.test.ts covers error and multi-step scenarios.
