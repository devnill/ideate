  # Change Plan — Cycle 23 (Full-Audit Correction)

  ## Trigger
  Full audit review 2026-04-09. 1 critical finding, 6 significant findings across code-reviewer, spec-reviewer, and gap-analyst.

  ## What Is Changing

  1. **WI-736** — `adapter.ts`: Add `import type { EdgeType } from "./schema.js"` (1-line fix for 4 TS2304 build errors)
  2. **WI-737** — `adapter-contract.test.ts`: Fix 4 TypeScript type errors + add getDomainState deprecated/superseded filter test
  3. **WI-738** — `indexer.test.ts`: Fix 16 TypeScript errors (untyped drizzle instance)
  4. **WI-739** — `tests/adapters/always-include-types-validation.test.ts`: Replace hardcoded expectedTypes with structural TypeScript exhaustiveness check (P-59 compliance)
  5. **WI-740** — Architecture doc (via MCP): Update stale counts (12→16 ext tables, 10→16 edge types, 17→22 tools, v1→v5 schema) + rename `ideate_get_work_item_context` → `ideate_get_artifact_context`
  6. **WI-741** — `scripts/pretest.js`: Remove `process.exit(1)` calls — advisory stderr warnings only

  ## What Is NOT Changing
  - Runtime behavior of any adapter or MCP tool
  - Schema, database, or YAML structure
  - Any logic beyond the targeted fixes listed above

  ## Scope Boundary
  - 5 source/test files + 1 artifact-only (architecture doc)
  - No new features, no architectural changes
  - All changes are correctness/compliance fixes from the full audit

  ## Expected Impact
  - `npm run build` succeeds (C1 fix)
  - `npx tsc --noEmit` reports 0 errors (all TypeScript fixes)
  - P-59 enforcement becomes self-maintaining (compile-time check)
  - P-35, P-38 compliance restored (architecture doc update)
  - P-73 compliance (pretest.js fix)
  - P-72 compliance (getDomainState contract-level test)
