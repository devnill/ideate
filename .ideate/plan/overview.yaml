description: |-
  Post-review correction cycle addressing cycle 22 capstone review findings. Two significant and four minor issues prevent PH-041 (Input Validation Layer) from being declared complete.

  ## What Is Changing

  1. **Remove context.ts traverse inline validation** — WI-771 removed validation from writer.ts but missed context.ts. All traverse input validation (seed_ids, alpha, token_budget, max_iterations, always_include_types, convergence_threshold, max_nodes) is removed from context.ts. ValidatingAdapter is now the sole validation gate for traverse().

  2. **Reconcile alpha=0 boundary** — ValidatingAdapter accepted alpha=0 but ppr.ts rejects it (alpha=0 means zero seed influence, semantically useless for context assembly). ValidatingAdapter tightened to (0, 1] matching ppr.ts.

  3. **Update test files** — seed-ids-validation.test.ts and always-include-types-validation.test.ts wrap LocalAdapter in ValidatingAdapter. Error code assertions updated (INVALID_ALWAYS_INCLUDE_TYPE → INVALID_NODE_TYPE).

  4. **Add missing test coverage** — batchMutate MISSING_NODE_ID/MISSING_NODE_TYPE and traverse INVALID_SEED_IDS paths get tests.

  5. **Fix P-75 violation** — Remove fixture array length assertion from local-adapter-validation.test.ts.

  ## What Is NOT Changing

  - reader.ts and index.ts inline validation (carry-forward, not blocking PH-041 completion)
  - ppr.ts algorithm-level guards (defense-in-depth, intentionally retained)
  - ValidatingAdapter core structure
  - RemoteAdapter (already clean from WI-772)

  ## Scope Boundary

  This cycle resolves only the findings that block PH-041's phase goal. reader.ts/index.ts cleanup is a carry-forward item for a future phase.
content: |-
  # Overview — PH-043 Change Plan

  ## What is changing

  Three P0 bugs in the MCP artifact server adapter layer that make RemoteAdapter effectively non-functional and make `ideate_assemble_context` unusable at workspace scale:

  1. **Leak 1-2 — context.ts LocalContextAdapter cast** (WI-785). tools/context.ts contains `ctx.adapter as unknown as LocalContextAdapter` reaching five query methods that are not on the StorageAdapter interface. Crashes RemoteAdapter.
  2. **Leak 5-6 — execution.ts raw SQL** (WI-786). tools/execution.ts calls `ctx.db.prepare()` directly with no adapter fallback. The only tool handler without an adapter path. Crashes RemoteAdapter.
  3. **Budget violation — always_include_types** (WI-787). LocalContextAdapter.traverse always-include loop ignores `token_budget`, pulling every architecture/guiding_principle/constraint artifact into results regardless of size. User-observed 226K character overflow 2026-04-13.

  ## Triggering context

  - PH-042 spike (WI-781, WI-782, WI-783, WI-784) produced RF-abstraction-boundary-audit, RF-ppr-divergence-catalog, RF-equivalence-test-audit, and RF-clean-interface-proposal. The proposal identifies 12 abstraction leaks and 6 PPR divergences across four implementation phases (P0-P3).
  - User bug report 2026-04-13: `ideate_assemble_context` returned 226,481 characters, exceeding MCP tool result limits. Root-caused to the always_include_types loop in LocalContextAdapter.traverse at local/context.ts:225-291. This bug is not in the original PH-042 catalog — it is additional input to this phase.

  ## Scope boundary

  **In scope (PH-043)**: The three P0 items above.

  **Out of scope**: All P1, P2, P3 items from RF-clean-interface-proposal. They follow in later phases:
  - P1: max_nodes semantic alignment (D4), metrics.ts raw SQL (Leak 7), always_include_types case forwarding re-evaluation
  - P2: CONTAINMENT_EDGE_TYPES dead code (D2), edge type case normalization (D1), test-only adapter fallbacks (Leaks 3,4,8-12)
  - P3: Five equivalence test additions (readNodeContent, archiveCycle, queryGraph, countNodes, traverse structural assertions)

  This scoping is deliberate: RemoteAdapter is non-functional for three critical tool handlers today. P0 restores it. P1-P3 tighten the contract further without unblocking anything new.

  ## Expected impact

  - RemoteAdapter no longer crashes for `ideate_get_context_package`, `ideate_assemble_context`, or `ideate_get_execution_status`.
  - `ideate_assemble_context` with default arguments returns results under 60000 tokens on the current workspace (down from 226K+ today).
  - Adapter boundary invariant: no tool handler imports concrete adapter classes; no tool handler accesses ctx.db or ctx.drizzleDb directly.
  - Three new adapter-integration tests land in tests/adapters/ for the budget and execution-status equivalence paths.

  ## References

  - **Research**: RF-clean-interface-proposal (WI-784), RF-abstraction-boundary-audit (WI-781), RF-ppr-divergence-catalog (WI-782), RF-equivalence-test-audit (WI-783)
  - **Bug source files**: mcp/artifact-server/src/tools/context.ts (Leak 1-2), mcp/artifact-server/src/tools/execution.ts (Leak 5-6), mcp/artifact-server/src/adapters/local/context.ts (D3 budget bug)
  - **Guiding principles**: GP-14 (MCP abstraction boundary)
  - **Policies**: P-83 (adapter boundary), P-84 (composition over new methods)
  - **Constraints**: C-06 (non-overlapping scope — serialized WI-785 → WI-787 for adapter file overlap)
