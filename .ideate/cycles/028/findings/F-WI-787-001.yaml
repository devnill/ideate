summary: "AC-3 unverified: no RemoteAdapter test exercises always_include_types budget overflow. Client-side enforcement code exists but has no regression guard. Plus M1 (wasted disk I/O in always-include loop) and M2 (AC-1 test title wording)."
body: |
  ## Verdict: Fail

  AC-3 is machine-verifiable and is not met: no test exercises RemoteAdapter with `always_include_types` budget overflow. A secondary significant finding is an O(N) disk read problem in the always-include loop introduced by this work item.

  ## Critical Findings

  None.

  ## Significant Findings

  ### S1: AC-3 — RemoteAdapter budget enforcement has no test coverage for always_include_types overflow

  - **File**: `mcp/artifact-server/src/adapters/remote/index.ts:853-909`
  - **Issue**: AC-3 states "RemoteAdapter.traverse exhibits the same budget-enforcement behavior." The client-side enforcement code exists and reads correctly, but there is no test that exercises the RemoteAdapter with `always_include_types` set and a token budget small enough to cause overflow. `always-include-types-budget.test.ts` is LocalAdapter-only. The adapter-contract AC-5 test runs via `itTraverse` which is LocalAdapter-only in the current invocation. `equivalence-traverse.test.ts` does test `always_include_types` against both adapters but never with a token_budget that triggers overflow, so `budget_exhausted` and `truncated_types` are never exercised for the remote path.
  - **Impact**: The RemoteAdapter's `truncated_types` logic (lines 893-896) and `budgetExhausted` tracking have no regression guard. A future refactor to the client-side enforcement loop could silently break AC-3 for the remote path.
  - **Suggested fix**: Add a test in `tests/adapters/equivalence-traverse.test.ts` or a new `tests/adapters/remote-budget.test.ts` that seeds many large `guiding_principle` nodes and calls `traverse({ seed_ids: [...], token_budget: 1000, always_include_types: ['guiding_principle'] })` on both adapters (skipping when remote unavailable), then asserts `budget_exhausted === true` and `truncated_types` is non-empty on the remote result.

  ## Minor Findings

  ### M1: Always-include loop reads file content before budget check — O(N) disk I/O wasted on truncated nodes

  - **File**: `mcp/artifact-server/src/adapters/local/context.ts:287-315`
  - **Issue**: The always-include loop calls `readFileContent(row.file_path)` unconditionally before the budget gate. Since `row.token_count` is always populated in the DB (written by `putNode` in `writer.ts`), the budget check could be performed using `row.token_count` without reading the file. For a workspace where `always_include_types` contains `work_item` with 500 entries and the budget allows only 10, this causes 490 wasted synchronous file reads.
  - **Suggested fix**: Check budget gate using `row.token_count` before reading content; fall back to reading content only when `token_count` is null.

  ### M2: AC-1 spec text is inconsistent with the seed force-include semantics

  - **File**: `mcp/artifact-server/tests/adapters/always-include-types-budget.test.ts` AC-1 test title
  - **Issue**: AC-1 states "cumulative usedTokens at end of always-include loop never exceeds token_budget without the loop exiting." Seeds cause `usedTokens` to exceed `token_budget` without the loop exiting — the loop continues to skip subsequent non-seeds via `continue`, not `break`. The test labelled "AC-1" correctly validates the non-seed constraint but its description says "stays within budget (excluding seeds)" which is the correct invariant, not the AC-1 wording.
  - **Suggested fix**: Update the AC-1 test title to: `"AC-1: non-seed cumulative usedTokens at end of always-include loop never exceeds token_budget"`. Documentation-only.

  ## Unmet Acceptance Criteria

  - AC-3 — unverified by tests. Client-side enforcement code is present but no test calls `traverse` on RemoteAdapter with enough `always_include_types` nodes to trigger `budget_exhausted` and verify `truncated_types`.

  ## Acceptance Criteria Checklist

  - [x] AC-1 (satisfied; test title wording noted as M2)
  - [x] AC-2
  - [ ] AC-3 — unverified for RemoteAdapter overflow path
  - [x] AC-4
  - [x] AC-5
  - [x] AC-6 (decision recorded in WI-787 notes and as interface invariant in adapter.ts JSDoc)
  - [x] AC-7

