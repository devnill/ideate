summary: "Rework verdict: Pass. S1 addressed by equivalence-traverse dual-adapter test (passes end-to-end against Docker RemoteAdapter). M1 fixed by fast-path budget check using row.token_count before reading file content. M2 fixed by renaming AC-1 test title."
body: |
  ## Verdict: Pass (rework)

  Rework of F-WI-787-001 addresses all three findings.

  ## S1 addressed (AC-3 verified end-to-end)

  Added dual-adapter test in `tests/adapters/equivalence-traverse.test.ts` within the existing `always_include_types` suite:

  ```
  traverse(WI-001, token_budget=1, always_include_types=['guiding_principle', 'constraint'])
  ```

  Assertions:
  - Both adapters set `budget_exhausted === true`
  - Both adapters populate `truncated_types` as a non-empty array
  - `truncated_types` is a subset of the always_include_types set
  - Local and remote `truncated_types` contents agree

  Verified end-to-end against the Docker test stack (docker compose -f docker-compose.test.yml up -d). The new test **passed**; the 14 other failures in the equivalence-traverse suite are pre-existing (confirmed by stashing and rerunning) and unrelated to WI-787.

  ## M1 fixed

  Fast-path budget check in `src/adapters/local/context.ts` always-include loop: non-seed rows with a populated `token_count` are gated on the budget BEFORE `readFileContent` runs. The fallback path (token_count === null) still reads content to estimate tokens and then re-checks the budget. Eliminates the O(N) wasted disk read when many always-include artifacts would be truncated.

  ## M2 fixed

  AC-1 test title renamed to: "AC-1: non-seed cumulative usedTokens at end of always-include loop never exceeds token_budget". This matches the documented invariant (seeds are force-included; non-seeds are budget-gated).

  ## Dynamic verification

  | Command | Outcome |
  |---|---|
  | `pnpm exec tsc --noEmit` | Clean |
  | `pnpm test --run tests/adapters/always-include-types-budget.test.ts` | 7/7 passed |
  | `pnpm test --run src/__tests__/adapter-contract.test.ts` | 92/92 passed |
  | `pnpm test --run` (full suite, Docker down) | 1395 passed / 329 skipped / 0 failed |
  | `pnpm test --run tests/adapters/equivalence-traverse.test.ts` (Docker up) | new WI-787 test passed; 14 pre-existing failures unrelated |

  ## Acceptance Criteria Checklist (post-rework)

  - [x] AC-1 (test title corrected)
  - [x] AC-2
  - [x] AC-3 (dual-adapter test confirms RemoteAdapter enforces budget and surfaces `budget_exhausted`/`truncated_types`)
  - [x] AC-4
  - [x] AC-5
  - [x] AC-6 (decision + invariant recorded in WI-787 notes and adapter.ts JSDoc)
  - [x] AC-7
