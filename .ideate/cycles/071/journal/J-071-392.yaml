title: phase-decomposition
content: >-
  Decomposed PH-044 (RemoteAdapter P1 divergence fixes) into two work items
  during refinement interview.


  **WI-789** — max_nodes semantic alignment. Pure slice semantic, graph-size
  abort removed from ppr.ts. Local adapter gains the client-side slice
  RemoteAdapter already has. Resolves RF-clean-interface-proposal D4.


  **WI-790** — Soft-deprecate metrics infrastructure. handleEmitMetric becomes
  no-op. handleGetMetrics remains for historical read. Tool descriptions marked
  deprecated. Leak 7 (raw SQL in handleGetMetrics) persists as documented
  limitation — full removal deferred to quality-metrics rebuild phase.


  **Scope change from original PH-044 intent**: Criterion 2 pivoted from
  'refactor metrics.ts raw SQL' to 'soft deprecation' based on user input that
  the current aggregation is distrusted and a future phase should design
  replacement telemetry from scratch. Criterion 3 (always_include_types case
  forwarding, D6) dropped — architect survey confirmed RF's finding that no
  change is needed.


  **New horizon candidate** — PH-047-candidate (Quality metrics rebuild) added
  to PR-002.horizon.later. Will design replacement telemetry and handle full
  removal of deprecated metrics infrastructure (table drop, skill emission
  call-site stripping).


  **Execution strategy** — batched parallel, 2 agents, sonnet, worktrees
  enabled, per-item incremental review. No dependencies between the two work
  items.


  Next action: /ideate:execute will build WI-789 and WI-790 in parallel.
