  ## WI-824 complete — convergence-checker strict canonical-only (option c)


  **Verdict**: Pass after one rework. WI-817 closed as superseded.


  ### Decision recorded

  Fix option (c): convergence-checker reads ONLY canonical-named files
  (spec-adherence.yaml, summary.yaml) and ignores legacy ID-named files (SA-NNN,
  CQ-NNN, GA-NNN, CS-NNN). Rationale: cheapest fix, aligns with post-WI-807
  named-file convention, and makes legacy archives invisible to the convergence
  check by construction rather than by ranking.


  ### Changes

  - `mcp/artifact-server/src/adapters/local/reader.ts:1083-1101` — removed
  dbContentRow fallback entirely. `targetRow = adherenceRow ?? summaryRow`.
  Comment block updated to document that rebuildIndex populates da.cycle from
  YAML (so da_content presence is not a safe provenance guard).

  - `mcp/artifact-server/src/__tests__/tools.test.ts` — new regression test
  `regression WI-824 (reindex-leak)` at cycle 203: legacy SA-203.yaml node +
  document_artifacts row with da.cycle=203 and non-null content, no canonical
  file → cycle_summary_content is null. Pre-existing tests refactored to use
  canonical ids (spec-adherence-NNN) since SA-NNN/CS-NNN fallbacks removed.


  ### Rework cycle

  First review caught Significant S1: initial fix introduced `dbContentRow`
  preference for any row with da_content !== null. That matched legacy SA-NNN
  rows after reindex populated da.cycle from YAML. Second pass removed
  dbContentRow entirely (Option B from review); canonical writes via
  writeArtifact already produce canonical file names which
  adherenceRow/summaryRow catch.


  ### Test suite

  1421 passed / 332 skipped / 0 failures.


  ### Scope note

  Re-review flagged `ppr.ts` as an undeclared scope modification (Minor M1).
  That change pre-existed WI-824 (unstaged delta from prior WI-789 work, visible
  in initial git status). Not introduced by this work item — no action.


  ### RemoteAdapter

  Not modified. Remote getConvergenceData delegates to GraphQL and has no
  file-path fallback chain to fix. Any equivalent bug in the remote server is
  out of scope and tracked separately.


  ### Cycle 7 progress

  Done: WI-825, WI-826, WI-824, WI-817 (closed-superseded). Remaining: WI-827
  (getMetricsEvents contract test).
