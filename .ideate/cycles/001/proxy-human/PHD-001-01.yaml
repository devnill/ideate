  - "Update WI-799: change scope from mcp/artifact-server/src/context/ppr.ts to mcp/artifact-server/src/ppr.ts; clear depends (drop WI-798 edge)."
  - Write D-212 documenting the false D2 premise from RF-clean-interface-proposal so future refinements catch similar cases.
