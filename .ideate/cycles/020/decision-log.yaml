content: |-
  ## Decision Log — Full Audit (2026-04-09)

  ### Confirmed Issues

  **C1 — Build-breaking: EdgeType not in scope in adapter.ts**
  Line 96 uses `export type { EdgeType }` which does not bring `EdgeType` into local scope under NodeNext module resolution. Four interface definitions reference `EdgeType` directly. `npm run build` will fail with 4 TS2304 errors. Fix: add `import type { EdgeType } from "./schema.js"` to adapter.ts.

  **S1 — TypeScript errors in test files (CI blocker)**
  18 TypeScript errors across `adapter-contract.test.ts` and `indexer.test.ts` caught by `tsc --noEmit` but masked by vitest esbuild.

  **S2-spec — Architecture doc stale counts**
  12 extension tables (actual 16), 10 edge types (actual 16), Tools(17) (actual 22), Schema v1 (actual v5).

  **S1-spec — Superseded tool name**
  `ideate_get_work_item_context` in architecture doc (actual: `ideate_get_artifact_context`).

  **SF3 — pretest.js blocks npm test**
  `process.exit(1)` in pretest.js blocks fresh-checkout `npm test`.

  ### Cross-Reviewer Correlations

  **CR1: P-59 ALL_NODE_TYPES exhaustiveness** (code-reviewer S2 + gap-analyst SF1)
  Both flag the same gap: the hardcoded `expectedTypes` list in the sync test cannot self-enforce P-59. A type-level exhaustiveness check would make the test self-maintaining.

  **CR2: Architecture doc staleness as systemic pattern** (code-reviewer C1 + spec-reviewer S2)
  Edge type count in architecture doc (10) matches the count when EdgeType was first defined; the actual count grew to 16 without a doc update. Both C1 and S2 trace to the same schema evolution event being incompletely propagated.

  **CR3: getDomainState deprecation gap** (gap-analyst SF2 + adapter-contract.md)
  Gap-analyst characterizes the deprecated/superseded filter as a contract-level gap; adapter-contract.md does not include a deprecation notice. Minor contradiction requires clarification.

  ### Open Questions for User

  1. EdgeType import omission — is `dist/` a pre-regression build? Mechanical fix (one line) but must be done before next merge.
  2. Should ALL_NODE_TYPES use a type-level exhaustiveness check?
  3. Are the 18 TypeScript errors in test files known? Is there a tsconfig exclusion plan?
  4. Architecture doc update — work item now, or deferred maintenance pass?
  5. Is getDomainState deprecated? If so, contract doc needs a deprecation notice.
  6. How should pretest.js be fixed to not block fresh-checkout npm test?
  7. What is the implementation timeline for the 9 merge-design decisions from WI-717?
  8. What is the timeline for implementing graph edge coverage improvements from WI-715?

  ### Project Health Assessment

  The StorageAdapter validation layer is complete and correct. 1166 tests pass with 0 failures. Two items require immediate action before the next build: (1) EdgeType import omission in adapter.ts is build-breaking, and (2) architecture doc has diverged significantly from the actual system. The graph curation analysis (PH-038) surfaced three substantive deferred items: sparse edge connectivity, non-canonical legacy node types, and a multi-.ideate merge design blocked on 9 user decisions.
