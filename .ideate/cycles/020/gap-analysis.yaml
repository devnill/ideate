content: |-
  ## Gap Analysis — Full Audit

  **Verdict**: Fail

  ### Critical Findings
  None.

  ### Significant Findings

  **SF1: No test verifying ALL_NODE_TYPES exhaustively covers the NodeType union (P-59)**
  - P-59 requires a CI check or unit test. No test for `ALL_NODE_TYPES` exists in `src/__tests__/`. `NodeType` is a 27-member union; `ALL_NODE_TYPES` is a manually maintained parallel array. TypeScript does not enforce exhaustiveness of `readonly` arrays against union types at compile time. A missed type in `ALL_NODE_TYPES` causes silent `INVALID_NODE_TYPE` failures for valid types.
  - **Recommendation**: Add test: verify `ALL_NODE_TYPES` length matches expected count and contains all known `NodeType` values.

  **SF2: getDomainState deprecated/superseded filter tested only at tool level, not adapter-contract level**
  - WI-734 verified the filter via `tools.test.ts` (`handleGetDomainState`). No test in `adapter-contract.test.ts` verifies `StorageAdapter.getDomainState` directly excludes deprecated/superseded policies. If the SQL filter is removed from the adapter, the tool-level test still passes. This is a contract gap — RemoteAdapter is not covered.
  - **Recommendation**: Add test to `adapter-contract.test.ts`: insert active, deprecated, and superseded policies; call `adapter.getDomainState()`; assert deprecated and superseded are absent.

  **SF3: `pretest.js` calls `process.exit(1)` blocking `npm test` in fresh checkouts**
  - `scripts/pretest.js` calls `process.exit(1)` when `migrate-to-v3.js` is absent or stale. In a fresh checkout without the pre-built migration JS, `npm test` exits with code 1 and zero tests run. Comment says "advisory-only" but code contradicts this. No tracked work item.
  - **Recommendation**: Replace `process.exit(1)` with `process.stderr.write(...)` only, consistent with stated intent.

  ### Minor Findings

  **MF1**: Equivalence test files listed in `adapter-contract.md:671-675` do not exist (`tests/adapters/` directory is absent).
  **MF2**: ValidationError constructor change (WI-733) has no dedicated regression test; existing tests verify code/message but not constructor signature.
  **MF3**: Q-125 ("skills directories contain only .gitkeep") is stale — `skills/` now has SKILL.md files for 10 skills.
  **MF4**: Watcher→indexer integration test (`watcher.test.ts:200`) does not exercise derivation phase — P-24 gap (low severity; derivation has unit coverage).
  **MF5**: No architecture document for artifact server's own component structure; `docs/` contains only `adapter-contract.md` and two supporting docs.

  ### Suggestions

  **S1**: `ALLOWLISTED_COMMANDS` in `hooks.ts` includes `cat` and `ls` — consider whether these expand the command surface unnecessarily.
  **S2**: `adapter-contract.test.ts` getDomainState test verifies an active policy appears but does not assert `decisions` and `questions` arrays are also present.
