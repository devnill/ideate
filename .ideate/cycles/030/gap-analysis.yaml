significant_findings:
  - "EC1: executeOnceWithAuth (client.ts:379) calls response.json() without try/catch. executeOnce wraps this identically at lines 322-328. A non-JSON response on the auth-retry path throws raw TypeError instead of StorageAdapterError(PARSE_ERROR). Three-line fix mirroring executeOnce."
  - "II1: Test D (remote-adapter.test.ts:356-358) asserts only instanceof StorageAdapterError for the second-401 path. Both adapter-contract.md and adapter-interface.md document that this throws HTTP_401, not AUTH_FAILURE. The assertion does not verify the code — a regression could silently change it. One-line fix: add .code === 'HTTP_401' to the toSatisfy predicate."
