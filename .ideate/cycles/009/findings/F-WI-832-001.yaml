title: Reviewer findings on P-87 metadata are false positives based on MCP semantics
body: |-
  Reviewer spawned for WI-832 incremental review returned Fail with one Significant (S1) and one Minor (M1) finding. Both findings are rejected as false positives:

  **S1: cycle_modified: 27 vs established_in_cycle: 9**

  Reviewer claimed cycle_modified should match established_in_cycle for a new policy. This is incorrect. The MCP write layer deterministically sets cycle_modified to the current workspace cycle number at write time, not the input value. Verified by inspection of P-85.yaml (established_in_cycle: 31, cycle_modified: 27) and P-86.yaml (established_in_cycle: 8, cycle_modified: 27). All policies in .ideate/policies/ carry cycle_modified: 27 regardless of when they were established. This is the intended provenance-tracking behavior.

  **M1: type: finding in sources entry**

  Reviewer claimed type: finding may not be a canonical artifact type. This is incorrect. Verified by inspection of .ideate/cycles/028/findings/F-CYCLE-28-II1.yaml which carries type: finding as the canonical header. Finding type is established and indexed.

  **Verdict override**: Pass. All functional acceptance criteria satisfied. Policy YAML is valid, sources reference correct artifacts, execute.md integration is correct. The reviewer's misreading does not indicate a defect in the implementation.

  **Source prompt improvement noted**: The incremental-reviewer prompt could be improved to cross-reference existing policy files for metadata pattern norms before flagging field mismatches. This is a meta-concern for the reviewer agent, not a blocker for WI-832.
