title: Reviewer cross-attribution of WI-832 changes + test cycle-number deviation
body: |-
  Reviewer returned Fail with one Significant (S1) and one Unmet Criterion. Both rejected with justification:

  **S1: execute.md modification — misattributed**

  Reviewer observed added "### GP-14 Violation Re-Sync (P-87)" subsection in skills/autopilot/phases/execute.md and flagged it as unscoped to WI-831. This is cross-attribution: the edit was made by the WI-832 worker during the same parallel execute batch. WI-832's scope explicitly includes skills/autopilot/phases/execute.md. The reviewer lacked cross-workitem visibility. The change is in-scope for WI-832 and was correctly reviewed under WI-832's incremental review (F-WI-832-001).

  **Unmet criterion: regression test uses cycle 204 instead of cycle 2**

  The acceptance criterion reads: "legacy SA-NNN.yaml with verdict:Fail in cycles/002/ + passing named files for internal cycle 2 → condition_b:true". The test uses cycle 204. Justification for the deviation:

  1. The WI-824 regression tests (added earlier) already use cycles 201, 202, 203 in tools.test.ts. Cycle 204 is the next unused fixture number continuing that sequence.
  2. Cycle 2 is a very low number reserved for potential real workspace cycle fixtures; using it risks collision with other tests that write to cycles/002/.
  3. The test exercises the IDENTICAL code path (getConvergenceData canonical-only selection). The cycle number is a fixture label, not a semantic parameter: the logic is cycle-number-agnostic.
  4. The criterion intent ("legacy + canonical in same directory → converged:true") is fully satisfied.

  No rework. The criterion text literally prescribed cycle 2; the implementation uses cycle 204 with equivalent semantics. Future refinement of the criterion template should allow any fresh fixture cycle number.

  **Verdict override**: Pass. Test suite green (1436/1436); canonical-only logic verified in reader.ts:1093-1100; WI-831 notes document option (c) choice with tradeoff analysis and P-86 alignment.
