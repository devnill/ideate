intent: "Close two P1 items from RF-clean-interface-proposal after PH-043 P0 remediation: (1) max_nodes semantic alignment — remove the graph-size abort in ppr.ts and apply max_nodes as a pure result-count slice in both adapters, matching the client-side slice RemoteAdapter already performs (D4); (2) soft-deprecate the metrics emission infrastructure — bad data is worse than no data, so handleEmitMetric becomes a no-op with its tool description marked deprecated, handleGetMetrics is kept functional for historical reads, and a future phase (PH-047-candidate) will design replacement telemetry. The original third P1 item (always_include_types case forwarding, D6) was re-evaluated and dropped — the architect survey confirmed RF's finding that the existing case conversion is a correct RemoteAdapter implementation detail with no divergence to fix. Cycle 29 refinement added three documentation-sync work items (WI-791, WI-792, WI-793) that align docs and tool metadata with decisions D-210 and D-211. Cycle 31 capstone surfaced three additional doc surfaces still describing pre-decision behavior; WI-794, WI-795, WI-796 close those gaps under guidance of newly minted P-85."
steering: "Preserve adapter-agnostic behavior — LocalAdapter and RemoteAdapter must produce equivalent results within the limits documented in D5. Favor composition over new adapter methods (carried forward from PH-043). No new abstraction leaks: no ctx.db.prepare() in tool handlers, no casts to concrete adapter classes."
