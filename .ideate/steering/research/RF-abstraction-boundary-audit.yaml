id: RF-abstraction-boundary-audit
type: research
title: StorageAdapter Abstraction Boundary Audit
work_item: WI-781
content: |-
  12 abstraction leaks cataloged across tool handlers.

  **Critical (4)**:
  - Leak 1-2: context.ts imports LocalContextAdapter directly and casts StorageAdapter to it via `as unknown as LocalContextAdapter`. Methods queryArchitectureDocument, queryGuidingPrinciples, queryConstraints, queryActiveProject, queryActivePhase are NOT on StorageAdapter. Remote adapter crashes at runtime.
  - Leak 5-6: execution.ts uses ctx.db.prepare() directly for handleGetExecutionStatus and handleGetReviewManifest with no adapter delegation path. Both fail entirely with remote adapter.

  **Significant (1)**:
  - Leak 7: metrics.ts uses ctx.db.prepare() even when adapter is set. Adapter queryNodes is used only as a gate-check; actual data always comes from raw SQL against metrics_events table.

  **Minor (7)**:
  - Leak 3: context.ts LocalContextAdapter fallback (test-only)
  - Leak 4: write.ts LocalAdapter fallback (test-only)
  - Leaks 8-12: analysis.ts and query.ts have proper adapter paths but retain ctx.db fallbacks for tests/backward-compat

  **Acceptable references**: server.ts:selectAdapter is the designated factory — LocalAdapter and RemoteAdapter imports there are correct.
