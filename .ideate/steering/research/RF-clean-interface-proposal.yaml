  # Clean StorageAdapter Interface Proposal

  **Produced by**: WI-784 synthesis spike (PH-042)
  **Input artifacts**: RF-abstraction-boundary-audit (WI-781), RF-ppr-divergence-catalog (WI-782), RF-equivalence-test-audit (WI-783)
  **Design constraint**: "The backend adapter implementation must be completely invisible to the user experience." — Local SQLite and cloud-hosted database must behave identically.

  ---

  ## 1. What Does the Clean StorageAdapter Interface Look Like?

  The current StorageAdapter interface (adapter.ts) is structurally sound. The 20 methods cover the full operation surface. The interface contract doc (adapter-contract.md) is accurate and current. The problem is not the interface definition — it is the gap between the interface and its actual usage in tool handlers.

  ### Clean interface invariants (what must hold):

  1. No tool handler may import LocalContextAdapter, LocalAdapter, RemoteAdapter, or any concrete adapter class. Only StorageAdapter is visible above the adapter boundary.
  2. No tool handler may access ctx.db or ctx.drizzleDb for business logic. Raw SQLite access is reserved exclusively for the adapter implementations themselves.
  3. All five query methods currently bypassed (queryArchitectureDocument, queryGuidingPrinciples, queryConstraints, queryActiveProject, queryActivePhase) must become StorageAdapter methods, or be replaced by equivalent StorageAdapter calls.
  4. Metrics query must route entirely through the adapter. ctx.db.prepare() in handleGetMetrics must be eliminated.
  5. ExecutionStatus and ReviewManifest handlers must use adapter methods, not raw SQL.
  6. max_nodes must have a single semantic: result count cap (slice), not graph-size abort. This aligns with remote behavior.
  7. always_include_types must have a single semantic: all matching nodes are included before budget, unconditionally. This aligns with local behavior.
  8. Edge types must have a single canonical case: lower_snake_case throughout. No normalizeEdgeType() masking case mismatches.

  ### Methods to add to StorageAdapter:

  getArchitectureDocument(): Promise<{ content: string } | null> — only if Option A chosen for context.ts.
  getGuidingPrinciples(), getConstraints(), getActiveProject(), getActivePhase() — or replace with composed queryNodes + getNodes calls (Option B, recommended for these four).
  queryMetrics(filter, limit, offset) — or compose from queryNodes + getNodes (Option B, recommended).

  ---

  ## 2. Fix Proposals for Each Abstraction Leak (WI-781)

  ### Leak 1-2 (CRITICAL): context.ts — LocalContextAdapter cast
  Replace with composed StorageAdapter calls (Option B recommended for 4 of 5 methods). Crashes RemoteAdapter.

  ### Leak 5-6 (CRITICAL): execution.ts — ctx.db.prepare()
  Rewrite using queryNodes + getNodes. No new interface methods needed. Crashes RemoteAdapter.

  ### Leak 7 (SIGNIFICANT): metrics.ts — ctx.db.prepare()
  Use queryNodes + getNodes, aggregate from Node.properties. Wrong data path with RemoteAdapter.

  ### Leaks 3, 4, 8-12 (MINOR): Test-only fallbacks
  Remove fallback paths. Tests should use StorageAdapter test doubles.

  ---

  ## 3. Resolution Proposals for Each PPR Divergence (WI-782)

  ### D5 (CRITICAL): Edge loading scope
  Non-remediable. Document as architectural constraint. Equivalence tests should verify structural properties only, not score ordering.

  ### D2 (SIGNIFICANT): CONTAINMENT_EDGE_TYPES dead code
  Remove from ppr.ts. None exist in schema.ts.

  ### D3 (SIGNIFICANT): always_include_types budget
  Standardize on local behavior — unconditional inclusion.

  ### D4 (SIGNIFICANT): max_nodes semantics
  Standardize on remote behavior — result count cap, not graph-size abort.

  ### D1 (MINOR): Edge type weight case
  Standardize to lower_snake_case. Remove normalizeEdgeType().

  ### D6 (MINOR): always_include_types case forwarding
  No change needed. Case conversion is correct RemoteAdapter implementation detail.

  ---

  ## 4. Proposals for Each Equivalence Gap (WI-783)

  1. readNodeContent: deep content shape assertion (parse YAML, compare type-specific fields)
  2. archiveCycle: state-based verification via queryNodes after archive
  3. queryGraph: tests with type_filter, edge_types, filters sub-fields
  4. countNodes: group_by=severity test
  5. traverse: remove score-ordering assertions, add structural assertions

  ---

  ## 5. Priority Ordering

  ### P0 — Blockers (crash RemoteAdapter)
  1. Leak 1-2: context.ts LocalContextAdapter cast
  2. Leak 5-6: execution.ts raw SQL

  ### P1 — Significant behavioral divergence
  3. D4: max_nodes semantics
  4. D3: always_include_types budget
  5. Leak 7: metrics.ts raw SQL

  ### P2 — Dead code and convention cleanup
  6. D2: CONTAINMENT_EDGE_TYPES
  7. D1: Edge type weight case + normalizeEdgeType()
  8. Leaks 3,4,8-12: Test-only fallbacks

  ### P3 — Test coverage gaps
  9-13. Five equivalence test additions

  ---

  ## 6. Estimated Implementation Scope

  ### Phase A: Critical leak fixes (P0) — 2-3 WIs, 3-5 days, medium risk
  ### Phase B: PPR divergence fixes (P1) — 2-3 WIs, 2-4 days, medium risk
  ### Phase C: Dead code removal (P2) — 1-2 WIs, 1-2 days, low risk
  ### Phase D: Equivalence tests (P3) — 1-2 WIs, 1-2 days, low risk

  **Total**: 8-12 work items, 7-13 developer-days, 4 phases.
  **Execute Phase A first** — RemoteAdapter is currently non-functional for three critical tool handlers.
