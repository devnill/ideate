id: RF-equivalence-test-audit
type: research
title: Equivalence Test Suite Audit
work_item: WI-783
content: |-
  6 test files covering all 20 StorageAdapter methods. Docker infrastructure unavailable — static analysis only.

  **Infrastructure**: Requires Docker (Neo4j 5.26.0 + ideate-server at ../../../ideate-server). Tests self-skip when server unreachable.

  **Coverage**: All 20 StorageAdapter methods have at least some equivalence test. Gaps are in assertion depth:
  - readNodeContent: only compares id and type of parsed content, not full content shape
  - archiveCycle: string-parsing-based assertions, not state verification
  - queryGraph: no tests with type_filter, edge_types, or filters sub-fields
  - countNodes: no group_by=severity test

  **Known divergences**:
  - D-131 (queryNodes status exclusion): FIXED — buildFilterInput adds statusNotIn
  - D-132 (max_nodes passthrough): FIXED — traverse() now passes max_nodes
  - D-134 (queryNodes filter): FIXED — centralized in buildFilterInput

  Note: D-131/D-134 fix applies statusNotIn to cross-type queries too, which may have unintended side effects on non-work_item results.

  **Assertion quality**: equivalence-traverse.test.ts is strongest (tolerance-based PPR score comparison). equivalence-batch.test.ts archiveCycle is weakest (regex string parsing). No test compares actual node content in traverse results — only IDs and scores.
