id: RF-ppr-divergence-catalog
type: research
title: PPR Algorithm Divergence Catalog
work_item: WI-782
content: |-
  6 divergences cataloged between local and remote PPR implementations.

  **Critical (1)**:
  - D5: Edge loading scope — local loads ALL edges from SQLite (full graph PPR), remote delegates to server scoped to org_id/codebase_id. Score distributions differ fundamentally. Local/remote equivalence is non-provable without server access.

  **Significant (3)**:
  - D2: CONTAINMENT_EDGE_TYPES filter is dead code locally. None of the 6 containment types exist in EDGE_TYPES/EDGE_TYPE_REGISTRY in schema.ts.
  - D3: Always-include budget behavior differs. Local adds always-include nodes unconditionally before budget. Remote applies budget check to non-seed always-include-type nodes — they can be dropped.
  - D4: max_nodes semantics differ. Local uses it as graph-size abort threshold (returns [] if exceeded). Remote uses it as result count cap (slice).

  **Minor (2)**:
  - D1: Edge type weight case convention — ppr.ts defaults UPPER_SNAKE_CASE, config.ts defaults lower_snake_case, schema.ts lower_snake_case. normalizeEdgeType() masks the mismatch.
  - D6: always_include_types case forwarding — local uses lower_snake_case directly, remote converts to UPPER_SNAKE_CASE via toGraphQLEnum().

  **Prior research (WI-660/ppr-alignment-research.md)**: Partially outdated. Always-include budget divergence and max_nodes semantics were not known. Edge weight customization gap has since been closed.
